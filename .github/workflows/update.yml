name: Release update

# Checks the three upstream MiSTer DBs four times a day, records any new/updated
# releases (dated), enriches + regenerates the site, and commits the result.
# Pages serves from main /docs, so the push publishes the refreshed site.

on:
  schedule:
    # Four times daily at :12 past (odd minute to avoid the top-of-hour
    # scheduler crush). A quiet run simply publishes nothing.
    - cron: "12 0,6,12,18 * * *"
  workflow_dispatch: {}   # allow manual runs from the Actions tab

# Prevent overlapping runs from racing on the same commit/push.
concurrency:
  group: daily-update
  cancel-in-progress: false

permissions:
  contents: write   # needed to push the refreshed data + site back to main

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      # misterzine.py's gh_token() reads this for the GitHub API (repo crawls,
      # rate-limit headroom). The default GITHUB_TOKEN is enough.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Snapshot upstream DBs (detect new/updated releases)
        run: python misterzine.py snapshot

      - name: Enrich new arcade titles (year/manufacturer/rbf/setname)
        run: python misterzine.py enrich-mra

      - name: Refresh debut/last-update dates (incremental repo crawls)
        # Feeds the site's "Last Updated" column (each core repo's newest
        # commit). The crawls skip every repo not pushed since its last crawl
        # (one org listing + one jtcores pushed_at check), so a typical day
        # costs a handful of API calls, well inside GITHUB_TOKEN's rate limit.
        # A crawl hiccup shouldn't block the daily publish, hence non-fatal.
        continue-on-error: true
        run: |
          python misterzine.py repos
          python misterzine.py core-repos
          python misterzine.py jtcores
          python misterzine.py coinop

      - name: Genre (MAME catver.ini)
        run: python misterzine.py genre

      - name: Arcade metadata (MiSTer Arcade Database)
        # Refreshes the committed MAD CSV (rotation/resolution/players/controls
        # per setname) feeding the site's opt-in arcade columns. Non-fatal: on a
        # fetch hiccup export-web falls back to the checked-out copy.
        continue-on-error: true
        run: python misterzine.py mad

      - name: Provisional arcade specs (mame2003-plus)
        # Refreshes the committed derived gz (rotation/players/controls per
        # setname) used to gray-fill spec cells for titles MAD hasn't catalogued
        # yet. Non-fatal: on a fetch hiccup export falls back to the checked-out gz.
        continue-on-error: true
        run: python misterzine.py specs

      - name: Regenerate JSON exports
        run: python misterzine.py export

      - name: Regenerate the static site
        run: python misterzine.py export-web

      - name: Zine sanity + feed regen (self-healing)
        # Validates docs/zine.json and regenerates feed-zine.xml from it when
        # drifted; both are byte-deterministic so a quiet day commits nothing.
        # Non-fatal: the zine-inbox workflow is the real gate on new posts, and
        # a zine hiccup must never block the release refresh.
        continue-on-error: true
        run: python misterzine.py zine

      - name: Commit and publish if anything changed
        run: |
          git config user.name "misterzine-bot"
          git config user.email "actions@users.noreply.github.com"
          # Gate on the *published outputs*, not the sqlite: `snapshot` rewrites
          # sources.last_fetch every run, so the DB always shows a diff even on a
          # quiet day. Only when exports/site actually change do we also commit
          # the DB (which then carries the new events/dates worth persisting).
          git add data/exports docs
          if git diff --cached --quiet; then
            echo "No new or updated releases today — nothing to publish."
          else
            # Persist alongside the published outputs: the sqlite carries the new
            # events/dates, image_manifest.json records the screenshot backfill
            # (adb/libretro matches AND misses; misses on young rows retry), and
            # the MAD CSV is the fetch-failure fallback for the arcade metadata.
            git add data/misterzine.sqlite data/cache/image_manifest.json data/cache/ArcadeDatabase.csv data/cache/mame_meta.json.gz data/cache/mame2003_specs.json.gz
            git commit -m "Update: refresh releases ($(date -u +'%Y-%m-%d %H:%M') UTC)"
            git push
          fi
