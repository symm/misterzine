<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>shadow mask coarseness test</title>
<style>
  :root { color-scheme: light dark; }
  body { font: 15px/1.5 system-ui, sans-serif; margin: 1rem auto; max-width: 680px; padding: 0 1rem; }
  h1 { font-size: 1.1rem; }
  .info { background: #8882; border-radius: 6px; padding: .6rem .8rem; font-size: .85rem; }
  h2 { font-size: .95rem; margin: 1.6rem 0 .4rem; }
  .frame { position: relative; width: 100%; aspect-ratio: 4 / 3; background: #000;
           border: 1px solid #8884; border-radius: 6px; overflow: hidden; margin-bottom: .4rem; }
  .frame img, .frame canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
  .frame img { object-fit: cover; }
  .frame canvas { pointer-events: none; }
  p.cap { color: #888; font-size: .8rem; margin: 0 0 1rem; }
</style>
</head>
<body>
<h1>Shadow mask coarseness test</h1>
<div class="info" id="info">JS required.</div>
<div id="sections"></div>
<script src="mask.js"></script>
<script>
  const dpr = window.devicePixelRatio || 1;
  const auto = Math.min(2, Math.max(1, Math.round(dpr / 1.5)));
  document.getElementById('info').innerHTML =
    'devicePixelRatio: <b>' + dpr + '</b> &middot; current auto rule picks scale <b>' + auto + '</b>' +
    '<br>triad width per scale: ' + [1, 2, 3].map(m =>
      'scale ' + m + ' = ' + (3 * m / dpr).toFixed(2) + ' css px').join(' &middot; ') +
    '<br>Compare the sections below on THIS device and note which scale reads best.';

  const IMGS = [
    ['images/title/nslasher.png', 'Night Slashers title'],
    ['images/ingame/bgaregga.png', 'Battle Garegga in-game'],
  ];
  const sections = document.getElementById('sections');
  for (const m of [0, 1, 2, 3]) {
    const h = document.createElement('h2');
    h.textContent = m === 0 ? 'Original (no mask)' :
      'Scale ' + m + ' (' + (3 * m / dpr).toFixed(2) + ' css px triads)' + (m === auto ? ' - current auto pick' : '');
    sections.appendChild(h);
    for (const [src, cap] of IMGS) {
      const f = document.createElement('div'); f.className = 'frame';
      const img = new Image();
      img.src = src;
      f.appendChild(img);
      sections.appendChild(f);
      const p = document.createElement('p'); p.className = 'cap'; p.textContent = cap;
      sections.appendChild(p);
      if (m > 0) {
        const cv = document.createElement('canvas');
        f.appendChild(cv);
        const render = () => window.mzMask(img, cv, { fit: 'cover', scale: m }) || cv.remove();
        if (img.complete && img.naturalWidth) render();
        else img.onload = render;
      }
    }
  }
</script>
</body>
</html>
