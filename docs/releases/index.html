<style>
  /* self-hosted variable fonts (latin subset) — one file per family covers
     every weight in use (400 body, 600 badges, 700 headings/th). swap keeps
     the system-ui fallback readable while they load. */
  @font-face { font-family: Roboto; src: url(../fonts/roboto-latin-var.woff2) format('woff2');
               font-weight: 100 900; font-display: swap; }
  @font-face { font-family: 'Roboto Condensed'; src: url(../fonts/roboto-condensed-latin-var.woff2) format('woff2');
               font-weight: 100 900; font-display: swap; }
  @font-face { font-family: 'Permanent Marker'; src: url(../fonts/permanent-marker-latin.woff2) format('woff2');
               font-weight: 400; font-display: swap; }
  :root { color-scheme: light dark; }            /* auto — follows the OS */
  :root[data-theme="light"] { color-scheme: light; }
  :root[data-theme="dark"]  { color-scheme: dark; }
  * { box-sizing: border-box; }
  /* app shell: the page itself never scrolls — .tablewrap is the only scroll
     container. This keeps the fixed detail panel and every native scroll
     behavior (scrollbars, scrollIntoView, find-in-page) framed to the table
     region instead of the full viewport. */
  html, body { height: 100%; overflow: hidden; }
  body { font: 14px/1.4 Roboto, system-ui, sans-serif; margin: 0; cursor: default; }
  /* app-shell cursor: arrow everywhere (text stays selectable, just without
     the I-beam), except links and the search field — cursor inherits, so both
     need their intent restored explicitly */
  a { cursor: pointer; }
  input { cursor: text; }
  main { height: 100vh; height: 100dvh; display: flex; flex-direction: column; padding: 0 1rem; }
  .topbar { flex: none; position: relative; z-index: 20; background: Canvas; }
  header { margin: 0; padding: 1rem 0 0; }
  h1 { font-size: 1.25rem; margin: 0 0 .25rem; }
  .updated { color: #888; font-size: .8rem; margin: 0; min-height: 1.1em; }
  .updated a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }
  .updated a:hover { color: #06c; }
  /* dotted underline (+ ⓘ) marks the meta-line popover triggers ("Public
     cores only", "RSS") — they open an in-page popover, unlike the solid
     underline + ↗ links, which navigate away */
  .updated .note { text-decoration: underline dotted; text-underline-offset: 2px; }
  /* the zine link is the one meta-line entry we want noticed */
  .updated a.zinelink { color: #06c; font-family: 'Permanent Marker', cursive; font-weight: 400; font-size: 1.3em; }
  .legend { color: #888; font-size: .8rem; margin: .25rem 0 0; }
  .controls { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center; margin: 0; padding: .6rem 0 .7rem; }
  input[type=search] { padding: .4rem .6rem; min-width: 16rem; flex: 1; }
  /* a non-empty search box (placeholder hidden = something typed) gets accent
     styling so an active filter — easy to trigger via type-anywhere — is obvious */
  input[type=search]:not(:placeholder-shown) {
    border-color: color-mix(in srgb, #06c 60%, CanvasText);
    background: color-mix(in srgb, #06c 10%, Canvas); }
  select, input[type=search] { font-family: inherit; font-size: .9rem; border: 1px solid #8884; border-radius: 4px; background: transparent; color: inherit; }
  select { padding: .4rem; }
  .count { color: #888; font-size: .8rem; }
  button.clear { font: inherit; font-size: .9rem; padding: .4rem .7rem; border: 1px solid #8884;
                 border-radius: 4px; background: transparent; color: inherit; cursor: pointer; }
  button.clear:hover { background: #8882; }
  /* "Columns" dropdown: opt-in arcade metadata columns (default all off) */
  details.cols { position: relative; }
  details.cols summary { list-style: none; cursor: pointer; user-select: none; font-size: .9rem;
                         padding: .4rem .7rem; border: 1px solid #8884; border-radius: 4px; }
  details.cols summary::-webkit-details-marker { display: none; }
  details.cols summary::after { content: " ▾"; color: #888; }
  details.cols summary:hover, details.cols[open] summary { background: #8882; }
  /* a Types/Year filter that's narrowing results tints its summary with the same
     accent as a non-empty search box, so an active filter stays obvious with the
     menu closed (Columns is a display pref, not a filter, so it never glows) */
  details.cols summary.active { border-color: color-mix(in srgb, #06c 60%, CanvasText);
                                background: color-mix(in srgb, #06c 10%, Canvas); }
  details.cols summary.active:hover, details.cols[open] summary.active {
                                background: color-mix(in srgb, #06c 18%, Canvas); }
  details.cols .menu { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
                       background: Canvas; border: 1px solid #8884; border-radius: 6px;
                       padding: .55rem .8rem; box-shadow: 0 4px 16px #0004;
                       display: grid; gap: .35rem; min-width: 10rem; }
  details.cols .menu label { display: flex; gap: .45rem; align-items: center;
                             font-size: .9rem; white-space: nowrap; cursor: pointer; }
  /* reset-to-default entry at the bottom of each menu, sized to match the
     checkbox rows; dimmed when the menu is already at its default state */
  details.cols .menu .reset { border: none; background: none; padding: .1rem 0; margin: .1rem 0 0;
                              font: inherit; font-size: .9rem; text-align: left; white-space: nowrap;
                              color: color-mix(in srgb, #06c 60%, CanvasText); cursor: pointer; }
  details.cols .menu .reset:hover:not(:disabled) { text-decoration: underline; }
  details.cols .menu .reset:disabled { opacity: .4; cursor: default; }
  /* "Year" dropdown: From/To range selects + one-tap decade chips. The per-field
     x shows only when that bound is set (mirrors the search Clear button). */
  .yearrow { display: flex; align-items: center; gap: .4rem; }
  .yearrow .ylbl { width: 2.6rem; color: #888; font-size: .9rem; }
  .yearrow select { flex: 1; }
  .yearrow .xclr { border: none; background: none; padding: 0 .2rem; font: inherit;
                   line-height: 1; color: #888; cursor: pointer; }
  .yearrow .xclr:hover { color: color-mix(in srgb, #06c 60%, CanvasText); }
  .decades { display: flex; flex-wrap: wrap; gap: .3rem; margin: .1rem 0; }
  .decades .dchip { font: inherit; font-size: .8rem; padding: .15rem .4rem; cursor: pointer;
                    border: 1px solid #8884; border-radius: 4px; background: transparent; color: inherit; }
  .decades .dchip:hover { background: #8882; }
  .decades .dchip.on { border-color: color-mix(in srgb, #06c 60%, CanvasText);
                       background: color-mix(in srgb, #06c 18%, Canvas); }
  /* separate (not collapse): collapsed borders are painted by the table, so they
     don't travel with the sticky <th>s — rows show through 1px seams while scrolling.
     With separate+spacing:0 each cell owns its border and it sticks along with it. */
  table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
  /* col widths are computed in JS from the COLUMNS config (they re-balance when
     columns are toggled) — see buildHeader() */
  /* min-width keeps columns from crushing; .tablewrap owns BOTH scroll axes
     (the page never scrolls), so the sticky <th> anchor to it and an over-wide
     table scrolls inside the table region only. min-height:0 is load-bearing:
     without it the flex child refuses to shrink below its content height and
     nothing scrolls — and it must hold on BOTH .tablezone and .tablewrap
     (either level without it re-breaks the shrink chain). .tablezone exists
     only to anchor the scroll-hint shadow overlays: the scroller itself can't
     host them (absolute children would scroll along with the content). */
  /* margin-right: -1rem cancels main's right padding so the table region (and
     its scrollbars + the right fade hint) bleeds to the viewport edge; the
     topbar above keeps its 1rem inset. Cell padding keeps text off the glass. */
  .tablezone { position: relative; flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; margin-right: -1rem; }
  .tablewrap { flex: 1 1 auto; min-height: 0; overflow: auto; }
  /* floating scrollbars: browsers whose native element scrollbars are classic
     (they reserve a blank rail between table and viewport edge — Chrome on
     Windows; overflow:overlay is gone since 114 and fluent OVERLAY bars are
     not author-controllable) get the native bars hidden and replaced by these
     floating auto-hiding thumbs, drawn/synced by syncScrollHints and gated by
     the .custom-sb JS feature-detect. Browsers that already float their bars
     (Firefox on Win11) keep the native ones: no .custom-sb, none of this. */
  body.custom-sb .tablewrap { scrollbar-width: none; }
  body.custom-sb .tablewrap::-webkit-scrollbar { display: none; }
  .sb-thumb { position: absolute; z-index: 16; border-radius: 4px; touch-action: none;
    background: color-mix(in srgb, CanvasText 40%, transparent);
    opacity: 0; transition: opacity .25s; }
  .sb-thumb.v { right: 2px; width: 7px; }
  .sb-thumb.h { bottom: 2px; height: 7px; }
  /* visible while scrolling (sb-show, timer-dropped after a beat), while
     hovered (an invisible thumb still hit-tests, so brushing the edge reveals
     it — how real overlay bars behave), and while being dragged */
  .tablezone.sb-show .sb-thumb, .sb-thumb:hover, .sb-thumb.drag { opacity: 1; }
  .sb-thumb:hover, .sb-thumb.drag { background: color-mix(in srgb, CanvasText 60%, transparent); }
  /* horizontal scroll hints (classes toggled by syncScrollHints): a fade at the
     right edge while more columns sit off-screen, and a shadow cast by the
     sticky Title column once scrolled, so content visibly slides under it.
     Shadows stay BLACK in both themes (a CanvasText-based one turns into a
     white glow on dark, which reads as light, not depth) — dark theme just
     needs more opacity to register against a near-black background.
     light-dark() follows the effective color-scheme, incl. auto mode. */
  .tablezone { --hint-shadow: light-dark(rgb(0 0 0 / .20), rgb(0 0 0 / .75)); }
  /* --hint-r-w / --hint-l-w are set per scroll event by syncScrollHints: full
     width normally, tapering to 0 as its edge of the scroll range approaches,
     so each hint shrinks away instead of blinking off.
     No width transition — the per-scroll updates ARE the animation. */
  /* --sbw/--sbh (measured scrollbar thickness) inset the overlays so the
     shadows shade the content only, not the scrollbars themselves */
  .tablezone::after { content: ""; position: absolute; top: 0; right: var(--sbw, 0px); bottom: var(--sbh, 0px);
    width: var(--hint-r-w, 28px);
    pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 15;
    background: linear-gradient(to left, var(--hint-shadow), transparent); }
  .tablezone.more-r::after { opacity: 1; }
  /* the left shadow is one continuous overlay too (a per-cell box-shadow gets
     sliced by the row borders); --titlew = the sticky Title column's right
     edge, measured by syncScrollHints (it moves with panel/window resizes) */
  .tablezone::before { content: ""; position: absolute; top: 0; bottom: var(--sbh, 0px); left: var(--titlew, 0px);
    width: var(--hint-l-w, 12px); pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 15;
    background: linear-gradient(to right, var(--hint-shadow), transparent); }
  .tablezone.more-l::before { opacity: 1; }
  /* "Scroll to top" button: inlaid at the table area's top right, just below
     the sticky header (--theadh measured by syncScrollHints). Revealed by the
     .scrolled class (toggled per scroll event) whenever the list is more than
     about a row away from the top; pointer-events gating keeps the hidden
     button from stealing clicks meant for the rows under it. Neutral chrome
     (Canvas + border, like the topbar buttons) — an accent-colored pill
     floating over the rows was too loud. */
  .totop { position: absolute; z-index: 17; top: calc(var(--theadh, 2.2rem) + .6rem); right: .9rem;
    font: inherit; font-size: .8rem; cursor: pointer;
    padding: .45rem .85rem; border: 1px solid #8884; border-radius: 999px;
    background: color-mix(in srgb, CanvasText 7%, Canvas); color: inherit; box-shadow: 0 2px 8px #0003;
    opacity: 0; pointer-events: none; transition: opacity .15s; }
  .tablezone.scrolled .totop { opacity: 1; pointer-events: auto; }
  .totop:hover { background: color-mix(in srgb, CanvasText 14%, Canvas); }
  /* "no matches" row: a single message cell replacing the row list. Undo the
     row/cell chrome (sticky first cell, hover tint). The inner div
     pins to the scrollport's left edge and caps at the viewport width, so the
     centered message stays on-screen even when the table is wider than it. */
  tr.nomatch td { position: static; border-right: 0; }
  tr.nomatch:hover td { background: none; }
  tr.nomatch .msg { position: sticky; left: 0; max-width: calc(100vw - 1rem); text-align: center;
                    color: #888; padding: 2.5rem .5rem; }
  tr.nomatch .msg b { font-weight: 600; color: CanvasText; }
  tr.nomatch .msg .esc { font-size: .85em; margin-top: .35rem; display: block; }
  table { min-width: 49rem; }
  th, td { text-align: left; padding: .35rem .6rem; border-bottom: 1px solid #8883; vertical-align: top;
           overflow-wrap: break-word; }
  th { position: sticky; top: 0; z-index: 10; background: Canvas; cursor: pointer; user-select: none;
       overflow-wrap: normal; }  /* headers wrap at spaces, never mid-word */
  /* the sorted column's header is unmistakable: accent-tinted (opaquely, via
     color-mix with Canvas, so rows never show through the sticky header) with
     the accent color on the label + arrow */
  th[aria-sort] { background: color-mix(in srgb, #06c 14%, Canvas);
                  color: color-mix(in srgb, #06c 62%, CanvasText); }
  th[aria-sort=ascending]::after { content: " \2191"; }
  th[aria-sort=descending]::after { content: " \2193"; }
  /* every column after Title is condensed — denser metadata, more room for titles */
  th + th, td + td { font-family: 'Roboto Condensed', Roboto, system-ui, sans-serif; }
  .badge { display: inline-block; padding: .05em .5em; border-radius: 10px; font-size: .82em;
           font-weight: 600; white-space: nowrap; line-height: 1.5;
           background: color-mix(in srgb, var(--h) 20%, Canvas);
           color: color-mix(in srgb, var(--h) 72%, CanvasText); }
  .t-arcade   { --h: #e8a317; }
  .t-console  { --h: #3aa0ff; }
  .t-computer { --h: #2bbf6e; }
  .t-other    { --h: #b07cff; }
  td .dep { color: #888; font-size: .82em; margin-left: .35rem; }
  td.core { color: CanvasText; font-size: .92em; cursor: default; }
  /* repo links keep the column's muted look; underline only on hover */
  td.core a { color: color-mix(in srgb, #06c 60%, CanvasText); text-decoration: none; }
  td.core a:hover { text-decoration: underline; }
  .ext { color: #888; margin-left: .25rem; font-size: .85em; text-decoration: none; display: inline-block; }
  /* floated (not flexed) top-right so the title/meta text lines shorten beside
     the buttons and flow full-width beneath them instead of wrapping early */
  .theme { float: right; display: inline-flex; margin-left: 1rem;
           border: 1px solid #8884; border-radius: 6px; overflow: hidden; }
  .theme button { font: inherit; font-size: .78rem; padding: .3rem .6rem; border: 0; background: transparent; color: inherit; cursor: pointer; }
  .theme button + button { border-left: 1px solid #8884; }
  .theme button[aria-pressed="true"] { background: #8883; font-weight: 600; }
  td.date { white-space: nowrap; font-variant-numeric: tabular-nums; }
  tr:hover td { background: #8881; }
  .build { color: #888; }
  /* provisional spec cells (mame2003-plus, pending the curated Arcade Database) */
  td.prov, .prov { color: #888; font-style: italic; }
  .prov em { font-style: normal; opacity: .7; font-size: .85em; }
  .colnote { margin: .5rem .1rem 0; padding-top: .5rem; border-top: 1px solid #8883;
             font-size: .8rem; line-height: 1.35; color: #888; max-width: 15rem; }
  .colnote .prov { font-style: italic; }
  /* every row opens the detail panel (arrow cursor on purpose: rows are
     app-style select targets, not links — the hover tint signals clickability) */
  tr.open td { background: #06c3; }
  /* Title column pins to the scroller's left edge. It needs its own opaque
     paint: row backgrounds don't travel with a sticky cell, and the hover/open
     tints above are translucent — content scrolling beneath would bleed
     through — so the :first-child overrides remix them opaquely over Canvas
     (they also need the extra specificity to beat `tr:hover td`/`tr.open td`). */
  td:first-child { position: sticky; left: 0; z-index: 2; background: Canvas; }
  th:first-child { left: 0; z-index: 11; }  /* corner cell: sticks both axes, above the other th */
  td:first-child, th:first-child { border-right: 1px solid #8883; }
  tr:hover td:first-child { background: color-mix(in srgb, #888 7%, Canvas); }
  tr.open td:first-child  { background: color-mix(in srgb, #06c 20%, Canvas); }
  .dv-icon { margin-left: .4rem; color: #888; vertical-align: -1px; }

  /* --- detail panel: slides in from the left --- */
  #panel { position: fixed; top: 0; left: 0; height: 100vh; height: 100dvh; width: var(--pw, round(calc(100vw / 3), 1px));
           transform: translateX(-100%); transition: transform .28s ease;
           overflow: hidden; z-index: 100; background: Canvas; display: flex; flex-direction: column;
           border-right: 1px solid #8884;
           touch-action: pan-y; }
  body.panel-open #panel { transform: translateX(0); }
  #panel[hidden] { display: none; }
  #panel .body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 1rem; scrollbar-width: none; -ms-overflow-style: none; }
  #panel .body::-webkit-scrollbar { display: none; }
  #panel .close { position: sticky; top: 0; float: right; font-size: 1.4rem; line-height: 1;
                  border: 0; background: transparent; color: inherit; cursor: pointer; padding: .1rem .3rem; }
  #panel h2 { font-size: 1.1rem; margin: 0 1.5rem .5rem 0; }
  #panel dl { margin: 0 0 1rem; display: grid; grid-template-columns: max-content 1fr; gap: .15rem .6rem; font-size: .85rem; }
  #panel dt { color: #888; }
  #panel dd { margin: 0; }
  /* MAME setnames read best monospaced (table cells and the panel row) */
  .rom { font-family: ui-monospace, Consolas, monospace; font-size: .95em; }
  td.rom { white-space: nowrap; }
  /* click-to-copy affordance next to copyable panel values */
  #panel .copy, .rsspop .copy { font: inherit; font-size: .85em; line-height: 1; margin-left: .35rem; padding: 0 .25rem;
    border: none; background: none; color: #888; cursor: pointer; }
  #panel .copy:hover, .rsspop .copy:hover { color: inherit; }
  #panel .copy.ok, .rsspop .copy.ok { color: #2a2; }
  /* RSS popover: feed chooser opened from the meta line's "RSS" link; styled
     after the Columns dropdown menu. Fixed positioning is fine — the page
     itself never scrolls (app shell) */
  .rsspop { position: fixed; z-index: 40; background: Canvas; border: 1px solid #8884;
    border-radius: 6px; padding: .6rem .8rem; box-shadow: 0 4px 16px #0004;
    font-size: .8rem; max-width: min(30rem, calc(100vw - 2rem)); }
  .rsspop p { margin: 0 0 .45rem; color: #888; }
  .rsspop p:last-child { margin-bottom: 0; }
  .rsspop .feedrow { display: flex; gap: .5rem; align-items: baseline; margin: .3rem 0; }
  .rsspop .feedrow b { font-weight: 600; white-space: nowrap; }
  .rsspop code { overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    direction: rtl; flex: 1; color: #888; }  /* rtl ellipsis keeps the distinctive tail (…feed-new.xml) visible */
  @media (max-width: 480px) { .rsspop { left: 1rem !important; right: 1rem; } }
  #panel .detail { font-size: .9rem; margin: 0 0 1rem; }
  #panel .report { color: #888; font-size: .8rem; margin: 1.25rem 0 0; }
  #panel .report a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }
  #panel .report a:hover { color: #06c; }
  /* empty state shown before any title is selected */
  #panel .body.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; gap: 1rem; }
  #panel .body.empty .close { position: absolute; top: .4rem; right: .6rem; float: none; }
  /* debossed watermark: fill sits a hair darker than the Canvas surface in both
     themes; the #mzstamp svg filter adds the pressed-in edge shading */
  #panel .body.empty .logo { width: 60%; max-width: 220px; aspect-ratio: 532.4 / 354.2;
    fill: light-dark(color-mix(in srgb, CanvasText 8%, Canvas), color-mix(in srgb, #000 11%, Canvas)); }
  /* pressed-in edge shading: strong sheen would glow on a dark surface, so both
     floods are theme-tuned here rather than fixed in the filter markup */
  #mzstamp .shade { flood-color: light-dark(rgb(0 0 0 / .42), rgb(0 0 0 / .33)); }
  #mzstamp .sheen { flood-color: light-dark(rgb(255 255 255 / .55), rgb(255 255 255 / .05)); }
  #panel .pick { color: #888; font-size: .95rem; margin: 0; }
  /* footer is docked to the bottom of the panel (outside the scrolling .body) */
  #panel .hint { flex: none; margin: 0; padding: .55rem 1rem; border-top: 1px solid #8883;
                 background: Canvas; color: #888; font-size: .78rem; }
  #panel .hint kbd { font: inherit; padding: 0 .25rem; border: 1px solid #8886; border-radius: 3px; }
  #panel .frame { width: 100%; background: #000; margin: .5rem 0; position: relative; }
  #panel .frame img { width: 100%; height: 100%; object-fit: fill; display: block; }
  /* CRT slot mask (mask.js) drawn over each screenshot in device pixels;
     decorative only — must never swallow clicks/touches */
  #panel .frame canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  /* console/computer hardware photo (transparent PNG) */
  #panel .sysphoto { display: block; margin: 1.75rem auto .9rem; width: 100%; height: auto;
                     max-height: 38vh; object-fit: contain; }
  /* JS wraps the photo so the mask canvas can overlay it (margins move here) */
  #panel .sysframe { position: relative; margin: 1.75rem auto .9rem; }
  #panel .sysframe .sysphoto { margin: 0; }
  #panel .sysframe canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #panel .syscredit { margin: 0 0 1.75rem; text-align: center; color: #888; opacity: .55;
                      font-size: .62rem; }
  #panel .syscredit a { color: inherit; }

  /* Launch on MiSTer: split button under the panel title; chooser/manager
     reuses the .rsspop popover chrome. Transport is a GET navigation
     (window.open + auto-close) — see the launch section in the JS. */
  #panel .launchrow { display: flex; gap: .3rem; margin: .5rem 0 0; }
  #panel .launchrow button { font: inherit; font-size: .78rem; padding: .28rem .65rem; cursor: pointer;
    border: 1px solid #8887; border-radius: 6px; background: Canvas; color: inherit; }
  #panel .launchrow button:hover { border-color: #888c; }
  #panel .launchrow .go.sent { color: #2a2; border-color: #2a28; }
  /* must clear the panel (and its resizer, z 101) — the launch button lives inside the panel */
  .misterpop { width: min(22rem, calc(100vw - 2rem)); z-index: 102; }
  .misterpop .devrow { display: flex; gap: .45rem; align-items: center; margin: .35rem 0; }
  .misterpop button { font: inherit; font-size: .78rem; padding: .22rem .55rem; cursor: pointer;
    border: 1px solid #8887; border-radius: 6px; background: Canvas; color: inherit; }
  .misterpop button:hover { border-color: #888c; }
  .misterpop .devrow code { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #888; }
  .misterpop .devrow .rm { border: none; padding: 0 .2rem; color: #888; }
  .misterpop .devrow .rm:hover { color: #c33; border: none; }
  .misterpop input { font: inherit; font-size: .78rem; padding: .25rem .45rem; border: 1px solid #8887;
    border-radius: 6px; background: Canvas; color: inherit; min-width: 0; }
  .misterpop .adder .nm { flex: 2; }
  .misterpop .adder .ad { flex: 3; }
  .misterpop .note { font-size: .72rem; margin-top: .5rem; }
  .misterpop .note a { color: inherit; }

  /* draggable edge: resize the panel / flick left to close (reflow mode only) */
  #resizer { position: fixed; top: 0; height: 100vh; height: 100dvh; width: 12px; z-index: 101;
             left: var(--pw, round(calc(100vw / 3), 1px)); margin-left: -6px;
             cursor: ew-resize; display: none; touch-action: none;
             /* ride the panel's edge: slide in/out with the same transition instead of
                popping via display. Closed = pulled left by the panel width, so it sits
                on the panel's (off-screen-adjacent) right edge; visibility flips only
                after the slide-out so it can't be grabbed while hidden. */
             transform: translateX(calc(-1 * var(--pw, round(calc(100vw / 3), 1px))));
             visibility: hidden;
             transition: transform .28s ease, visibility 0s .28s; }
  body.panel-open #resizer { transform: none; visibility: visible; transition: transform .28s ease; }
  /* ribbed grip: two vertical lines running the whole edge so it reads as a draggable seam */
  #resizer { --rib: #8889; }
  #resizer:hover, body.resizing #resizer { --rib: #06c; }
  /* integer-pixel stops (1px lines / 1px gaps) so the lines land on the pixel grid evenly */
  #resizer::before { content: ""; position: absolute; inset: 0; background: linear-gradient(to right,
      transparent 0 5px, var(--rib) 5px 6px, transparent 6px 7px,
      var(--rib) 7px 8px, transparent 8px 12px); }
  body.resizing { cursor: ew-resize; user-select: none; }
  body.resizing #panel, body.resizing main,
  body.no-anim #panel, body.no-anim main, body.no-anim #resizer { transition: none; }

  @media (min-aspect-ratio: 3/5) {   /* wide → reflow table into the right two-thirds */
    main { transition: margin-left .28s ease; }
    #resizer { display: block; }  /* always rendered here; visibility/transform gate it */
    body.panel-open main { margin-left: var(--pw, round(calc(100vw / 3), 1px)); }
  }
  @media (max-aspect-ratio: 3/5) {   /* very narrow/tall → overlay full screen, no resize */
    #panel { width: 100vw; }
  }
  /* printing: undo the fixed-height app shell so the full row list paginates
     instead of clipping to one screen of the scroller */
  @media print {
    html, body { height: auto; overflow: visible; }
    main { height: auto; display: block; }
    .tablezone { display: block; }
    .tablezone::after { display: none; }
    .tablewrap { overflow: visible; }
  }
</style>

<script>
let DATA = [], view = [], sortKey = 'updated', sortDir = -1;  // default: most recently updated first
let openRow = null;  // the selected data object (unique & stable; d.img is NOT — clones share it)
// deep links: every row carries a stable key (d.k, stamped by export-web);
// #<k> in the URL opens that row's panel, and opening a panel writes it back
const KEY2ROW = {};  // filled when data.json loads
const rowURL = d => location.origin + location.pathname + '#' + d.k;

// every row opens the detail panel; the icon marks the ones with screenshots
const hasShots = d => !!d.img;

const DV_ICON = '<svg class="dv-icon" width="13" height="13" viewBox="0 0 16 16" ' +
  'fill="none" stroke="currentColor" stroke-width="1.3" aria-hidden="true">' +
  '<rect x="1.5" y="2" width="13" height="9" rx="1"/><path d="M5.5 14h5M8 11v3"/></svg>';

// Human-friendly names for the FPGA core (rbf) values. Keyed on the raw rbf;
// the raw value stays visible as a tooltip. Only multi-game hardware families

const CORE_NAMES = {
