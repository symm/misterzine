    ? '<td class="prov" title="' + PROV_TITLE + '">' + esc(d[c.k] || '') + '</td>'
    : '<td>' + esc(d[c.k] || '') + '</td>';

const defaultCols = () => new Set(COLUMNS.filter(c => !c.opt).map(c => c.k));
// 'mz-cols2' holds the full visible set. The pre-2026-07 'mz-cols' key held
// only the enabled *optional* columns (base ones weren't toggleable) — migrate
// it by unioning with the base defaults, or a returning visitor would load a
// table stripped to their optional picks.
let enabledCols;
try {
  const v2 = localStorage.getItem('mz-cols2');
  if (v2 !== null) enabledCols = new Set(JSON.parse(v2));
  else enabledCols = new Set([...defaultCols(),
    ...JSON.parse(localStorage.getItem('mz-cols') || '[]')]);
} catch (e) { enabledCols = defaultCols(); }

const activeColumns = () => COLUMNS.filter(c => c.lock || enabledCols.has(c.k));

// Narrow screens trade wording for vertical space: one-word headers (COLUMNS.sl)
// and terser filter summaries, so neither the sticky header row nor the filter
// row costs a second line on a phone. Same breakpoint as the controls reflow
// above — the header only wraps once the table is at its min-width floor, which
// is roughly the same zone. The change listener re-runs every piece of text that
// depends on it; each sync fn below reads narrowMQ.matches itself.
const narrowMQ = matchMedia('(max-width: 899px)');

function buildHeader() {
  const cols = activeColumns();
  const total = cols.reduce((s, c) => s + c.w, 0);
  document.getElementById('cg').innerHTML = cols.map(c =>
    '<col style="width:' + (c.w / total * 100).toFixed(2) + '%">').join('');
  document.getElementById('hrow').innerHTML = cols.map(c =>
    '<th data-k="' + c.k + '"' + (c.k === sortKey
      ? ' aria-sort="' + (sortDir === 1 ? 'ascending' : 'descending') + '"' : '') +
    (HEADER_TIPS[c.k] ? ' title="' + escA(HEADER_TIPS[c.k]) + '"' : '') +
    '>' + ((narrowMQ.matches && c.sl) || c.label) + '</th>').join('');
  // each column contributes its mw to the table's width floor so cells don't
  // crush (the 5rem on the metadata columns keeps the nowrap date columns from
  // colliding with all 6 on); an over-wide table scrolls horizontally inside
  // .tablewrap, the page's only scroll container (the sticky <th> anchor to it)
  document.querySelector('table').style.minWidth = cols.reduce((s, c) => s + c.mw, 0) + 'rem';
  syncScrollHints();  // toggling columns changes the table's scrollWidth
}

// Floating scrollbar thumbs (see the .sb-thumb CSS comment): only in browsers
// whose native element scrollbars are classic, detected with a throwaway
// scroller (classic bars eat layout space, overlay ones don't). Can't measure
// .tablewrap itself: it has no overflow until the data loads.
let vThumb = null, hThumb = null, sbDragging = false, sbHideTimer = 0;
{
  const probe = document.createElement('div');
  probe.style.cssText = 'position:absolute;visibility:hidden;width:60px;height:60px;overflow:scroll';
  document.body.appendChild(probe);
  const classic = probe.offsetWidth > probe.clientWidth;
  probe.remove();
  if (classic) {
    document.body.classList.add('custom-sb');
    const z = document.querySelector('.tablezone');
    vThumb = Object.assign(document.createElement('div'), { className: 'sb-thumb v', hidden: true });
    hThumb = Object.assign(document.createElement('div'), { className: 'sb-thumb h', hidden: true });
    z.append(vThumb, hThumb);
    dragifyThumb(vThumb, false);
    dragifyThumb(hThumb, true);
  }
}

// dragging a thumb scrolls proportionally, like a native scrollbar
function dragifyThumb(t, horiz) {
  t.addEventListener('pointerdown', e => {
    const w = document.querySelector('.tablewrap');
    e.preventDefault();
    t.setPointerCapture(e.pointerId);
    t.classList.add('drag');
    sbDragging = true;
    const start = horiz ? e.clientX : e.clientY;
    const startScroll = horiz ? w.scrollLeft : w.scrollTop;
    const track = (horiz ? w.clientWidth - t.offsetWidth : w.clientHeight - t.offsetHeight);
    const range = horiz ? w.scrollWidth - w.clientWidth : w.scrollHeight - w.clientHeight;
    const move = ev => {
      const d = (horiz ? ev.clientX : ev.clientY) - start;
      w[horiz ? 'scrollLeft' : 'scrollTop'] = startScroll + d / track * range;
    };
    const up = () => {
      t.removeEventListener('pointermove', move);
      t.classList.remove('drag');
      sbDragging = false;
      clearTimeout(sbHideTimer);  // the drag's own scroll events armed it while sbDragging still held
      sbHideTimer = setTimeout(() =>
        document.querySelector('.tablezone').classList.remove('sb-show'), 900);
    };
    t.addEventListener('pointermove', move);
    t.addEventListener('pointerup', up, { once: true });
    t.addEventListener('pointercancel', up, { once: true });
  });
}

// Horizontal scroll hints: keep the .tablezone shadow classes in sync with the
// scroll position. Re-checked on scroll, on any scroller resize (window,
// panel open/close/drag — the ResizeObserver below catches them all), on
// content resizes (rows/columns change the table's size without touching the
// scroller's box, so the wrap's own observer misses them), and after column
// toggles (buildHeader above).
function syncScrollHints() {
  const w = document.querySelector('.tablewrap'), z = document.querySelector('.tablezone');
  z.classList.toggle('more-l', w.scrollLeft > 0);
  z.classList.toggle('more-r', w.scrollLeft + w.clientWidth < w.scrollWidth - 1);
  z.classList.toggle('scrolled', w.scrollTop > 30);  // ~a row down reveals "Scroll to top"
  // taper both hints near their end of the scroll range: each one's width
  // tracks the distance to its edge (full width until the last ~6% / 48px
  // minimum, then shrinking to 0), so they grow/shrink with scroll position
  // instead of blinking on and off
  const maxScroll = w.scrollWidth - w.clientWidth;
  const remain = Math.max(0, maxScroll - w.scrollLeft);
  const taper = Math.max(48, maxScroll * .06);
  z.style.setProperty('--hint-r-w', Math.min(28, 28 * remain / taper).toFixed(1) + 'px');
  z.style.setProperty('--hint-l-w', Math.min(12, 12 * w.scrollLeft / taper).toFixed(1) + 'px');
  // scrollbar thickness (0 with overlay scrollbars), so the shadows can stop
  // short of the scrollbars instead of shading them
  z.style.setProperty('--sbw', (w.offsetWidth - w.clientWidth) + 'px');
  z.style.setProperty('--sbh', (w.offsetHeight - w.clientHeight) + 'px');
  // pin the left shadow to the sticky Title column's right edge (the column is
  // percentage-sized, so the edge moves with every panel/window/column change)
  const th = document.querySelector('#hrow th');
  if (th) z.style.setProperty('--titlew',
    (th.getBoundingClientRect().right - z.getBoundingClientRect().left) + 'px');
  // sticky header height anchors the "Scroll to top" button just below it
  if (th) z.style.setProperty('--theadh', th.getBoundingClientRect().height + 'px');
  // floating thumbs: length ∝ visible fraction, position ∝ scroll progress
  if (vThumb) {
    const canV = w.scrollHeight > w.clientHeight + 1;
    const canH = w.scrollWidth > w.clientWidth + 1;
    vThumb.hidden = !canV;
    hThumb.hidden = !canH;
    if (canV) {
      const h = Math.max(24, w.clientHeight * w.clientHeight / w.scrollHeight);
      vThumb.style.height = h + 'px';
      vThumb.style.top = w.scrollTop / (w.scrollHeight - w.clientHeight) * (w.clientHeight - h) + 'px';
    }
    if (canH) {
      const wd = Math.max(24, w.clientWidth * w.clientWidth / w.scrollWidth);
      hThumb.style.width = wd + 'px';
      hThumb.style.left = w.scrollLeft / (w.scrollWidth - w.clientWidth) * (w.clientWidth - wd) + 'px';
    }
  }
}
document.querySelector('.tablewrap').addEventListener('scroll', syncScrollHints, { passive: true });
new ResizeObserver(syncScrollHints).observe(document.querySelector('.tablewrap'));
new ResizeObserver(syncScrollHints).observe(document.querySelector('table'));
// reveal the floating thumbs while scrolling, drop them again after a beat
// (unless mid-drag — releasing outside the thumb must not strand it visible)
document.querySelector('.tablewrap').addEventListener('scroll', () => {
  if (!vThumb) return;
  document.querySelector('.tablezone').classList.add('sb-show');
  clearTimeout(sbHideTimer);
  sbHideTimer = setTimeout(() => {
    if (!sbDragging) document.querySelector('.tablezone').classList.remove('sb-show');
  }, 900);
}, { passive: true });

// shared by the Scroll-to-top button and the "new data landed" notice, whose
// news sits at the top of the list under the default sort
function scrollTableTop() {
  document.querySelector('.tablewrap').scrollTo({ top: 0, behavior: 'smooth' });
}
document.getElementById('totop').addEventListener('click', scrollTableTop);

function render() {
  const tb = document.getElementById('rows');
  const cols = activeColumns();
  // every path below rebuilds the tbody, detaching any NEW badge a hover
  // popover is anchored to — and a removed node never fires the mouseout that
  // would close it, so retire it here rather than leave one floating
  if (hoverPopFor && hoverPopFor.closest('#rows')) closeHoverPop();
  // zero results is never left as a silent blank table: name the query AND any
  // active type/genre filter (an invisible narrower is the sneaky way to get here)
  if (!view.length && DATA.length) {
    const q = document.getElementById('q').value.trim();
    const partial = enabledTypes.size && enabledTypes.size < TYPES.length;
    const types = partial ? TYPES.filter(t => enabledTypes.has(t)).join(', ') : '';
    const genres = enabledGenres.size ? [...enabledGenres].join(', ') : '';
    tb.innerHTML = '<tr class="nomatch"><td colspan="' + cols.length + '"><div class="msg">' +
      'No matches' + (q ? ' for <b>"' + esc(q) + '"</b>' : '') +
      (types ? ' in ' + esc(types) : '') +
      (genres ? ' in ' + esc(genres) : '') +
      (favView ? ' in this favorites link' : favOnly ? ' in your favorites' : '') +
      (yearLabel() ? ' (years ' + yearLabel() + ')' : '') +
      (q && matchMedia('(hover: hover) and (pointer: fine)').matches
        ? '<span class="esc">press Esc to clear the search</span>' : '') + '</div></td></tr>';
    setCount(0);
    return;
  }
  const split = splitAt();
  tb.innerHTML = view.map((d, i) =>
    '<tr' + (d === openRow ? ' class="open"' : '') + ' data-i="' + i + '">' +
    cols.map(c => c.cell(d)).join('') + '</tr>' +
    (i === split ? '<tr class="newsplit"><td colspan="' + cols.length + '">' +
      '<div class="msg">above: new since your last visit</div></td></tr>' : '')
  ).join('');
  setCount(view.length);
}
// Index of the last row the visitor hasn't seen — the divider goes right after
// it, so everything above the line is news. -1 = draw no divider.
//
// Only under the default Last Updated sort: under any other order the unseen
// rows aren't a contiguous block at the top, so no single line can fence them.
// The scan stops at SPLIT_SCAN rows, because one backfilled row carrying an old
// date would otherwise drag the divider halfway down the table; past that depth
// a stray unseen row just goes unfenced. Same-day rows interleave seen with
// unseen (the stamps are day-granular), so the line lands approximately on busy
// days — that's accepted, it's a hint and not an audit.
const SPLIT_SCAN = 200;
function splitAt() {
  if (!baseRows || sortKey !== 'updated' || sortDir !== -1) return -1;
  let last = -1;
  const n = Math.min(view.length, SPLIT_SCAN);
  for (let i = 0; i < n; i++) if (isUnseen(view[i])) last = i;
  return last;
}
// tally: the shown count and the "of <total>" always render as two stacked lines
// (see .count CSS) so the filter cluster's right edge stays put as the count changes
function setCount(shown) {
  document.getElementById('count').innerHTML =
    '<span>' + shown + '</span><span>of ' + DATA.length + '</span>';
}

function esc(s) { return (s == null ? '' : '' + s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escA(s) { return esc(s).replace(/"/g, '&quot;'); }

// diacritic-insensitive lowercase for search ("sam coupe" must match "SAM Coupé")
const fold = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

function apply() {
  const qEl = document.getElementById('q');
  // whitespace splits the query into AND terms ("horizontal 4-way" = rows
  // matching both, in any field, in any order); each term is an independent
  // substring so multi-word values still match ("street fighter" hits the title)
  const terms = fold(qEl.value.trim()).split(/\s+/).filter(Boolean);
  // the global "Clear filters" button is always present; it's armed (enabled) only
  // while a filter is narrowing results, and grayed/disabled otherwise
  document.getElementById('clear').disabled =
    !(qEl.value || enabledTypes.size || enabledGenres.size || yearFrom != null || yearTo != null
      || favOnly || favView);
  // Types filter: an empty set means "no filter" (show all) — which coincides
  // with every type being checked. Any partial selection narrows to those bases.
  view = DATA.filter(d => {
    // favorites: someone else's shared link (favView) and your own toggle are
    // separate narrowers — a shared link is a view of THEIR list, and starring
    // things while reading it mustn't change what the link shows
    if (favView && !(d.k && favView.has(d.k))) return false;
    if (favOnly && !(d.k && FAVS.has(d.k))) return false;
    if (enabledTypes.size && !enabledTypes.has(d.base)) return false;
    // Genre filter: like Types, an empty set is "no filter". A selection narrows to
    // those genres — rows with no genre (everything non-arcade) drop out, same as a
    // type filter shrinking the set.
    if (enabledGenres.size && !enabledGenres.has(d.genre)) return false;
    // Year range: rows with no numeric Original Year drop out while a bound is set
    if (yearFrom != null || yearTo != null) {
      const y = +d.year;
      if (!y) return false;
      if (yearFrom != null && y < yearFrom) return false;
      if (yearTo != null && y > yearTo) return false;
    }
    if (!terms.length) return true;
    const hay = fold(d.title + ' ' + (d.mt || '') + ' ' + typeLabel(d) + ' ' + (d.genre || '') + ' ' + d.manufacturer + ' ' +
            d.year + ' ' + (d.core || '') + ' ' + coreLabel(d.core) + ' ' +
            (d.rot || '') + ' ' + (d.res || '') + ' ' + (d.plr || '') + ' ' +
            (d.ctl || '') + ' ' + (d.spc || '') + ' ' + (d.reg || '') + ' ' + (d.sn || '') + ' ' +
            (d.scr === 3 ? 'triple screen' : d.scr === 2 ? 'dual screen' : '') + ' ' +
            (SRC_SEARCH[d.src] || ''));
    return terms.every(t => hay.includes(t));
  });
  if (sortKey) {
    const keyOf = x => sortKey === 'typesort' ? typeLabel(x)
      : sortKey === 'core' ? coreLabel(x.core)
      : (x[sortKey] || '');
    view.sort((a, b) => {
      const av = keyOf(a), bv = keyOf(b);
      // Blank cells always sink to the bottom, regardless of sort direction, so
      // "no data" never heads the list (e.g. sorting Players ascending still
      // shows 1,2,4… first and the unknowns last).
      const ae = av === '', be = bv === '';
      if (ae !== be) return ae ? 1 : -1;
      // Case- and accent-insensitive so "ASO" sorts next to "Ace", not ahead of
      // it; numeric:true gives natural ordering for any number runs in titles.
      const cmp = sortDir * av.localeCompare(bv, undefined, { numeric: true, sensitivity: 'base' });
      if (cmp) return cmp;
      // Tiebreak equal values by title A–Z: one repo push stamps every row of a
      // shared arcade core with the same Last Updated date, and without this the
      // whole block would sit in arbitrary data order.
      return a.title.localeCompare(b.title, undefined, { numeric: true, sensitivity: 'base' });
    });
  }
  render();
}

// Keep the still-selected row in view after any reshuffle of the list (search,
// sort, type filter, column toggle). No-op when nothing is open or the open row
// was filtered out of the current results — its <tr> simply isn't in the DOM.
function recenterOpen() {
  const tr = document.querySelector('#rows tr.open');
  if (tr) tr.scrollIntoView({ block: 'center', inline: 'nearest' });
}

// Re-center on every keystroke: if the open row survives the filter it stays put
// (and this covers backspacing back to the full list); if it's filtered out the
// helper no-ops until it reappears. Filtering preserves the sort order rather
// than ranking by match, so anchoring to the open row doesn't hide better hits.
document.getElementById('q').addEventListener('input', () => { apply(); recenterOpen(); });
// clears the text search only — wired to the inline x and to Esc; leaves the dropdown filters alone
function clearSearch() {
  const q = document.getElementById('q');
  q.value = ''; apply(); q.focus({ preventScroll: true });
  recenterOpen();  // the full list just replaced the filtered one; keep the user's place
}
document.getElementById('qx').addEventListener('click', clearSearch);
// the far-right "Clear filters" button resets every filter at once (text + all three dropdowns);
// resetTypes/resetGenres/resetYear are state-only helpers defined with each dropdown below
function clearAllFilters() {
  const q = document.getElementById('q');
  q.value = '';
  resetTypes(); resetGenres(); resetYear();
  // both favorites narrowers go too (the saved list itself is untouched) — a
  // "Clear filters" that left the table still hiding rows would be lying
  resetFavOnly();
  if (favView) dismissFavView();
  apply();
  recenterOpen();
}
document.getElementById('clear').addEventListener('click', clearAllFilters);
// "Clear filters" is the longest control in the row; narrow keeps just the verb.
// The tooltip only exists while the label is abbreviated — on desktop it would
// just echo the full label back. Unlike the dropdowns, no existing sync fn owns
// this button's text, hence the helper.
function syncClearLabel() {
  const b = document.getElementById('clear');
  b.textContent = narrowMQ.matches ? 'Clear' : 'Clear filters';
  if (narrowMQ.matches) b.title = 'Clear filters'; else b.removeAttribute('title');
}
syncClearLabel();
// the brand/URL in the title is a plain link to "./": clicking it does a real
// navigation to a bare /releases/, exactly like typing that URL and hitting
// Enter. That's a full fresh load (panel/hash, filters, sort and scroll all
// reset; theme, columns, saved devices and panel width persist via localStorage).
// delegated: the header row is rebuilt whenever columns are toggled
document.getElementById('hrow').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  const k = th.dataset.k;
  // Date columns default to descending (most recent first) when first selected;
  // every other column defaults to ascending. A click on the already-active
  // column always just flips the current direction.
  const DATE_COLS = new Set(['date', 'updated']);
  sortDir = (sortKey === k) ? -sortDir : (DATE_COLS.has(k) ? -1 : 1);
  sortKey = k;
  buildHeader();  // re-stamps aria-sort from sortKey/sortDir
  apply();
  // With a row selected, follow it to its new position; with nothing selected,
  // jump to the top — "show me the new #1" is what a bare re-sort means.
  if (document.querySelector('#rows tr.open')) recenterOpen();
  else document.querySelector('.tablewrap').scrollTop = 0;
});

// --- "Types" dropdown: multi-select filter over the four base types ---
// enabledTypes holds the checked bases; an empty set is "no filter" (all rows),
// which is intentionally the same result as every box checked.
const TYPES = ['Arcade', 'Console', 'Computer', 'Other'];
// The Types/Genres/Year filters deliberately do NOT persist across reloads — a page
// refresh starts unfiltered (only the Columns display pref survives, see mz-cols2).
// So each begins empty here: an empty set / null bound means "no filter". The Genre
// option list is data-seeded (arcade genres from MAME's catver.ini) so its menu is
// built on load by buildGenreMenu(); the Year selects are populated by buildYearMenu()
// once the real year span is known (both in the data-load handler).
let enabledTypes = new Set();
let enabledGenres = new Set();
let yearFrom = null, yearTo = null, YEAR_MIN = null, YEAR_MAX = null;

const typeMenu = document.getElementById('typemenu');
const typeSummary = document.getElementById('typesummary');
// each row is prefixed with its colour-coded type icon (decorative here, the
// text label carries the name) so the menu doubles as the icons' legend
typeMenu.innerHTML = TYPES.map(t =>
  '<label><input type="checkbox" data-t="' + t + '"' +
  (enabledTypes.has(t) ? ' checked' : '') + '>' +
  '<span class="tico t-' + t.toLowerCase() + '" aria-hidden="true">' + (TYPE_ICONS[t] || '') + '</span>' +
  t + '</label>').join('') +
  '<button class="reset" id="typereset">Show all</button>';
const typeReset = document.getElementById('typereset');
function syncTypeSummary() {
  // empty (= no filter) and full both read as "All Core Types"; partial shows the count
  const partial = enabledTypes.size !== 0 && enabledTypes.size !== TYPES.length;
  const name = narrowMQ.matches ? 'Types' : 'Core Types';
  typeSummary.textContent = partial ? name + ' (' + enabledTypes.size + ')'
    : (narrowMQ.matches ? name : 'All ' + name);
  typeSummary.classList.toggle('active', partial);  // glow when narrowing, like a non-empty search box
  typeReset.disabled = enabledTypes.size === 0;  // no boxes checked = the default
}
typeMenu.addEventListener('change', e => {
  const t = e.target.dataset.t;
  if (!t) return;
  if (e.target.checked) enabledTypes.add(t); else enabledTypes.delete(t);
  syncTypeSummary();
  apply();
  recenterOpen();  // adding/removing whole types moves the selected row — follow it
});
// state-only reset (no apply/recenter) so the in-menu button and the global
// "Clear filters" can both reuse it
function resetTypes() {
  enabledTypes.clear();
  for (const cb of typeMenu.querySelectorAll('input')) cb.checked = false;
  syncTypeSummary();
}
typeReset.addEventListener('click', () => { resetTypes(); apply(); recenterOpen(); });
syncTypeSummary();

// --- "Columns" dropdown: toggle any column (Title stays locked on) ---
const colsMenu = document.getElementById('colsmenu');
colsMenu.innerHTML = COLUMNS.map(c =>
  '<label><input type="checkbox" data-k="' + c.k + '"' +
  (c.lock ? ' checked disabled' : (enabledCols.has(c.k) ? ' checked' : '')) +
  '> ' + c.label + '</label>').join('') +
  '<button class="reset" id="colsreset">Reset to default</button>' +
  '<p class="colnote"><span class="prov">Grayed</span> spec values are provisional ' +
  '(from MAME data), pending the curated Arcade Database.</p>';
const colsReset = document.getElementById('colsreset');
function syncColsReset() {
  const def = defaultCols();
  colsReset.disabled = enabledCols.size === def.size && [...enabledCols].every(k => def.has(k));
}
// sorting by a column that was just hidden would be invisible — fall back to
// last-updated (the site default) if visible, then debut date, else the
// always-on title column
function fixSortThenRebuild() {
  if (!activeColumns().some(c => c.k === sortKey)) {
    if (activeColumns().some(c => c.k === 'updated')) { sortKey = 'updated'; sortDir = -1; }
    else if (activeColumns().some(c => c.k === 'date')) { sortKey = 'date'; sortDir = -1; }
    else { sortKey = 'title'; sortDir = 1; }
  }
  buildHeader();
  apply();
  // adding/removing columns changes row heights (in-cell wrapping), which can
  // strand the selected row off-screen — keep it centered
  recenterOpen();
}
colsMenu.addEventListener('change', e => {
  const k = e.target.dataset.k;
  if (!k) return;
  if (e.target.checked) enabledCols.add(k); else enabledCols.delete(k);
  localStorage.setItem('mz-cols2', JSON.stringify([...enabledCols]));
  syncColsReset();
  fixSortThenRebuild();
});
colsReset.addEventListener('click', () => {
  enabledCols = defaultCols();
  // remove both keys (incl. the legacy pre-2026-07 one, or the migration path
  // would resurrect the old picks on next load) — reset means "never customized"
  localStorage.removeItem('mz-cols2');
  localStorage.removeItem('mz-cols');
  for (const cb of colsMenu.querySelectorAll('input:not(:disabled)'))
    cb.checked = enabledCols.has(cb.dataset.k);
  syncColsReset();
  fixSortThenRebuild();
});
syncColsReset();

// --- "Year" dropdown: filter rows by Original Year (From / To range) ---
// Two numeric inputs, not selects: a range bound is a threshold ("from 2010" =
// 2010-and-later), not a value that must exist in the data, so free entry lets any
// year through, including decade edges the decade chips set that no game carries.
// min/max (from YEAR_MIN/YEAR_MAX, set in buildYearMenu) clamp what's committed.
// Rows with no numeric Original Year drop out while a bound is set (see apply()).
const yearMenu = document.getElementById('yearmenu');
const yearSummary = document.getElementById('yearsummary');
// prose form of the active range, reused by the summary and the no-match message
// (plain ASCII, no arrows). Empty string when no bound is set.
function yearLabel() {
  if (yearFrom == null && yearTo == null) return '';
  if (yearFrom != null && yearTo != null)
    return yearFrom === yearTo ? '' + yearFrom : yearFrom + '-' + yearTo;
  return yearFrom != null ? 'from ' + yearFrom : 'to ' + yearTo;
}
// single source of truth for the control's visible state after any change
function syncYear() {
  const lbl = yearLabel();
  // narrow drops the "Year:" prefix — the glow already marks it as an active
  // filter, and the range itself reads as years. yearLabel() is untouched: the
  // no-match message wraps it in its own prose.
  yearSummary.textContent = lbl ? (narrowMQ.matches ? lbl : 'Year: ' + lbl) : 'Year';
  yearSummary.classList.toggle('active', !!lbl);  // glow while a range is set, like a non-empty search box
  for (const x of yearMenu.querySelectorAll('.xclr'))
    x.hidden = (x.dataset.b === 'from' ? yearFrom : yearTo) == null;
  for (const c of yearMenu.querySelectorAll('.dchip')) {
    const s = +c.dataset.d;
    c.classList.toggle('on', yearFrom === Math.max(s, YEAR_MIN) && yearTo === Math.min(s + 9, YEAR_MAX));
  }
  const rst = yearMenu.querySelector('#yearreset');
  if (rst) rst.disabled = yearFrom == null && yearTo == null;
}
let yearMenuSig = null;  // the year set the menu was last built from
function buildYearMenu() {
  const years = [...new Set(DATA.map(d => +d.year).filter(Boolean))].sort((a, b) => a - b);
  if (!years.length) { document.getElementById('yeardd').hidden = true; return; }
  // same years = same menu: skip the innerHTML rebuild. This is what keeps a
  // live data swap from wiping a year the visitor is mid-typing (change only
  // fires on blur, so a half-typed value exists ONLY in the input's DOM state).
  const sig = years.join(',');
  if (sig === yearMenuSig) return;
  yearMenuSig = sig;
  YEAR_MIN = years[0]; YEAR_MAX = years[years.length - 1];
  // placeholder shows the data's span, recovering the one hint the old dropdown gave for free.
  // The value is stamped from state rather than left empty: on arrival there's no
  // range set so this is a no-op, but a live data swap rebuilds this menu under a
  // visitor who may have one, and blank boxes over a still-filtered table would lie.
  const row = (b, label, ph, val) =>
    '<div class="yearrow"><span class="ylbl">' + label + '</span>' +
    '<input type="number" inputmode="numeric" class="y' + b + '" min="' + YEAR_MIN +
      '" max="' + YEAR_MAX + '" step="1" placeholder="' + ph + '"' +
      (val == null ? '' : ' value="' + val + '"') + '>' +
    '<button type="button" class="xclr" data-b="' + b + '" title="Clear ' + label + '" hidden>x</button></div>';
  const decs = [];
  for (let d = Math.floor(YEAR_MIN / 10) * 10; d <= YEAR_MAX; d += 10) decs.push(d);
  const chips = '<div class="decades">' + decs.map(d =>
    '<button type="button" class="dchip" data-d="' + d + '">' + ('' + d).slice(2) + 's</button>').join('') + '</div>';
  yearMenu.innerHTML = row('from', 'From', YEAR_MIN, yearFrom) + row('to', 'To', YEAR_MAX, yearTo) + chips +
    '<button class="reset" id="yearreset">Reset</button>';
  syncYear();  // re-marks the summary, clear-x's and decade chips from the live state
}
// state-only reset (no apply/recenter) shared by the in-menu Reset and "Clear filters"
function resetYear() {
  yearFrom = yearTo = null;
  const f = yearMenu.querySelector('.yfrom'), t = yearMenu.querySelector('.yto');
  if (f) f.value = '';
  if (t) t.value = '';
  syncYear();
}
// delegated so the listeners survive buildYearMenu() rebuilding the innerHTML.
// change (not input) fires on blur/Enter/spinner, so a half-typed year like "2"
// never filters mid-keystroke.
yearMenu.addEventListener('change', e => {
  const inp = e.target.closest('input[type=number]');
  if (!inp) return;
  // clamp to the data's span and write it back, so an out-of-range or partial entry
  // can't set a bound the table could never match; blank leaves that end unset
  let v = inp.value === '' ? null : Math.round(+inp.value);
  if (v != null) v = Math.min(Math.max(v, YEAR_MIN), YEAR_MAX);
  inp.value = v == null ? '' : v;
  if (inp.classList.contains('yfrom')) yearFrom = v; else yearTo = v;
  syncYear(); apply(); recenterOpen();
});
yearMenu.addEventListener('click', e => {
  const x = e.target.closest('.xclr'), chip = e.target.closest('.dchip'), rst = e.target.closest('#yearreset');
  if (x) {
    if (x.dataset.b === 'from') { yearFrom = null; yearMenu.querySelector('.yfrom').value = ''; }
    else { yearTo = null; yearMenu.querySelector('.yto').value = ''; }
  } else if (chip) {
    const s = +chip.dataset.d;
    yearFrom = Math.max(s, YEAR_MIN); yearTo = Math.min(s + 9, YEAR_MAX);
    yearMenu.querySelector('.yfrom').value = yearFrom;
    yearMenu.querySelector('.yto').value = yearTo;
  } else if (rst) {
    resetYear();
  } else return;
  syncYear(); apply(); recenterOpen();
});

// --- "Genre" dropdown: multi-select filter over arcade genres, seeded from data ---
// The option list is the genres actually present in DATA (arcade rows carry a genre
// from MAME's catver.ini; everything else has none), ordered most-common-first with a
// per-genre row count, and rebuilt on load (buildGenreMenu) so genres added or retired
// upstream reflow automatically. Empty selection = no filter, exactly like Types.
const genreMenu = document.getElementById('genremenu');
const genreSummary = document.getElementById('genresummary');
let GENRE_COUNT = 0;  // distinct genres present, so "all checked" can read as "All Genres"
function syncGenreSummary() {
  // empty (= no filter) and every-genre-checked both read as "All Genres"; a partial
  // selection shows the count and glows, matching the Types dropdown.
  const partial = enabledGenres.size !== 0 && enabledGenres.size !== GENRE_COUNT;
  genreSummary.textContent = partial ? 'Genres (' + enabledGenres.size + ')'
    : (narrowMQ.matches ? 'Genres' : 'All Genres');
  genreSummary.classList.toggle('active', partial);
  const rst = genreMenu.querySelector('#genrereset');
  if (rst) rst.disabled = enabledGenres.size === 0;
}
function buildGenreMenu() {
  const counts = {};
  for (const d of DATA) if (d.genre) counts[d.genre] = (counts[d.genre] || 0) + 1;
  const genres = Object.keys(counts);
  if (!genres.length) { document.getElementById('genredd').hidden = true; return; }
  GENRE_COUNT = genres.length;
  // most-populated first; ties fall back to A-Z so the order is stable run to run
  genres.sort((a, b) => counts[b] - counts[a] || a.localeCompare(b));
  genreMenu.innerHTML = genres.map(g =>
    '<label><input type="checkbox" data-g="' + escA(g) + '"' +
    (enabledGenres.has(g) ? ' checked' : '') + '> ' + esc(g) +
    '<span class="gcount">' + counts[g] + '</span></label>').join('') +
    '<button class="reset" id="genrereset">Show all</button>';
  syncGenreSummary();
}
// delegated so the listeners survive buildGenreMenu() rebuilding the innerHTML
genreMenu.addEventListener('change', e => {
  const g = e.target.dataset.g;
  if (!g) return;
  if (e.target.checked) enabledGenres.add(g); else enabledGenres.delete(g);
  syncGenreSummary();
  apply();
  recenterOpen();  // adding/removing whole genres moves the selected row — follow it
});
// state-only reset (no apply/recenter) shared by the in-menu Reset and "Clear filters"
function resetGenres() {
  enabledGenres.clear();
  for (const cb of genreMenu.querySelectorAll('input')) cb.checked = false;
  syncGenreSummary();
}
genreMenu.addEventListener('click', e => {
  if (!e.target.closest('#genrereset')) return;
  resetGenres(); apply(); recenterOpen();
});
syncGenreSummary();  // initial state before data loads (reads "All Genres" / no glow)

// --- favorites control: filter toggle + housekeeping menu ---------------------
const favctl = document.getElementById('favctl');
const favToggle = document.getElementById('favtoggle');
const favdd = document.getElementById('favdd');
const favCopyBtn = document.getElementById('favcopy');
const favClearBtn = document.getElementById('favclearall');
function syncFavSummary() {
  // the count is the whole list, not what survives the current filters: it says
  // "this is what you've saved", which is a fact about you, not about the table
  const n = FAVS.size;
  favToggle.textContent = '★ ' + n;
  // never disable while it's the thing doing the narrowing (clearing the last
  // favorite switches the toggle off first, so the two can't deadlock)
  favToggle.disabled = n === 0 && !favOnly;
  favToggle.title = n === 0 ? 'Star an entry to save it here' : 'Show only favorites';
  favToggle.setAttribute('aria-pressed', favOnly);
  favctl.classList.toggle('active', favOnly);
  favCopyBtn.disabled = n === 0;
  favClearBtn.disabled = n === 0;
  // a wider count nudges the caret this menu is anchored under
  if (favdd.open) positionMenu(favdd);
}
favToggle.addEventListener('click', () => {
  favOnly = !favOnly;
  syncFavSummary(); apply(); recenterOpen();
});
// state-only reset (no apply/recenter), matching resetTypes/resetGenres/resetYear
function resetFavOnly() { favOnly = false; syncFavSummary(); }

// "Clear all favorites" arms on the first click and acts on the second. The other
// menus' resets only drop session filters; this one throws away saved data, and
// it sits one slip away from "Copy backup link".
let favClearArmed = false;
function disarmFavClear() { favClearArmed = false; favClearBtn.textContent = 'Clear all favorites'; }
favdd.addEventListener('toggle', () => { if (!favdd.open) disarmFavClear(); });
favdd.querySelector('.menu').addEventListener('click', e => {
  if (e.target.closest('#favcopy')) {
    navigator.clipboard.writeText(favURL()).then(
      () => showChip(favCopyBtn, 'Copied'),
      () => showChip(favCopyBtn, 'Copy failed'));   // insecure context / permission denied
    return;
  }
  if (e.target.closest('#favclearall')) {
    if (!favClearArmed) { favClearArmed = true; favClearBtn.textContent = 'Really clear all?'; return; }
    FAVS.clear(); favSave(); disarmFavClear();
    resetFavOnly();   // an empty favorites-only list is a dead end to strand anyone in
    syncFavSummary();
    if (openRow) syncFavStars(openRow);
    apply(); recenterOpen();   // rebuilds every row's star from the now-empty set
  }
});
syncFavSummary();  // a returning visitor's count is already known before data loads

// --- arriving on a ?fav= link ------------------------------------------------
// The param is read once, on load (see the data.json handler — it needs KEY2ROW
// to know which keys are real), and lives on screen as favView + the banner
// until it's adopted or dismissed. Either way the URL is cleaned up afterwards,
// so a refresh doesn't ask again and the address bar stops advertising a list
// that may no longer be what's on screen.
function stripFavParam() {
  // fav is the only query param this page has ever read, so dropping the whole
  // search string is safe; a second one would need a real URLSearchParams delete
  history.replaceState(history.state, '', location.pathname + location.hash);
}
function dismissFavView() {
  favView = null;
  document.getElementById('favbanner').hidden = true;
  stripFavParam();
}
document.getElementById('favadd').addEventListener('click', () => {
  for (const k of favView) FAVS.add(k);
  const saved = favSave();
  syncFavSummary();
  if (openRow) syncFavStars(openRow);
  dismissFavView();
  apply(); recenterOpen();
  if (!saved) showChip(favToggle, 'Could not save (private window?)');
});
document.getElementById('favdismiss').addEventListener('click', () => {
  dismissFavView(); apply(); recenterOpen();
});

// click outside closes any open dropdown (Types + Columns)
function closeDropdowns(except) {
  for (const dd of document.querySelectorAll('details.cols')) {
    if (dd.open && dd !== except) dd.open = false;
  }
}
// Capture phase so the dismiss click can be intercepted before it reaches its
// target. We only CONSUME it when it would otherwise open a results row (the
// original offender) — there the dismiss and the row-open would double up, and
// the row hover tint is already suppressed (body.dd-open) so the row looks
// inert. Every other control (sibling filters, Clear, sort headers, search)
// passes through, so one click both dismisses the open menu AND acts.
document.addEventListener('click', e => {
  const inside = e.target.closest('details.cols');
  if (!document.querySelector('details.cols[open]')) return;
  closeDropdowns(inside);
  if (!inside && e.target.closest('#rows tr')) { e.stopPropagation(); e.preventDefault(); }
}, true);

// While any filter dropdown is open, flag <body> so the CSS above drops the row
// hover tint (the click only dismisses the menu, so a hover cue would mislead).
// `toggle` fires whether the details opens via summary click or JS closeDropdowns.
function syncDdOpen() {
  document.body.classList.toggle('dd-open', !!document.querySelector('details.cols[open]'));
}
// Keep an opening menu inside the viewport. These dropdowns cluster at the right edge,
// so a menu anchored under its summary (left:0) can spill off-screen (Year/Genre/Columns
// were clipping). Align under the summary when it fits, else slide left just enough to
// clear the edge; measure + reposition synchronously so there's no visible jump.
// Vertically: the page never scrolls, so a menu running past the bottom edge would be
// unreachable (Genre/Columns on a phone) — cap its height to the room below it and let
// the menu scroll inside itself (overflow-y in the .menu CSS).
function positionMenu(dd) {
  const menu = dd.querySelector('.menu');
  if (!menu) return;
  menu.style.left = '';  // back to the CSS defaults before measuring
  menu.style.maxHeight = '';
  const margin = 8, dRect = dd.getBoundingClientRect(), mW = menu.offsetWidth;
  const vw = document.documentElement.clientWidth;
  let mLeft = dRect.left;                                   // default: aligned under the summary
  if (mLeft + mW > vw - margin) mLeft = vw - margin - mW;   // don't spill past the right edge
  if (mLeft < margin) mLeft = margin;                       // ...nor past the left edge
  menu.style.left = (mLeft - dRect.left) + 'px';
  const room = document.documentElement.clientHeight - menu.getBoundingClientRect().top - margin;
  if (menu.offsetHeight > room) menu.style.maxHeight = room + 'px';
}
for (const dd of document.querySelectorAll('details.cols'))
  dd.addEventListener('toggle', () => { syncDdOpen(); if (dd.open) positionMenu(dd); });

buildHeader();  // header renders immediately; rows follow once data.json loads

// --- detail panel ---
const panel = document.getElementById('panel');

// CRT slot mask over panel screenshots (mask.js, device-pixel accurate).
// Game shots also get a worn-tube blur along the scan axis (source-relative),
// and tate rows (.vert frames) rotate mask + blur together. System photos are
// masked but never blurred (they're photos of hardware, not tube content).
// Imgs mask as they load; the ResizeObserver re-renders (debounced) on panel
// resize/open.
const TUBE_BLUR = 1.25;  // user-tuned 2026-07-12
function maskShot(img) {
  if (!window.mzMask) return;
  let f = img.parentElement;
  if (img.classList.contains('sysphoto')) {
    // hardware photo: wrap once so the canvas has a positioned box to fill
    if (!f.classList.contains('sysframe')) {
      const w = document.createElement('div');
      w.className = 'sysframe';
      img.replaceWith(w);
      w.appendChild(img);
      f = w;
    }
    let cv = f.querySelector('canvas');
    if (!cv) { cv = document.createElement('canvas'); f.appendChild(cv); }
    if (!window.mzMask(img, cv, { fit: 'contain' })) cv.remove();
    return;
  }
  if (!f || !f.classList.contains('frame')) return;
  let cv = f.querySelector('canvas');
  if (!cv) { cv = document.createElement('canvas'); f.appendChild(cv); }
  if (!window.mzMask(img, cv, { fit: 'fill', blur: TUBE_BLUR,
                                rot: f.classList.contains('vert') })) cv.remove();
}
panel.addEventListener('load', e => {
  if (e.target.tagName === 'IMG') maskShot(e.target);
}, true);
let maskT;
new ResizeObserver(() => {
  clearTimeout(maskT);
  maskT = setTimeout(() => {
    panel.querySelectorAll('.frame img, .sysphoto').forEach(img => {
      if (img.complete && img.naturalWidth) maskShot(img);
    });
  }, 150);
}).observe(panel);

// One click-to-copy affordance for every copyable surface: the whole field is
// the button (see .cf in the CSS for why the ⧉ has to live inside it, not after
// it). `inner` is the field's own display HTML, which may deliberately differ
// from `v`, the value that lands on the clipboard: the Core row shows the pretty
// name and copies the raw rbf. `label` becomes the button's DESCRIPTION; its
// name is the content, which is what you want spoken.
const CI = '<span class="ci" aria-hidden="true">⧉</span>';
const cfield = (v, inner, label, cls) => '<button class="cf' + (cls ? ' ' + cls : '') +
  '" data-copy="' + escA(v) + '" title="' + escA(label) + '">' + inner + CI + '</button>';
// flat yellow lightning bolt (inline SVG, no icon-font dep) for the ZapScript field label
const ZAP_ICON = '<svg class="zapbolt" viewBox="0 0 24 24" aria-hidden="true"><path d="M7 2v11h3v9l7-12h-4l4-8z"/></svg>';

// --- Launch on MiSTer -------------------------------------------------------
// Talks to wizzo's mrext Remote service on the visitor's MiSTer (Scripts/
// remote.sh, port 8182): GET /api/l/<UNPADDED base64url payload> launches an
// absolute file path or a **system:<id> script (mrext's LaunchToken dialect —
// NOT ZapScript: launch.system is "unknown command" here, and padded base64
// is rejected). Bare /l/ must be avoided: the SPA serves every unknown route
// with a 200, which looks like success and launches nothing. A GET
// *navigation* is deliberately the transport — this https page may not
// fetch() an http LAN address (mixed content), but it may navigate to one, so
// the button window.open()s the URL and closes the tab a beat later. No
// response is readable (fire-and-forget); failures (missing file on the SD,
// device off) only flash their error text in the tab before it closes.
// Devices persist per-browser in localStorage (mz-misters / mz-mister-last).

// core/rbf name → mrext system id (pkg/games/systems.go), for non-arcade rows:
// launching a "system" loads that core. Arcade rows launch their .mra by path
// (d.mra) and don't use this. Cores absent here (no mrext id) get no button.
const MISTER_SYS = Object.fromEntries([
  // cores whose mrext system id matches the core name exactly
  ...('AcornAtom AcornElectron AliceMC10 Amstrad Apogee Aquarius Atari800 BBCMicro BK0011M ' +
      'C16 C64 CoCo2 EDSAC Galaksija Interact Jupiter Lynx48 MSX MSX1 MacPlus MultiComp ' +
      'Oric PCXT PDP1 PET2001 PMD85 QL RX78 SAMCoupe SordM5 Specialist TSConf ' +
      'TatungEinstein TomyTutor UK101 VIC20 X68000 ZX81 ZXNext ao486 ' +
      'AdventureVision Arcadia Astrocade Atari5200 Atari7800 AtariLynx ChannelF ' +
      'ColecoVision CreatiVision GBA Gamate Gameboy Genesis Intellivision Jaguar MegaCD ' +
      'NES NeoGeo Odyssey2 PSX PokemonMini SNES Saturn SuperVision TurboGrafx16 VC4000 ' +
      'Vectrex WonderSwan Arduboy Chip8').split(' ').map(s => [s, s]),
  // renames between MiSTer rbf names and mrext ids
  ...Object.entries({
    'Amstrad-PCW': 'AmstradPCW', 'Apple-I': 'AppleI', 'Apple-II': 'AppleII',
    'Casio_PV-2000': 'CasioPV2000', 'Laser310': 'Laser', 'Minimig': 'Amiga',
    'ORAO': 'Orao', 'Svi328': 'SVI328', 'TRS-80': 'TRS80', 'Ti994a': 'TI994A',
    'Vector-06C': 'Vector06C', 'ZX-Spectrum': 'ZXSpectrum',
    'CDi': 'CDI', 'Casio_PV-1000': 'CasioPV1000', 'GameAndWatch': 'GameNWatch',
    'GnW': 'GameNWatch', 'GameGear2P': 'GameGear', 'MegaDrive': 'Genesis',
    'N64': 'Nintendo64', 'S32X': 'Sega32X', 'SGB': 'SuperGameboy', 'SMS': 'MasterSystem',
  }),
]);
// what a row launches: arcade → its MRA's SD-card path; others → their system
const launchScript = d => d.base === 'Arcade'
  ? (d.mra ? '/media/fat/' + d.mra : null)
  : (MISTER_SYS[d.core] ? '**system:' + MISTER_SYS[d.core] : null);
// same row → its Zaparoo ZapScript token (to persist on an NFC tag / playlist,
// not launch live): arcade → the bare SD-relative .mra (Zaparoo auto-launch, no
// /media/fat/ prefix); others → **launch.system:<id> (ZapScript's dialect, vs
// mrext's **system: above). Same coverage gate; mrext ids double as Zaparoo ids.
const zapScript = d => d.base === 'Arcade'
  ? (d.mra || null)
  : (MISTER_SYS[d.core] ? '**launch.system:' + MISTER_SYS[d.core] : null);

let misters = [];
try { misters = JSON.parse(localStorage.getItem('mz-misters') || '[]') || []; } catch (e) {}
let lastMister = +localStorage.getItem('mz-mister-last') || 0;
if (lastMister >= misters.length) lastMister = 0;
const saveMisters = () => {
  localStorage.setItem('mz-misters', JSON.stringify(misters));
  localStorage.setItem('mz-mister-last', lastMister);
};

// URL-safe base64 of the UTF-8 bytes (MRA paths carry 'é', '&', apostrophes…)
const b64url = s => btoa(Array.from(new TextEncoder().encode(s), b => String.fromCharCode(b)).join(''))
  .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

function fireLaunch(dev, script, btn) {
  // small popup (not a full tab), pre-painted dark before it navigates to the
  // http:// LAN URL (top-level navigation is the only mixed-content-legal
  // transport; the Remote response page itself can't be styled or read).
  // 4s before auto-close: enough to read Remote's plain-text 500 on a miss.
  const w = window.open('', '_blank', 'popup,width=280,height=120');
  if (w) {
    try {
      w.document.write('<title>Launching…</title><body style="margin:0;display:grid;' +
        'place-items:center;height:100vh;background:#141414;color:#999;' +
        'font:13px system-ui">Launching on ' + dev.n.replace(/[<>&]/g, '') + '…</body>');
    } catch (e) {}
    w.location.replace('http://' + dev.h + '/api/l/' + b64url(script));
    setTimeout(() => { try { w.close(); } catch (e) {} }, 4000);
  }
  if (btn) {  // its own swap, not the copy fields' chip: this one names the device
    if (!btn.dataset.orig) btn.dataset.orig = btn.textContent;
    btn.classList.add('sent'); btn.textContent = 'Sent to ' + dev.n + ' ✓';
    setTimeout(() => { btn.classList.remove('sent'); btn.textContent = btn.dataset.orig; }, 1600);
  }
}

const launchRowHTML = () => {
  if (!misters.length)
    return '<button class="go" data-mi="-1">▶ Launch on MiSTer…</button>';
  // one Launch button per saved device (fires straight at it), + manager chevron
  return misters.map((m, i) =>
      '<button class="go" data-mi="' + i + '">▶ Launch on ' + esc(m.n) + '</button>').join('') +
    '<button class="more" aria-label="Manage MiSTers">▾</button>';
};
function updateLaunchRow() {
  const lr = panel.querySelector('.launchrow');
  if (lr) lr.innerHTML = launchRowHTML();
}

function detailHTML(d) {
  const rows = [['Type', typeLabel(d)]];
  if (d.genre) rows.push(['Genre', d.genre]);
  if (d.manufacturer) rows.push(['Manufacturer', d.manufacturer]);
  if (d.core) rows.push(['Core', cfield(d.core, esc(coreLabel(d.core)) +
    (coreLabel(d.core) !== d.core ? ' (' + esc(d.core) + ')' : ''), 'Copy core name'), true]);
  if (d.sn) rows.push(['ROM name', cfield(d.sn, '<span class="rom">' + esc(d.sn) + '</span>', 'Copy ROM name'), true]);
  if (d.year) rows.push(['Original year', esc(d.year) + agoSpan(yearAge(d.year)), true]);
  // arcade hardware metadata (MiSTer Arcade Database) — always shown here,
  // even when the matching table columns are toggled off. Provisional values
  // (mame2003-plus, pending the curated DB) render grayed with a "(provisional)" tag.
  const specRow = (label, key) => {
    if (!d[key]) return;
    if (d.prov && d.prov.includes(key))
      rows.push([label, '<span class="prov" title="' + PROV_TITLE + '">' +
        esc(d[key]) + ' <em>(provisional)</em></span>', true]);
    else
      rows.push([label, d[key]]);
  };
  specRow('Region', 'reg');
  specRow('Rotation', 'rot');
  // multi-monitor cabinets only (pipeline `scr` field); single screen is implied
  if (d.scr) rows.push(['Screens', d.scr === 3 ? 'Triple screen (3)' : 'Dual screen (2)']);
  specRow('Resolution', 'res');
  specRow('Players', 'plr');
  specRow('Controls', 'ctl');
  specRow('Special controls', 'spc');
  specRow('Screen flip', 'flip');
  // The label carries the debut-vs-fallback distinction, so the value doesn't
  // have to: a row reading "MiSTer release ... (MiSTer debut)" said MiSTer twice
  // to disambiguate from a case that no current row is in (every row in the data
  // is date_kind 'debut'). The 'build' arm is dormant, not dead — a non-arcade
  // core whose repo yields no release_date still lands there (misterzine.py).
  const debut = d.date_kind === 'debut';
  rows.push([debut ? 'MiSTer debut' : 'Latest build',
    esc(d.date) + agoSpan(relAge(d.date) + (debut ? '' : ' (debut unknown)')), true]);
  // 'Latest update' = newest shipped build (what update_all delivers);
  // 'Latest commit' = repo activity, which can run ahead of a shipped build
  if (d.updated) rows.push(['Latest update', esc(d.updated) + agoSpan(relAge(d.updated)), true]);
  if (d.act) rows.push(['Latest commit', esc(d.act) + agoSpan(relAge(d.act)), true]);
  // which downloader database delivers this entry via update_all
  if (d.src) rows.push(['Source', SRC_NAMES[d.src] || d.src]);
  // show the repo slug (jtcores deep links keep the full path in the href only)
  if (d.repo) rows.push(['Repository', '<a href="' + escA(repoURL(d)) + '" target="_blank" rel="noopener">' +
    '<span class="lbl">' + esc(d.repo.split('/').slice(0, 2).join('/')) + '</span><span class="ext">↗</span></a>', true]);
  if (d.deprecated) rows.push(['Status', 'Deprecated']);
  if (d.note) rows.push(['Note', d.note]);
  // Zaparoo ZapScript token for this row (copy to persist on an NFC tag /
  // playlist, then tap to launch) — same coverage as the Launch button: arcade
  // → bare .mra path, others → **launch.system:<id>. Rendered like Core/ROM
  // name: a monospace value in the shared click-to-copy field.
  const zap = zapScript(d);
  if (zap) rows.push(['ZapScript' + ZAP_ICON,
    cfield(zap, '<span class="rom zap">' + esc(zap) + '</span>',
      'Copy Zaparoo ZapScript (for NFC tags)'), true, true]);

  // a row's third element marks the value as pre-built HTML (links); the fourth
  // does the same for the label (used by the ZapScript row's inline bolt icon)
  const dl = '<dl>' + rows.map(([k, v, html, khtml]) =>
    '<dt>' + (khtml ? k : esc(k)) + '</dt><dd>' + (html ? v : esc(v)) + '</dd>').join('') + '</dl>';
  const prose = d.detail ? '<p class="detail">' + esc(d.detail) + '</p>' : '';
  // prefilled GitHub issue: the report arrives already saying which row it's
  // about (title/core/setname), so nobody has to describe "that one arcade game"
  const issueURL = 'https://github.com/matijaerceg/misterzine/issues/new?title=' +
    encodeURIComponent('[' + d.title + '] data problem') +
    '&body=' + encodeURIComponent('Title: ' + d.title + '\nCore: ' + d.core +
      (d.img ? '\nSetname: ' + d.img : '') + '\n\nWhat looks wrong:\n');
  const report = '<p class="report">Something wrong with this entry? <a href="' + escA(issueURL) +
    '" target="_blank" rel="noopener"><span class="lbl">Report a problem</span><span class="ext">↗</span></a></p>';
  // multi-monitor cabinets: N screens = N 4:3 CRTs side by side, so dual → 8:3
  // and triple → 12:3, driven by the pipeline's `scr` field (MAME desc + pins).
  // Precedence: (1) ASPECT_OVERRIDE escape hatch; (2) d.scr (dual/triple);
  // (3) the >= 2.4 dimension heuristic, kept as a net for a superwide shot on a
  // row missing `scr` (2.4 sits below the dual-screen cluster at 2.67+ but above
  // wide single screens like the PGM 448x224 games at 2.0, which stay 4:3);
  // (4) the MAD rotation column (d.rot) — the primary signal, right where a
  // raster's raw w/h misleads (square DECO Cassette games, TATE games in a
  // landscape raster, non-square pixels); (5) dimension fallback for the few
  // rows with no rotation. Keyed by setname (d.img) for the override.
  const aspect = d.img_h ? d.img_w / d.img_h : 1;
  const ratio = ASPECT_OVERRIDE[d.img] ||
    (d.scr === 3 ? '12 / 3'
      : d.scr === 2 ? '8 / 3'
      : aspect >= 2.4 ? '8 / 3'
      : d.rot ? (d.rot.startsWith('Vertical') ? '3 / 4' : '4 / 3')
      : (d.img_w > d.img_h ? '4 / 3' : '3 / 4'));
  // tate rows (however the ratio decision got there — MAD, override, or
  // dimension fallback) carry .vert so the CRT mask + tube blur rotate with
  // the monitor
  const shots = (d.img_slots || []).map(s =>
    '<div class="frame' + (ratio === '3 / 4' ? ' vert' : '') + '" style="aspect-ratio:' + ratio + '">' +
    '<img loading="lazy" src="../images/' + s + '/' + escA(d.img) + '.png" alt="' + escA(s) + '"></div>'
  ).join('');
  // console/computer rows: hardware photo instead of screenshots, with a
  // Commons attribution caption (required for the CC BY-SA photos)
  let sysphoto = '';
  if (!d.img && SYSTEM_IMGS.has(d.core)) {
    sysphoto = '<img class="sysphoto" loading="lazy" src="../images/systems/' + escA(d.core) + '.png" alt="">';
    const cr = SYSTEM_CREDITS[d.core];
    if (cr && cr.file) {
      // artist is HTML from Commons extmetadata (links, entities) — reduce it
      // to plain text with an inert DOMParser, then esc() re-escapes below
      const artist = (new DOMParser().parseFromString(cr.artist || '', 'text/html')
        .documentElement.textContent || '').trim() || 'Wikimedia Commons';
      sysphoto += '<p class="syscredit">photo: <a href="https://commons.wikimedia.org/wiki/File:' +
        escA(cr.file) + '" target="_blank" rel="noopener">' + esc(artist) + '</a>' +
        (cr.license ? ' · ' + esc(cr.license) : '') + '</p>';
    }
  }

  // overlay (very narrow/tall) mode: no keyboard, no resizer — swipe is the only gesture
  const overlay = window.matchMedia('(max-aspect-ratio: 3/5)').matches;
  const hint = overlay
    ? '<p class="hint"><em>Swipe or Back to close</em></p>'
    : '<p class="hint"><kbd>↑</kbd> <kbd>↓</kbd> browse rows · drag the edge to resize · <kbd>Esc</kbd> to close</p>';

  // screenshots first so they own the viewport on open; derived detail text below.
  // .body scrolls; .hint is docked below it (built as a sibling, outside .body).
  // launchable rows get the Launch-on-MiSTer split button under the title;
  // the script rides along as a data attribute so the click handler needs no row lookup
  const script = launchScript(d);
  const launcher = script
    ? '<div class="launchrow" data-script="' + escA(script) + '">' + launchRowHTML() + '</div>'
    : '';

  // the title doubles as the permalink's copy field (it has no text of its own
  // to sit beside), so a keyless row falls back to the bare title
  const titleHTML = '<span class="gametitle">' + esc(d.title) + '</span>' +
    (d.year ? ' <span style="color:var(--muted);font-weight:normal">(' + esc(d.year) + ')</span>' : '');
  // the star rides AFTER the copy field, never inside it: nesting a button in a
  // button is invalid, and the page-wide .cf handler would copy on every star
  // press (why after and not before: see the #panel h2 .fav CSS)
  return '<div class="body"><button class="close" aria-label="Close">×</button>' +
    '<h2>' + (d.k ? cfield(rowURL(d), titleHTML, 'Copy link to this entry') + favBtnHTML(d) : titleHTML) + '</h2>' +
    launcher + sysphoto + shots + dl + prose + report + '</div>' + hint;
}

function openPanel(d, fromHistory) {
  if (!d) return;
  openRow = d;
  // the MiSTer device popover anchors to the outgoing panel DOM — drop it
  if (metapopFor === 'mister') closePop();
  panel.innerHTML = detailHTML(d);
  // always open at the top — re-assert after the reveal reflow too, since a
  // same-frame layout (or a touch that opened the panel) can nudge it
  const body = panel.querySelector('.body'); if (body) body.scrollTop = 0;
  panel.scrollTop = 0;
  requestAnimationFrame(() => { if (body) body.scrollTop = 0; });
  panel.hidden = false;
  // force a reflow so the off-screen start position is committed before the
  // transition; otherwise the display:none→block toggle swallows the slide-in
  void panel.offsetWidth;
  document.body.classList.add('panel-open');
  markOpenRow();
  // history/Back navigations (and the initial #hash open) must not write
  // history themselves — the entry they came from already carries the hash
  if (!fromHistory) pushPanelState();
}

function closePanel() {
  hideChip();  // a viewport-pinned chip would outlive the field it points at
  if (metapopFor === 'mister') closePop();  // don't leave the device popover floating
  document.body.classList.remove('panel-open');
  // openRow is deliberately kept: the row stays highlighted after the panel
  // closes as a "you were here" marker (re-orientation aid, esp. after the
  // fullscreen overlay on mobile). Cleared only by opening another row.
  const onEnd = () => { panel.hidden = true; panel.removeEventListener('transitionend', onEnd); };
  panel.addEventListener('transitionend', onEnd);

// EASTER EGG: the ZapScript token takes a jolt of current when you touch it, and
// another when you copy it. Keyframes are minted per fire (Web Animations, not a
// CSS @keyframes) so no two jolts share a shape — a fixed @keyframes replays the
// identical twitch every time and stops reading as noise. steps(1, end) is the
// other half: it holds each frame and snaps to the next, so the token stutters
// between positions instead of gliding between them. Relative offsets only, so
// the panel's grid never reflows around it.
//
// It has to be left/top on a position:relative token, NOT transform: the token
// is a plain inline box, where transforms paint not one pixel. The obvious fix
// for that — inline-block — is what used to orphan the copy affordance onto a
// line of its own, because a shrink-to-fit box claims the whole value column and
// leaves nothing after it anywhere to sit. Relative positioning, unlike
// transform, does apply to an inline box.
//
// Displacement ONLY, and short hops (12 of them in 240ms, ~50/sec). Rotation is
// what separates a buzz from a wobble: rock the token even a degree and it reads
// as something soft flapping, not something rigid with current through it. Same
// reason the amplitude is equal on both axes and barely 2px — a stiff vibration
// is fast and tight, so it stays legible while it happens.
//
// The easing MUST sit on the keyframes, not in the options object. In options it
// is the EFFECT easing, which quantizes the whole iteration's progress rather
// than each hop: steps(1) there pins progress at 0 for the full duration, so the
// token holds frame one ('none') and lands on the last ('none') having animated
// flawlessly between two identical values. It looks exactly like a dead egg.
function zapJolt(el) {
  if (!el) return;
  el.getAnimations().forEach(a => a.cancel());  // hover-then-click restarts, never stacks
  const j = () => ((Math.random() * 2 - 1) * 1.9).toFixed(2) + 'px';
  const frames = [{ left: '0px', top: '0px' }];
  for (let i = 0; i < 11; i++) frames.push({ left: j(), top: j() });
  frames.push({ left: '0px', top: '0px' });
  frames.forEach(f => f.easing = 'steps(1, end)');  // per-hop: hold, then snap
  el.animate(frames, { duration: 240 });
}

//
// mouseover, not mouseenter: the panel is re-rendered per row, so the handler has
// to be delegated, and mouseenter doesn't bubble. The relatedTarget guard is what
// makes "anywhere" fire ONCE: it's scoped to the field, not the token, so crossing
// from the text to the ⧉ (or to the field's empty half) is travel WITHIN the same
// control and must not re-fire. Only entering from outside the field counts.
panel.addEventListener('mouseover', e => {

  if (fromBottom) rows.reverse();

  // under the sticky header row don't count, so the top boundary is the header's
  // bottom edge rather than the scroller's own top.

function applyTheme(t) {
  if (!THEMES.includes(t)) t = 'dark';
  document.documentElement.setAttribute('data-theme', t);
  themeBtns.forEach(b => b.setAttribute('aria-pressed', b.dataset.set === t));
  // summary wears the active fun theme's name (and its pressed look); when a
  // base theme is active it reverts to the neutral "Theme" label
  const fun = themeBtns.find(b => b.dataset.set === t && themeDD.contains(b));
  themeSum.textContent = fun ? fun.textContent : 'Theme';
  themeSum.classList.toggle('on', !!fun);
}
// Picking a theme deliberately leaves the menu OPEN (like the filter dropdowns):
// themes apply live, so the list doubles as a preview you click through. The
// summary label + pressed state already confirm the pick. Outside-click and
// Escape still close it via the shared details.cols handlers — including the
// Light/Dark buttons, which sit outside the menu.
themeBtns.forEach(b => b.addEventListener('click', () => {
  localStorage.setItem('mz-theme', b.dataset.set);
  applyTheme(b.dataset.set);
}));
// The switcher floats right, so its width IS its left edge: letting the summary
// resize to each theme's name would shove the Light/Dark buttons -- and the open
// menu, which is anchored to the group and only positioned once, on open --
// sideways under the cursor mid-pick. So freeze the summary at its widest label.
// Measured off the live DOM rather than tuned, so a new theme still needs only
// its button + theme.css block; re-run once webfonts land, since the fallback
// font's metrics differ from Roboto's.
function lockThemeSummary() {
  const prevText = themeSum.textContent, prevOn = themeSum.classList.contains('on');
  themeSum.style.minWidth = '';  // measure the natural widths, not the last lock
  let max = 0;
  // Weight is load-bearing: .on renders the label at 600, and a fun theme's name
  // is ONLY ever shown in that state, so measuring it unbolded under-reserves by
  // ~1px and the longest name -- the one that has to fit -- is what overflows.
  const measure = (label, on) => {
    themeSum.textContent = label;
    themeSum.classList.toggle('on', on);
    max = Math.max(max, themeSum.getBoundingClientRect().width);
  };
  measure('Theme', false);  // the neutral label only ever shows unbolded
  for (const b of themeBtns) if (themeDD.contains(b)) measure(b.textContent, true);
  themeSum.textContent = prevText;
  themeSum.classList.toggle('on', prevOn);

}

// Relative "X ago" for the Last-updated stamp. Fine-grained under a day; a day
// or more falls back to an absolute short date (see the render comment for why).
function relUpdated(dt) {
  const min = Math.round((Date.now() - dt.getTime()) / 60000);
  if (min < 1) return 'just now';
  if (min < 60) return min + (min === 1 ? ' minute ago' : ' minutes ago');
  const hr = Math.round(min / 60);
  if (hr < 24) return hr + (hr === 1 ? ' hour ago' : ' hours ago');
  return dt.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
}

// "Updated" stamp — meta.json.updated is bumped by export-web only when the
// served data actually changes (see _write_site_meta), so this date/time is stable
// across no-op rebuilds. Stored as an ISO minute-precision UTC string.
//
// Re-called after a live data swap so the stamp keeps describing the rows on
// screen. Re-writing this innerHTML is safe for the meta-line popovers below:
// they're delegated from the document and keyed on element ids, not bound to
// the elements this replaces.
let metaDt = null;   // date behind the relative label; a swap moves it
function stampMeta(m) {
  const el = document.getElementById('updated');
  if (!el || !m.updated) return;
  const dt = new Date(m.updated);
  const valid = !isNaN(dt);
  metaDt = valid ? dt : null;
  // exact stamp lives in the hover/focus tooltip (title); the visible text is
  // relative ("2 hours ago"). Past a day we switch BACK to an absolute date so a
  // quiet news week reads as "last shipped Jul 11", not "3 days ago" = neglect
  // (meta.updated only bumps when data actually changes, so it legitimately sits
  // still on no-op rebuilds).
  const full = valid ? dt.toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
    timeZoneName: 'short'  // viewer's tz (e.g. "GMT+2") so the exact time is clearly local
  }) : m.updated;
  const label = valid ? relUpdated(dt) : m.updated;
  el.innerHTML = '<span class="upd-stamp">Updated: <span id="updated-rel" title="' + esc(full) + '">' + esc(label) + '</span></span>' +
    ' <a href="#" class="note" id="pub-note"><span class="lbl">Public cores only, no alternatives</span><span class="ext">ⓘ</span></a>' +
    ' <a href="feed.xml" class="note" id="rss-link"><span class="lbl">RSS</span><span class="ext">ⓘ</span></a>' +
    ' <a href="https://misterzine.goatcounter.com/" target="_blank" rel="noopener"><span class="lbl">Traffic Stats</span><span class="ext">↗</span></a>' +
    ' <a href="https://github.com/matijaerceg/misterzine/blob/main/CHANGELOG.md" target="_blank" rel="noopener"><span class="lbl">Changelog (GitHub)</span><span class="ext">↗</span></a>' +
    ' <a href="https://discord.com/channels/647909397477195803/1524449604354052166" target="_blank" rel="noopener" id="discord-link"><span class="lbl">Discord</span><span class="ext">↗</span></a>' +
    ' <a href="../" class="zinelink">Zine Home</a>';
}
// keep a left-open tab honest: refresh the relative label on a slow tick and
// whenever the tab regains focus, so "2 minutes ago" doesn't silently rot.
// Armed once, outside stampMeta: a re-stamp must not stack a second interval.
function tickMeta() {
  const s = document.getElementById('updated-rel');
  if (s && metaDt) s.textContent = relUpdated(metaDt);
}
setInterval(tickMeta, 60000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) tickMeta(); });

// Touch has no hover, so there a tap toggles the popover instead.
const FEED_LIST = [
  ['All changes', 'feed.xml'],

  ['Updates only', 'feed-updates.xml'],
];
const PUB_NOTE_HTML =

  'rss-link': () =>

};
const META_SEL = '#discord-link, #rss-link, #pub-note';
// The NEW badges borrow this same chrome, but as pointer triggers only: they're

// and on touch a tap in that cell belongs to the row's detail panel.
const HOVER_SEL = META_SEL + ', td .nb';

let hoverPop = null, hoverPopFor = null;   // hoverPopFor: the trigger element

}

// Everything the page does with a data.json — the arrival load and a live swap
// run this same path, which is what makes swapping cheap and safe: apply()
// re-derives the view from module state, so the visitor's sort, search and
// filters all survive without any reconciling of their own.
function ingest(d) {
  DATA = d;
  // index cores that map to exactly one title, so single-game cores read as
  // the game name without hard-coding each (see coreLabel / CORE_NAMES).
  const seen = {};
  for (const r of DATA) {
    if (!r.core) continue;
    if (!(r.core in seen)) seen[r.core] = r.title;
    else if (seen[r.core] !== r.title) seen[r.core] = null;  // more than one distinct title
  }
  // both maps are rebuilt, not merged: a core that has just gained a second
  // title must LOSE its sole-title entry, and a row that's gone must leave
  // KEY2ROW or its stale object would still answer deep links
  for (const c in coreSoleTitle) delete coreSoleTitle[c];
  for (const c in seen) if (seen[c]) coreSoleTitle[c] = seen[c];
  for (const k in KEY2ROW) delete KEY2ROW[k];
  for (const r of DATA) if (r.k) KEY2ROW[r.k] = r;
  // a swap replaces every row object, and the open row is tracked by identity
  // (see render) — re-point it at its replacement or the highlight silently
  // dies under an open panel. A row that's gone keeps its old object.
  if (openRow && openRow.k) openRow = KEY2ROW[openRow.k] || openRow;
  buildYearMenu();
  buildGenreMenu();
  buildHeader();
  apply();
}

// A ?fav= list in the arrival URL: show it before adopting it. Keys that no
// longer name a row are dropped without comment — the point of the link is the
// rows it can still show, and a retired core isn't the visitor's problem.
// Arrival-only (called once, after the first ingest): a live data swap must not
// re-read the URL and re-announce a banner the visitor may have dismissed.
function adoptFavParam() {
  const favParam = new URLSearchParams(location.search).get('fav');
  if (!favParam) return;
  const keys = favParam.split(',').map(decodeURIComponent).filter(k => KEY2ROW[k]);
  if (keys.length) {
    favView = new Set(keys);
    document.getElementById('favbannermsg').textContent =
      'Viewing a favorites link (' + keys.length + (keys.length === 1 ? ' entry)' : ' entries)');
    // nothing to add when it's already your own list (the common case: your
    // own backup link, opened on a device that's caught up)
    document.getElementById('favadd').hidden = keys.every(k => FAVS.has(k));
    document.getElementById('favbanner').hidden = false;
    apply();  // favView narrows the view, and the first ingest already rendered
  } else {
    stripFavParam();  // nothing usable in it; don't announce a link with no rows
  }
}

// --- live updates --------------------------------------------------------
// The data republishes on a cron (mirrored from .github/workflows/update.yml —
// keep the two in step); a quiet run publishes nothing at all. So rather than
// poll, we look a few times after each slot, plus whenever a left-open tab
// comes back to the front. Nothing is ever claimed from the clock alone: only a
// real meta.json hash mismatch does anything, and only a diff worth mentioning
// says anything.
const CRON_HOURS = [0, 6, 12, 18], CRON_MIN = 12;  // "12 0,6,12,18 * * *" UTC
const CHECK_OFFSETS = [5, 15, 30, 45];             // minutes past a slot to look
const REFOCUS_MIN = 5;                             // throttle for the refocus backstop
let currentHash = null;      // hash of the data.json now on screen
let lastCheck = Date.now();  // the page just loaded, so it starts current
let checking = false;
let booted = false;          // the arrival data.json has rendered

// Soonest slot+offset moment ahead of `now`. The candidates are generated in
// strictly ascending order (offsets never reach the next 6-hour slot), so the
// first one ahead wins — and the day+1 pass means there always IS one, even at
// 23:59 (tomorrow's 00:17).
function nextCheckAt(now) {
  for (let day = 0; day <= 1; day++)
    for (const h of CRON_HOURS)
      for (const off of CHECK_OFFSETS) {
        const t = Date.UTC(now.getUTCFullYear(), now.getUTCMonth(), now.getUTCDate() + day, h, CRON_MIN) + off * 60000;
        if (t > now.getTime()) return t;
      }
}
function armNextCheck() {
  // a background tab throttles this timer, which only ever delays a check —
  // the refocus backstop covers the visitor who comes back before it fires
  setTimeout(() => { check(); armNextCheck(); }, Math.max(1000, nextCheckAt(new Date()) - Date.now()));
}

function check() {
  // never before the arrival rows are up: there is nothing to update yet, and
  // a swap against an empty table would announce the whole database as news
  if (checking || !booted) return Promise.resolve();
  checking = true;
  lastCheck = Date.now();
  // cache-busted: GitHub Pages serves meta.json with a 10-minute max-age, which
  // is longer than the gaps in the ladder above
  return fetch('./meta.json?t=' + Date.now(), { cache: 'no-store' })
    .then(r => r.json())
    .then(m => {
      // null currentHash (the arrival meta fetch failed) counts as a mismatch:
      // we can't vouch for what's on screen, so fetch and diff — the noise
      // filter keeps a rows-identical result silent, and the swap adopts the
      // hash either way. Blindly adopting it here instead would silently skip
      // any publish that landed since arrival.
      if (!m.hash || m.hash === currentHash) return;
      // keyed on the new hash so no cache anywhere can hand back the copy we have
      return fetch('./data.json?v=' + encodeURIComponent(m.hash), { cache: 'no-store' })
        .then(r => r.json())
        .then(d => swapIn(d, m));
    })
    // offline, a mid-deploy 404, half-written json: nothing to do, and nothing
    // to say to the visitor. The next check picks it up.
    .catch(() => {})
    .finally(() => { checking = false; });
}
window.mzCheck = check;  // hook for testing a swap without waiting for a publish

// What just landed, phrased for the pill, or '' if there's nothing a visitor
// would care about. Compares against the rows on screen (KEY2ROW) — this
// answers "what changed just now", where the divider answers "what's new since
// you last looked".
function diffNews(d) {
  const fresh = [], built = [];
  for (const r of d) {
    if (!r.k) continue;
    const old = KEY2ROW[r.k];
    if (!old) fresh.push(r.title);
    else if ((old.updated || '') !== (r.updated || '')) built.push(r.title);
  }
  if (!fresh.length && !built.length) return '';
  // both kinds at once: counts only. Naming two sets in one pill is a mouthful,
  // and the divider is about to show exactly which rows they are.
  if (fresh.length && built.length) return fresh.length + ' new, ' + built.length + ' updated';
  const names = fresh.length ? fresh : built;
  const noun = fresh.length ? ' new: ' : ' updated: ';
  // a Jotego wave rebuilds dozens of cores at once, so the tail is always capped
  const rest = names.length - Math.min(names.length, 3);
  return names.length + noun + names.slice(0, 3).join(', ') + (rest ? ' +' + rest + ' more' : '');
}

// Keep the visitor's place when rows appear above them. At the very top we
// deliberately don't: rows visibly arriving there is the whole point.
function captureAnchor() {
  const wrap = document.querySelector('.tablewrap');
  if (wrap.scrollTop <= 0) return null;
  const i = firstVisibleRowIdx();
  const d = i >= 0 ? view[i] : null;
  const tr = i >= 0 ? document.querySelector('#rows tr[data-i="' + i + '"]') : null;
  if (!d || !d.k || !tr) return null;
  return { wrap, k: d.k, top: tr.getBoundingClientRect().top };
}
function restoreAnchor(a) {
  if (!a) return;
  const i = view.findIndex(x => x.k === a.k);
  if (i < 0) return;  // the anchor row itself is gone; leave the scroll alone
  const tr = document.querySelector('#rows tr[data-i="' + i + '"]');
  if (tr) a.wrap.scrollTop += tr.getBoundingClientRect().top - a.top;
}

function swapIn(d, m) {
  const prev = DATA;
  try {
    // diffNews INSIDE the try: unknown-shaped data throws right here, and this
    // is the very failure the catch below exists to surface
    const news = diffNews(d);
    const anchor = captureAnchor();
    ingest(d);
    stampMeta(m);
    restoreAnchor(anchor);
    currentHash = m.hash;
    bankSeen(d);  // seen next visit; the divider still fences them off for this one
    // a leftover failure pill is moot now — this swap just succeeded
    if (pillErr) hidePill();
    // Noise filter: the hash also moves for things the table doesn't show (a
    // fresh commit stamp behind the panel's "Latest commit", say). Those swap in
    // silently — a pill that cries about nothing teaches people to ignore it.
    if (news) showPill(news, scrollTableTop);
  } catch (e) {
    // this page's JS meeting a data shape it doesn't know (the site itself was
    // redeployed under the tab). Don't limp on half-swapped state: put the rows
    // that were rendering fine a moment ago back, and offer the reload that
    // actually fixes things — cache-busted, keeping any open deep link.
    try { ingest(prev); } catch (e2) {}
    showPill('Site updated, refresh for the latest', () => {
      location.href = location.pathname + '?v=' + encodeURIComponent(m.hash) + location.hash;
    }, true);
  }
}

// The notice itself: neutral chrome, dismissible, and it never moves the page
// on its own — clicking it is what takes you to the new rows.
const pill = document.getElementById('newspill');
let pillAction = null, pillErr = false;  // pillErr: showing the failure variant
function showPill(text, action, isErr) {
  pillAction = action;
  pillErr = !!isErr;
  pill.querySelector('.txt').textContent = text;
  pill.classList.add('on');
}
function hidePill() { pill.classList.remove('on'); pillAction = null; pillErr = false; }
pill.addEventListener('click', e => {
  const act = e.target.closest('.x') ? null : pillAction;
  hidePill();
  if (act) act();
});

// Backstop for the tab that was left open or slept: the ladder's timer may have
// been throttled to uselessness or missed the slot entirely, so re-check on the
// way back in. pageshow covers a bfcache restore, which fires no visibilitychange.
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && Date.now() - lastCheck > REFOCUS_MIN * 60000) check();
});
window.addEventListener('pageshow', e => {
  if (e.persisted && Date.now() - lastCheck > REFOCUS_MIN * 60000) check();
});

// Arrival: meta first, then data KEYED TO META'S HASH. The two files are
// separate 10-minute cache entries, so fetched independently they can be a
// mismatched pair — a fresh meta.json with a still-cached pre-publish
// data.json. Recording that meta's hash against those rows would blind every
// later check until the NEXT publish moves the hash again. Keying the data URL
// to the hash makes the pair atomic (a new hash is a new URL, so no cache has
// it), and costs one tiny request's latency before the big one. A stale cached
// meta gives the matching stale data: consistent, and the ladder's cache-busted
// checks catch the real state minutes later.
fetch('./meta.json').then(r => r.json()).catch(() => null).then(m => {
  if (m) { currentHash = m.hash || null; stampMeta(m); }
  return fetch('./data.json' + (m && m.hash ? '?v=' + encodeURIComponent(m.hash) : ''));
}).then(r => r.json()).then(d => {
  initSeen(d);  // before ingest: render() fences the unseen rows off on this first paint
  ingest(d);
  booted = true;
  adoptFavParam();  // a ?fav= link in the arrival URL (needs KEY2ROW, so after ingest)
  // deep link: a #key in the arrival URL opens that row's panel. fromHistory —
  // the entry we arrived on already IS the panel state (in overlay mode Back
  // correctly leaves the site, i.e. returns where the visitor came from).
  // Unknown/stale keys are ignored silently.
  const hit = KEY2ROW[decodeURIComponent(location.hash.slice(1))];
  if (hit) { openPanel(hit, true); recenterOpen(); }
  armNextCheck();
});
</script>
</body>
</html>
