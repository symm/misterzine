<script>/* apply saved theme before first paint to avoid a flash */

<link rel="stylesheet" href="../theme.css"><!-- palette tokens for all themes; render-blocking on purpose so tokens exist before first paint -->
<style>
  /* self-hosted variable fonts (latin subset) — one file per family covers
     every weight in use (400 body, 600 badges, 700 headings/th). swap keeps
     the system-ui fallback readable while they load. */
  @font-face { font-family: Roboto; src: url(../fonts/roboto-latin-var.woff2) format('woff2');
               font-weight: 100 900; font-display: swap; }
  @font-face { font-family: 'Roboto Condensed'; src: url(../fonts/roboto-condensed-latin-var.woff2) format('woff2');
               font-weight: 100 900; font-display: swap; }
  @font-face { font-family: 'Permanent Marker'; src: url(../fonts/permanent-marker-latin.woff2) format('woff2');
               font-weight: 400; font-display: swap; }
  /* all palette values (color-scheme, --bg/--surface/--fg, --accent, the type
     hues, status colors, shadow/watermark tokens) live in ../theme.css — the
     single source of truth for every theme. This block speaks only in tokens. */
  * { box-sizing: border-box; }
  /* app shell: the page itself never scrolls — .tablewrap is the only scroll
     container. This keeps the fixed detail panel and every native scroll
     behavior (scrollbars, scrollIntoView, find-in-page) framed to the table
     region instead of the full viewport. */
  html, body { height: 100%; overflow: hidden; }
  body { font: 14px/1.4 Roboto, system-ui, sans-serif; margin: 0; cursor: default;
         background: var(--bg); color: var(--fg); }
  /* app-shell cursor: arrow everywhere (text stays selectable, just without
     the I-beam), except links and the search field — cursor inherits, so both
     need their intent restored explicitly */
  a { cursor: pointer; }
  input { cursor: text; }
  input[type=checkbox] { cursor: pointer; }  /* toggles, not text entry */
  main { height: 100vh; height: 100dvh; display: flex; flex-direction: column; padding: 0 1rem; }
  /* full-bleed: negative margins cancel main's 1rem side padding (padding
     re-adds it inside), so the surface band runs to the viewport edges —
     otherwise themes where --surface differs from --bg show the page ground
     as odd gutters beside the topbar */
  .topbar { flex: none; position: relative; z-index: 20; background: var(--surface);
            margin: 0 -1rem; padding: 0 1rem; }
  header { margin: 0; padding: 1rem 0 0; }
  h1 { font-family: 'Roboto Condensed', Roboto, system-ui, sans-serif; font-size: 1.25rem; font-weight: 600; margin: 0 0 .25rem; }
  /* the whole title is the "home" link: click anywhere on it to drop a deep-link
     #hash and return to the clean /releases/ URL. Roboto Condensed 600, one colour
     throughout (full white/black), never underlined; the URL leads, then a dash +
     tagline. The break-legal space in the markup supplies the gap before the dash,
     and the .nb halves keep the URL from breaking mid-address.

     The URL is split into two nowrap halves around a <wbr> so the ONE legal break
     inside it is at the slash: the theme switcher floats right, shortening the
     first line boxes, and a single nowrap URL that no longer fits beside the float
     doesn't wrap -- it overflows UNDER it. How much room is left depends on the
     current theme's name width, so this must adapt rather than be tuned. Keep the
     nowrap on .nb, not on .site: a <wbr> inside a nowrap parent is honoured
     inconsistently across browsers. Browsers don't break URLs at "/" on their own,
     hence the explicit <wbr>. */
  h1 a.titlelink { color: inherit; text-decoration: none; }
  h1 .site .nb { white-space: nowrap; }
  /* flex-wrap (not inline links + margin) so that when the meta line breaks,
     the links on the 2nd+ lines sit flush against the left edge of the line
     above instead of inheriting a leading indent. column-gap gives every item
     the same spacing; the "Updated: <time>" prefix is one item via .upd-stamp. */
  .updated { color: var(--muted); font-size: .8rem; margin: 0; min-height: 1.1em; display: flex; flex-wrap: wrap; align-items: baseline; column-gap: .6rem; row-gap: .15rem; }
  .updated .upd-stamp { white-space: nowrap; }
  .updated a { color: inherit; text-decoration: none; text-underline-offset: 2px; white-space: nowrap; }
  .updated a:hover { color: var(--accent); }
  /* underline the .lbl span, never the anchor, so the line stops at the last
     letter instead of running under the ↗/ⓘ glyph as a detached stub (the
     two-span pattern is documented at .ext). Also what keeps the Zine Home
     sticker underline-free: no .lbl, no line. */
  .updated a .lbl { text-decoration: underline; }
  /* dotted underline (+ ⓘ) marks the meta-line popover triggers ("Public
     cores only", "RSS") — they open an in-page popover, unlike the solid
     underline + ↗ links, which navigate away */
  .updated .note .lbl { text-decoration: underline dotted; }
  /* the zine link is the one meta-line entry we want noticed. It tilts on hover
     and holds the tilt until you leave, like a sticker peeled up at one corner.
     Transformable only because .updated is a flex container: that blockifies its
     children, so this <a> takes a transform an ordinary inline one would ignore. */
  .updated a.zinelink { color: var(--accent); font-family: 'Permanent Marker', Roboto, system-ui, sans-serif; font-weight: 400; font-size: 1.2em;
                        transform-origin: 50% 65%; transition: transform .18s cubic-bezier(.2, .8, .3, 1); }
  .updated a.zinelink:hover, .updated a.zinelink:focus-visible { transform: rotate(-5deg) scale(1.07); }
  .legend { color: var(--muted); font-size: .8rem; margin: .25rem 0 0; }
  .controls { display: flex; flex-wrap: nowrap; gap: .5rem; align-items: center; margin: 0; padding: .6rem 0 .7rem; }
  /* the filter cluster grows to fill the row; the search field grows within it to
     take up the slack (dropdowns sit to its right), and it wraps to the left of the
     tally column pinned on its right */
  .filters { display: flex; flex-wrap: wrap; gap: .5rem; align-items: center;
             flex: 1 1 auto; min-width: 0; }
  /* thin divider; flex:none keeps it (and the Columns pref after it) from ever
     wrapping, so Columns stays pinned to the far right no matter how filters wrap */
  .ctrlsep { flex: none; align-self: center; width: 1px; height: 1.5rem; background: var(--hair); }
  /* the divider before Columns spans the full row height (stretches down with any
     wrapped filter rows); Columns itself top-aligns with the filters, not centered */
  .ctrlsep.tall { align-self: stretch; height: auto; }
  #cols { flex: none; align-self: flex-start; }
  /* the search box carries its own inline clear-x, so it lives in a relative wrapper
     that takes the grow-to-fill role the bare input used to have */
  .searchwrap { position: relative; display: flex; flex: 1; min-width: 16rem; }
  input[type=search] { padding: .4rem .6rem; flex: 1; min-width: 0; padding-right: 1.7rem; }
  /* suppress the browser's native search clear-x so it doesn't double up with .qx */
  input[type=search]::-webkit-search-cancel-button { -webkit-appearance: none; appearance: none; }
  /* small x inside the search box, shown only while the box has text — the same
     "clear one field" idiom as the Year From/To fields' .xclr */
  .qx { position: absolute; right: .15rem; top: 50%; transform: translateY(-50%);
        border: none; background: none; padding: 0 .4rem; font: inherit; font-size: 1.05rem;
        line-height: 1; color: var(--muted); cursor: pointer; visibility: hidden; }
  .qx:hover { color: var(--accent); }
  #q:not(:placeholder-shown) ~ .qx { visibility: visible; }
  /* a non-empty search box (placeholder hidden = something typed) gets accent
     styling so an active filter — easy to trigger via type-anywhere — is obvious */
  /* active-filter chrome takes the optional secondary highlight where a
     theme defines one (falls back to the accent everywhere else) */
  input[type=search]:not(:placeholder-shown) {
    border-color: var(--accent2, var(--accent));
    background: color-mix(in srgb, var(--accent2, var(--accent)) 10%, var(--surface)); }
  select, input[type=search] { font-family: inherit; font-size: .9rem; border: 1px solid var(--hair); border-radius: 4px; background: transparent; color: inherit; }
  select { padding: .4rem; }
  /* the tally always stacks onto two lines ("1025" over "of 1025"): the second
     line ("of " + the fixed total) is always the wider of the two, so the column
     width is constant and the filter cluster no longer shifts as the count changes */
  .count { color: var(--muted); font-size: .8rem; flex: none; white-space: nowrap; align-self: flex-start;
           display: flex; flex-direction: column; line-height: 1.15; text-align: right; }
  /* "Clear filters" is an ACTION, not a status, so it gets a warmer, heavier
     treatment than the blue active-filter glow: amber fill + amber border +
     amber text reads as "press me to undo", and the distinct hue keeps it from
     being mistaken for a fourth active filter. Theme-aware via color-mix. */
  button.clear { font: inherit; font-size: .9rem; padding: .4rem .7rem; cursor: pointer;
                 border-radius: 4px;
                 border: 1px solid color-mix(in srgb, var(--reset) 65%, var(--fg));
                 background: color-mix(in srgb, var(--reset) 20%, var(--surface));
                 color: color-mix(in srgb, var(--reset) 72%, var(--fg)); }
  button.clear:not(:disabled):hover { background: color-mix(in srgb, var(--reset) 32%, var(--surface)); }
  /* always present, but grayed + inert until a filter is actually narrowing the
     list (JS toggles [disabled]); the amber above is the "armed" state */
  button.clear:disabled { border-color: var(--hair); background: transparent; color: var(--muted); cursor: default; }
  /* "Columns" dropdown: opt-in arcade metadata columns (default all off) */
  details.cols { position: relative; }
  details.cols summary { list-style: none; cursor: pointer; user-select: none; font-size: .9rem;
                         padding: .4rem .7rem; border: 1px solid var(--hair); border-radius: 4px; }
  details.cols summary::-webkit-details-marker { display: none; }
  details.cols summary::after { content: " ▾"; color: var(--muted); }
  details.cols summary:hover, details.cols[open] summary { background: var(--hover-bg); }
  /* a Types/Year filter that's narrowing results tints its summary with the same
     accent as a non-empty search box, so an active filter stays obvious with the
     menu closed (Columns is a display pref, not a filter, so it never glows) */
  details.cols summary.active { border-color: var(--accent2, var(--accent));
                                background: color-mix(in srgb, var(--accent2, var(--accent)) 10%, var(--surface)); }
  details.cols summary.active:hover, details.cols[open] summary.active {
                                background: color-mix(in srgb, var(--accent2, var(--accent)) 18%, var(--surface)); }
  details.cols .menu { position: absolute; top: calc(100% + 4px); left: 0; z-index: 30;
                       background: var(--surface); border: 1px solid var(--hair); border-radius: 6px;
                       padding: .55rem .8rem; box-shadow: 0 4px 16px #0004;
                       display: grid; gap: .35rem; min-width: 10rem;
                       /* the page itself never scrolls, so a menu taller than the viewport
                          (Genre on a phone) scrolls inside itself instead; the max-height
                          cap is set per-open by positionMenu() */
                       overflow-y: auto; overscroll-behavior: contain; scrollbar-width: thin; }
  details.cols .menu label { display: flex; gap: .45rem; align-items: center;
                             font-size: .9rem; white-space: nowrap; cursor: pointer; }
  /* per-genre row count, pushed to the right edge and dimmed so the genre name leads */
  details.cols .menu label .gcount { margin-left: auto; padding-left: .9rem;
                                     opacity: .55; font-variant-numeric: tabular-nums; }
  /* reset-to-default entry at the bottom of each menu, sized to match the
     checkbox rows; dimmed when the menu is already at its default state */
  details.cols .menu .reset { border: none; background: none; padding: .1rem 0; margin: .1rem 0 0;
                              font: inherit; font-size: .9rem; text-align: left; white-space: nowrap;
                              color: var(--accent); cursor: pointer; }
  details.cols .menu .reset:hover:not(:disabled) { text-decoration: underline; }
  details.cols .menu .reset:disabled { opacity: .4; cursor: default; }
  /* "Year" dropdown: From/To numeric range inputs + one-tap decade chips. Inputs
     (not selects) so any boundary year is enterable, including decade edges like
     2010/2019 that no game in the data happens to carry; the per-field x shows
     only when that bound is set (mirrors the search Clear button). */
  /* favorites control: a filter toggle welded to a details.cols menu, built like
     the header's theme toggle (segments inside one bordered group) but sized to
     sit in the filter row. Growing counts push right into the row's own gap, so
     unlike the theme summary this needs no measured width lock — just a floor
     wide enough that 0->9 doesn't twitch, and tabular digits so 10->11 doesn't. */
  .favctl { display: inline-flex; align-self: center; border: 1px solid var(--hair); border-radius: 4px; }
  .favctl > button { font: inherit; font-size: .9rem; padding: .4rem .55rem;
                     border: 0; border-radius: 3px 0 0 3px; background: transparent; color: inherit;
                     cursor: pointer; min-width: 3.4em; text-align: center;
                     font-variant-numeric: tabular-nums; }
  .favctl > button:disabled { color: var(--muted); cursor: default; }
  .favctl > button:not(:disabled):hover { background: var(--hover-bg); }
  .favctl details.cols summary { border: 0; border-left: 1px solid var(--hair);
                                 border-radius: 0 3px 3px 0; padding: .4rem .45rem; }
  /* narrowing state wears the same accent as the other filters' summaries; it's
     the group that glows, since the border is the group's, not the segment's */
  .favctl.active { border-color: var(--accent2, var(--accent)); }
  .favctl.active > button { background: color-mix(in srgb, var(--accent2, var(--accent)) 10%, var(--surface)); }
  .favctl.active > button:hover { background: color-mix(in srgb, var(--accent2, var(--accent)) 18%, var(--surface)); }
  /* sized and ruled off like the Columns menu's footnote (.colnote) */
  .favctl .menu .favnote { margin: .35rem 0 0; padding-top: .4rem; border-top: 1px solid var(--rule);
                           font-size: .78rem; line-height: 1.35; color: var(--muted);
                           max-width: 15rem; white-space: normal; }
  /* the ?fav= arrival banner, in the topbar's flow directly above the table it's
     describing (the topbar is flex:none, so it simply shortens the scroller) */
  .favbanner[hidden] { display: none; }   /* the display below outranks the UA's [hidden] rule */
  .favbanner { display: flex; flex-wrap: wrap; align-items: center; gap: .5rem;
               margin: 0 0 .7rem; padding: .5rem .7rem; font-size: .9rem;
               border: 1px solid var(--accent2, var(--accent)); border-radius: 6px;
               background: color-mix(in srgb, var(--accent2, var(--accent)) 10%, var(--surface)); }
  .favbanner button { font: inherit; font-size: .85rem; padding: .3rem .55rem; cursor: pointer;
                      border: 1px solid var(--hair); border-radius: 4px;
                      background: var(--surface); color: inherit; }
  .favbanner button:hover { background: var(--hover-bg); }
  #favdismiss { margin-left: auto; }
  .yearrow { display: flex; align-items: center; gap: .4rem; }
  .yearrow .ylbl { width: 2.6rem; color: var(--muted); font-size: .9rem; }
  .yearrow input[type=number] { flex: 1; min-width: 0; font-family: inherit; font-size: .9rem;
                   padding: .4rem; border: 1px solid var(--hair); border-radius: 4px;
                   background: transparent; color: inherit; }
  .yearrow input[type=number]:focus { border-color: var(--accent); outline: none; }
  /* strip the native spin buttons: inconsistent across browsers and cramped in this narrow field */
  .yearrow input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .yearrow input[type=number]::-webkit-inner-spin-button,
  .yearrow input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  .yearrow .xclr { border: none; background: none; padding: 0 .2rem; font: inherit;
                   line-height: 1; color: var(--muted); cursor: pointer; }
  .yearrow .xclr:hover { color: var(--accent); }
  .decades { display: flex; flex-wrap: wrap; gap: .3rem; margin: .1rem 0; }
  .decades .dchip { font: inherit; font-size: .8rem; padding: .15rem .4rem; cursor: pointer;
                    border: 1px solid var(--hair); border-radius: 4px; background: transparent; color: inherit; }
  .decades .dchip:hover { background: var(--hover-bg); }
  .decades .dchip.on { border-color: var(--accent2, var(--accent));
                       background: color-mix(in srgb, var(--accent2, var(--accent)) 18%, var(--surface)); }
  /* separate (not collapse): collapsed borders are painted by the table, so they
     don't travel with the sticky <th>s — rows show through 1px seams while scrolling.
     With separate+spacing:0 each cell owns its border and it sticks along with it. */
  table { border-collapse: separate; border-spacing: 0; width: 100%; table-layout: fixed; }
  /* col widths are computed in JS from the COLUMNS config (they re-balance when
     columns are toggled) — see buildHeader() */
  /* min-width keeps columns from crushing; .tablewrap owns BOTH scroll axes
     (the page never scrolls), so the sticky <th> anchor to it and an over-wide
     table scrolls inside the table region only. min-height:0 is load-bearing:
     without it the flex child refuses to shrink below its content height and
     nothing scrolls — and it must hold on BOTH .tablezone and .tablewrap
     (either level without it re-breaks the shrink chain). .tablezone exists
     only to anchor the scroll-hint shadow overlays: the scroller itself can't
     host them (absolute children would scroll along with the content). */
  /* the -1rem side margins cancel main's padding so the table region (its
     scrollbars, the fade hints, and every row's background) bleeds to both
     edges of the column; the topbar above keeps its 1rem inset. Cell padding
     keeps text off the glass — and the first column re-adds the full 1rem
     (see td:first-child) so its text still lines up with the h1 above. */
  .tablezone { position: relative; flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column;
               margin-left: -1rem; margin-right: -1rem; }
  .tablewrap { flex: 1 1 auto; min-height: 0; overflow: auto; }
  /* floating scrollbars: browsers whose native element scrollbars are classic
     (they reserve a blank rail between table and viewport edge — Chrome on
     Windows; overflow:overlay is gone since 114 and fluent OVERLAY bars are
     not author-controllable) get the native bars hidden and replaced by these
     floating auto-hiding thumbs, drawn/synced by syncScrollHints and gated by
     the .custom-sb JS feature-detect. Browsers that already float their bars
     (Firefox on Win11) keep the native ones: no .custom-sb, none of this. */
  body.custom-sb .tablewrap { scrollbar-width: none; }
  body.custom-sb .tablewrap::-webkit-scrollbar { display: none; }
  .sb-thumb { position: absolute; z-index: 16; border-radius: 4px; touch-action: none;
    background: color-mix(in srgb, var(--fg) 40%, transparent);
    opacity: 0; transition: opacity .25s; }
  .sb-thumb.v { right: 2px; width: 7px; }
  .sb-thumb.h { bottom: 2px; height: 7px; }
  /* visible while scrolling (sb-show, timer-dropped after a beat), while
     hovered (an invisible thumb still hit-tests, so brushing the edge reveals
     it — how real overlay bars behave), and while being dragged */
  .tablezone.sb-show .sb-thumb, .sb-thumb:hover, .sb-thumb.drag { opacity: 1; }
  .sb-thumb:hover, .sb-thumb.drag { background: color-mix(in srgb, var(--fg) 60%, transparent); }
  /* horizontal scroll hints (classes toggled by syncScrollHints): a fade at the
     right edge while more columns sit off-screen, and a shadow cast by the
     sticky Title column once scrolled, so content visibly slides under it.
     Shadows stay BLACK in every theme (a text-color-based one turns into a
     white glow on dark, which reads as light, not depth) — dark themes just
     need more opacity to register against a near-black background.
     --hint-shadow is set per theme in theme.css. */
  /* --hint-r-w / --hint-l-w are set per scroll event by syncScrollHints: full
     width normally, tapering to 0 as its edge of the scroll range approaches,
     so each hint shrinks away instead of blinking off.
     No width transition — the per-scroll updates ARE the animation. */
  /* --sbw/--sbh (measured scrollbar thickness) inset the overlays so the
     shadows shade the content only, not the scrollbars themselves */
  .tablezone::after { content: ""; position: absolute; top: 0; right: var(--sbw, 0px); bottom: var(--sbh, 0px);
    width: var(--hint-r-w, 28px);
    pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 15;
    background: linear-gradient(to left, var(--hint-shadow), transparent); }
  .tablezone.more-r::after { opacity: 1; }
  /* the left shadow is one continuous overlay too (a per-cell box-shadow gets
     sliced by the row borders); --titlew = the sticky Title column's right
     edge, measured by syncScrollHints (it moves with panel/window resizes) */
  .tablezone::before { content: ""; position: absolute; top: 0; bottom: var(--sbh, 0px); left: var(--titlew, 0px);
    width: var(--hint-l-w, 12px); pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 15;
    background: linear-gradient(to right, var(--hint-shadow), transparent); }
  .tablezone.more-l::before { opacity: 1; }
  /* Floating pills over the table: "Scroll to top" (top right, revealed by the
     .scrolled class whenever the list is more than about a row from the top)
     and the "new data landed" notice (bottom centre, shown after a live swap
     brought in rows worth mentioning). One shared neutral chrome — --surface +
     border, like the topbar buttons; an accent-colored pill floating over the
     rows was too loud — so the two can never drift apart per theme.
     The notice anchors to the BOTTOM, where a toast belongs: the news itself
     arrives at the top of the list under the default sort, and a notice up
     there lands squarely on the one row it's telling you about (on a phone it
     covers that row's title outright). Down at the bottom it clears .totop's
     corner too, and --sbh (measured by syncScrollHints) keeps it off the
     horizontal scrollbar. */
  .totop, .newspill { position: absolute; z-index: 17;
    font: inherit; font-size: .8rem;
    border: 1px solid var(--hair); border-radius: 999px;
    background: color-mix(in srgb, var(--fg) 7%, var(--surface)); color: inherit; box-shadow: 0 2px 8px #0003; }
  .totop:hover, .newspill:hover { background: color-mix(in srgb, var(--fg) 14%, var(--surface)); }
  .totop { top: calc(var(--theadh, 2.2rem) + .6rem); right: .9rem; cursor: pointer;
    padding: .45rem .85rem;
    opacity: 0; pointer-events: none; transition: opacity .15s; }
  .tablezone.scrolled .totop { opacity: 1; pointer-events: auto; }
  .newspill { bottom: calc(var(--sbh, 0px) + .8rem); left: 50%; transform: translateX(-50%);
    display: none; align-items: center; gap: .35rem; max-width: calc(100% - 2rem);
    padding: .35rem .45rem .35rem .85rem; }
  .newspill.on { display: flex; }
  .newspill .txt { cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .newspill .x { flex: none; cursor: pointer; border: 0; background: none; color: var(--muted);
    font: inherit; font-size: .95rem; line-height: 1; padding: .1rem .3rem; }
  .newspill .x:hover { color: var(--accent); }
  /* Full-width message rows in the tbody — the "new since your last visit"
     divider and the "no matches" message. Both undo the row/cell chrome
     (sticky first cell, hover tint), and both pin their inner div to the
     scrollport's left edge, capped at the viewport width, so the text stays
     on-screen when the table is wider than it. */
  tr.newsplit td, tr.nomatch td { position: static; border-right: 0; }
  tr.newsplit:hover td, tr.nomatch:hover td { background: none; }
  tr.newsplit .msg, tr.nomatch .msg { position: sticky; left: 0; max-width: calc(100vw - 1rem);
    color: var(--muted); }
  /* the divider: a small uppercase label with the rule running out from it
     (render only emits the row under the default Last Updated sort, where "the
     top of the list" and "the new stuff" are the same set) */
  tr.newsplit td { border-bottom: 0; padding: 0; }
  tr.newsplit .msg { display: flex; align-items: center; gap: .5rem; padding: .3rem .6rem;
    font-size: .68rem; letter-spacing: .05em;
    text-transform: uppercase; white-space: nowrap; }
  tr.newsplit .msg::after { content: ""; flex: 1; height: 1px;
    background: color-mix(in srgb, var(--accent) 55%, transparent); }
  tr.nomatch .msg { text-align: center; padding: 2.5rem .5rem; }
  tr.nomatch .msg b { font-weight: 600; color: var(--fg); }
  tr.nomatch .msg .esc { font-size: .85em; margin-top: .35rem; display: block; }
  table { min-width: 49rem; }
  th, td { text-align: left; padding: .35rem .6rem; border-bottom: 1px solid var(--rule); vertical-align: top;
           overflow-wrap: break-word; }
  th { position: sticky; top: 0; z-index: 10; background: var(--surface); cursor: pointer; user-select: none;
       overflow-wrap: normal;  /* headers wrap at spaces, never mid-word */
       border-top: 1px solid var(--rule); }  /* a divider so the header row reads apart from the filters above */
  /* the sorted column's header is marked by the accent color on its label +
     arrow alone (no background fill). The space before the arrow is a NO-BREAK
     one: a plain space lets the arrow wrap to a second line at the min-width
     floor, which re-talls the whole sticky header exactly when a column is
     sorted (i.e. always — the default sort is Last Updated). */
  th[aria-sort] { color: var(--accent2, var(--accent)); }
  th[aria-sort=ascending]::after { content: "\00a0\2191"; }
  th[aria-sort=descending]::after { content: "\00a0\2193"; }
  /* every column after Title is condensed — denser metadata, more room for titles */
  th + th, td + td { font-family: 'Roboto Condensed', Roboto, system-ui, sans-serif; }
  .badge { display: inline-block; padding: .05em .5em; border-radius: 10px; font-size: .82em;
           font-weight: 600; white-space: nowrap; line-height: 1.5;
           background: color-mix(in srgb, var(--h) 20%, var(--bg));
           color: color-mix(in srgb, var(--h) 72%, var(--fg)); }
  .t-arcade   { --h: var(--type-arcade); }
  .t-console  { --h: var(--type-console); }
  .t-computer { --h: var(--type-computer); }
  .t-other    { --h: var(--type-other); }
  /* Core Type icons (Lucide, ISC): colour-coded via the same --h hue as the
     old badges, icon-only. The hue is mixed toward var(--fg) so it stays
     vivid yet legible on both the light and dark table grounds. */
  .tico { display: inline-flex; align-items: center; vertical-align: middle;
          color: color-mix(in srgb, var(--h) 80%, var(--fg)); }
  .tico svg { width: 1rem; height: 1rem; }
  td .dep { color: var(--muted); font-size: .82em; margin-left: .35rem; }
  /* NEW badge: our own pill, where the NEW emoji it replaces was a fixed blue
     that ignored every theme. Outlined in --accent, which is already vetted
     against the surface in each theme, so there's no second fill/text token to
     keep legible; age fades the whole pill via an inline opacity. */
  td .nb { display: inline-block; margin-left: .35rem; padding: 0 .25rem;
           border: 1px solid var(--accent); border-radius: .2rem;
           color: var(--accent); font-size: .6em; font-weight: 700;
           letter-spacing: .04em; line-height: 1.5; vertical-align: middle;
           white-space: nowrap; }
  td.core { color: var(--fg); font-size: .92em; cursor: default; }
  /* repo links keep the column's muted look; underline only on hover */
  td.core a { color: var(--accent); text-decoration: none; }
  td.core a:hover .lbl { text-decoration: underline; }
  /* Glyph-tailed links are two spans: <a><span class=lbl>label</span><span
     class=ext>↗</span></a>. The .ext glyph is plain inline text, NOT inline-block:
     an atomic inline gets a break opportunity on BOTH sides, which stranded the
     glyph alone on a line of its own wherever a link's label can wrap — the
     panel's Repository row did it at the default panel width. As inline text it's
     class AL and can't part from the word before it, so a long slug breaks at one
     of its hyphens instead. The underline lives on .lbl, never on the anchor: an
     anchor-level underline also runs under the glyph and the gap before it as a
     detached stub, and a descendant can't cancel an inherited underline, so
     `text-decoration: none` here on .ext would be a decoy. */
  .ext { color: var(--muted); margin-left: .25rem; font-size: .85em; }
  /* floated (not flexed) top-right so the title/meta text lines shorten beside
     the buttons and flow full-width beneath them instead of wrapping early */
  /* no overflow:hidden (it would clip the absolute theme menu); the group's
     rounded ends are re-applied to the first/last segments instead */
  .theme { float: right; display: inline-flex; margin-left: 1rem;
           border: 1px solid var(--hair); border-radius: 6px; }
  .theme button { font: inherit; font-size: .78rem; padding: .3rem .6rem; border: 0; background: transparent; color: inherit; cursor: pointer; }
  .theme > button:first-child { border-radius: 5px 0 0 5px; }
  .theme button + button { border-left: 1px solid var(--hair); }
  .theme button[aria-pressed="true"] { background: var(--rule); font-weight: 600; }
  /* the fun-theme dropdown: a details.cols (so it inherits the shared
     outside-click close + viewport-fit positioning), restyled as the third
     segment of the toggle. The summary shows the active fun theme's name. */
  /* flex + auto margin pins the caret to the segment's right edge: the summary is
     frozen at its widest label (see lockThemeSummary), so a left-hugging caret
     would wander inside that fixed box as the active theme's name changes. */
  .theme details.cols summary { border: 0; border-left: 1px solid var(--hair); border-radius: 0 5px 5px 0;
                                font-size: .78rem; padding: .3rem .6rem;
                                display: flex; align-items: center; }
  .theme details.cols summary::after { content: " \25BE"; color: var(--muted); margin-left: auto; padding-left: .4em; }
  .theme details.cols summary.on { background: var(--rule); font-weight: 600; }
  /* the menu itself keeps the shared details.cols .menu chrome (same box as
     the Columns dropdown); only its buttons need styling of their own */
  .theme .menu button { font-size: .85rem; text-align: left; padding: .3rem .5rem;
                        border: 0; border-radius: 4px; white-space: nowrap;
                        display: flex; align-items: center; gap: .5em; }
  /* each theme's pair of preview dots (the two colours that theme declares as
     its preview: base first, signature second); the second dot is a box-shadow
     copy of the first. The colours (--sw1/--sw2) come from the preview-colour
     table in theme.css, so no literals live here. */
  .theme .menu button::before { content: ""; flex: 0 0 auto; width: .7em; height: .7em;
                                margin-right: .95em; border-radius: 50%; background: var(--sw1);
                                box-shadow: .95em 0 0 var(--sw2); }
  .theme .menu button:hover { background: var(--hover-bg); }
  td.date { white-space: nowrap; font-variant-numeric: tabular-nums; }
  /* :where() adds the "no dropdown open" guard at zero specificity cost, so the
     hover/open precedence below is unchanged. While a filter dropdown is open a
     click on the table only dismisses it (never opens a row), so the hover tint
     would be lying about clickability — suppress it via body.dd-open. */
  :where(body:not(.dd-open)) tr:hover td { background: var(--row-hover); }
  .build { color: var(--muted); }
  /* provisional spec cells (mame2003-plus, pending the curated Arcade Database) */
  td.prov, .prov { color: var(--muted); font-style: italic; }
  .prov em { font-style: normal; opacity: .7; font-size: .85em; }
  /* "8 years ago" trailing a panel date. Dimmed like .prov but deliberately NOT
     .prov: that italic means "this value is uncertain", which an age never is. */
  .ago { color: var(--muted); margin-left: .4rem; }
  .colnote { margin: .5rem .1rem 0; padding-top: .5rem; border-top: 1px solid var(--rule);
             font-size: .8rem; line-height: 1.35; color: var(--muted); max-width: 15rem; }
  .colnote .prov { font-style: italic; }
  /* every row opens the detail panel (arrow cursor on purpose: rows are
     app-style select targets, not links — the hover tint signals clickability) */
  tr.open td { background: color-mix(in srgb, var(--accent) 20%, transparent); }
  /* Title column pins to the scroller's left edge. It needs its own opaque
     paint: row backgrounds don't travel with a sticky cell, and the hover/open
     tints above are translucent — content scrolling beneath would bleed
     through — so the :first-child overrides remix them opaquely over --bg
     (they also need the extra specificity to beat `tr:hover td`/`tr.open td`). */
  td:first-child { position: sticky; left: 0; z-index: 2; background: var(--bg); }
  th:first-child { left: 0; z-index: 11; }  /* corner cell: sticks both axes, above the other th */
  td:first-child, th:first-child { border-right: 1px solid var(--rule); }
  /* 1.7rem: 1rem re-absorbs the table's full-rem bleed past main's padding
     (.tablezone) — which used to put this column's text exactly on the h1's
     edge — and the extra .7rem airs out the favorites star gutter (user-picked
     over the alignment; the star was wedged against the viewport edge at 1rem) */
  td:first-child, th:first-child { padding-left: 1.7rem; }
  :where(body:not(.dd-open)) tr:hover td:first-child { background: color-mix(in srgb, var(--line) 7%, var(--bg)); }
  tr.open td:first-child  { background: color-mix(in srgb, var(--accent) 20%, var(--bg)); }
  /* the favorites star lives in the 1.7rem gutter above, absolutely positioned
     against the sticky cell: out of flow, so revealing it on hover moves no
     title text and costs the column no width. Full row height, so it's a target
     you can hit without aiming. Hidden (not absent) when idle — visibility
     keeps the box measured, and a favorited star stays lit on every device. */
  /* --accent, not the --accent2 the filter glows use: a lit star is a solid glyph
     that has to hold its own against the row, and accent2 is a highlight tint —
     in Pink it lands at 2.1:1 on the row. --accent is what the page already
     trusts on --bg (links, panel titles) and clears 3:1 in all 17 themes. */
  td:first-child .fav { position: absolute; left: .4rem; top: 0; bottom: 0; width: 1rem;
                        display: flex; align-items: center; justify-content: center;
                        border: 0; padding: 0; background: none; font-size: .9rem; line-height: 1;
                        color: var(--muted); cursor: pointer; visibility: hidden; }
  td:first-child .fav.on { visibility: visible; color: var(--accent); }
  /* matches the row-hover tint's own guard: while a menu is open the click only
     dismisses it, so offering a star to press would be a lie */
  @media (hover: hover) {
    :where(body:not(.dd-open)) #rows tr:hover td:first-child .fav { visibility: visible; }
    td:first-child .fav:hover { color: var(--accent); }
  }

  /* --- detail panel: slides in from the left --- */
  #panel { position: fixed; top: 0; left: 0; height: 100vh; height: 100dvh; width: var(--pw, round(calc(100vw / 3), 1px));
           transform: translateX(-100%); transition: transform .28s ease;
           overflow: hidden; z-index: 100; background: var(--surface); display: flex; flex-direction: column;
           border-right: 1px solid var(--hair);
           touch-action: pan-y; }
  body.panel-open #panel { transform: translateX(0); }
  #panel[hidden] { display: none; }
  #panel .body { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 1rem; scrollbar-width: none; -ms-overflow-style: none; }
  #panel .body::-webkit-scrollbar { display: none; }
  #panel .close { position: sticky; top: 0; float: right; font-size: 1.4rem; line-height: 1;
                  border: 0; background: transparent; color: inherit; cursor: pointer; padding: .1rem .3rem; }
  #panel h2 { font-size: 1.1rem; margin: 0 1.5rem .5rem 0; }
  /* the game title itself (year + copy-link sit beside it at h2's own size).
     Condensed 700 rather than the marker face: these are humanized MAME descs,
     the longest and most punctuation-heavy strings on the site, and the marker
     is a single-weight handwriting face that wraps and scans badly at that
     length. It also stays the zine's voice (wordmark, Zine Home link) by NOT
     appearing on every row here. Accent colour still shows off the palette. */
  #panel h2 .gametitle { font-family: 'Roboto Condensed', Roboto, system-ui, sans-serif; font-weight: 700; font-size: 1.35rem;
                         color: var(--accent); }
  #panel dl { margin: 0 0 1rem; display: grid; grid-template-columns: max-content 1fr; gap: .15rem .6rem; font-size: .85rem; }
  #panel dt { color: var(--muted); }
  #panel dd { margin: 0; }
  /* the Repository row link: same .lbl-only underline as every glyph-tailed link */
  #panel dd a { text-decoration: none; }
  #panel dd a .lbl { text-decoration: underline; }
  /* MAME setnames read best monospaced (table cells and the panel row) */
  .rom { font-family: ui-monospace, Consolas, monospace; font-size: .95em; }
  td.rom { white-space: nowrap; }
  /* --- click-to-copy fields ------------------------------------------------
     Every copyable surface (the panel's value rows, the title's permalink, the
     RSS feed rows) is a real <button> wrapping its own content, so the whole
     field is the hit target and the keyboard/AT behaviour comes from the
     element. But the reason it's shaped this way is the ⧉. A <button> is an
     atomic inline to the line breaker, and a break is ALWAYS allowed before
     one: as a sibling after a long ZapScript path it dropped onto a line of its
     own. As a plain inline <span> INSIDE the button it's just class-AL text and
     can't part from the word before it (UAX#14 LB28 AL x AL; LB30 CP x AL
     covers the Core row's trailing paren).
     No aria-label anywhere: the content is the accessible name (the setname,
     the game title) and title is the description. An aria-label would replace
     them, erasing the game title from the h2's heading.
     Padding + equal negative margin cushions the hover tint without moving one
     pixel of text or shifting a single wrap point: a one-sided bleed would
     leave padding inside the box and wrap the text early. content-box (against
     the page-wide border-box) is what makes that cancel out for free — the
     content stays exactly the column's width whatever padding a variant picks.
     The explicit width is NOT redundant: a <button> shrink-to-fits even at
     display:block, which left the empty half of a short field unclickable. */
  .cf { font: inherit; line-height: inherit; color: inherit; text-align: left;
        background: none; border: 0; border-radius: 4px; cursor: pointer;
        display: block; user-select: text;
        box-sizing: content-box; width: 100%;
        padding: .1rem .3rem; margin: -.1rem -.3rem; }
  .cf:hover { background: color-mix(in srgb, var(--line) 7%, var(--surface)); }
  .cf:focus-visible { outline: 2px solid var(--accent); outline-offset: 0; }
  .cf .ci { color: var(--muted); font-size: .85em; margin-left: .35rem; user-select: none; }
  .cf:hover .ci, .cf:focus-visible .ci { color: inherit; }
  /* the title's field hugs the title rather than banding the whole line: the h2
     is the only place a full-width tint would run under the sticky × */
  #panel h2 .cf { display: inline-block; width: auto; max-width: calc(100% + .8rem);
                  padding: .15rem .4rem; margin: -.15rem -.4rem; }
  #panel h2 .ci { font-size: .8em; }   /* quiet next to the title, not a loud pill */
  /* the panel's star: the touch device's only way to favorite, so it's a real
     target here rather than the row's 1rem hint. It TRAILS the title — leading
     it looks like the table's convention, but the copy field is an atomic
     inline-block, so a wrapping title would leave a leading star stranded on a
     line of its own above everything. Trailing, that same wrap drops the star
     into the action row beside Launch, which still reads as furniture. The
     margin looks large because the copy field pulls .4rem toward it (negative
     margin above). */
  #panel h2 .fav { font: inherit; font-size: 1.2rem; line-height: 1; vertical-align: baseline;
                   border: 0; padding: 0; margin-left: .75rem; background: none;
                   color: var(--muted); cursor: pointer; }
  #panel h2 .fav.on, #panel h2 .fav:hover { color: var(--accent); }
  /* flat yellow bolt after the ZapScript field label */
  #panel .zapbolt { width: .8em; height: .8em; fill: var(--warn); vertical-align: -.08em; margin-left: .25rem; }
  /* the ZapScript token takes a jolt on hover/copy (zapJolt, below). position:
     relative is load-bearing and inline-block is forbidden: transforms do
     nothing on a plain inline box, but relative offsets DO apply to one — and
     an inline-block token is a shrink-to-fit atom that takes the whole value
     column, which is exactly what used to orphan the ⧉ after it. */
  #panel .rom.zap { position: relative; }
  /* "Copied" chip: fixed, so it lands beside the ⧉ wherever the line happened
     to break, and neither the panel body's overflow nor the popover can clip it
     the way an absolutely positioned bubble inside them would. */
  .copychip { position: fixed; left: 0; top: 0; z-index: 200;
    opacity: 0; pointer-events: none;
    background: var(--accent); color: var(--accent-on); font-size: .7rem; font-weight: 600;
    line-height: 1; padding: .2rem .4rem; border-radius: 4px; white-space: nowrap; }
  /* RSS popover: feed chooser opened from the meta line's "RSS" link; styled
     after the Columns dropdown menu. Fixed positioning is fine — the page
     itself never scrolls (app shell) */
  .rsspop { position: fixed; z-index: 40; background: var(--surface); border: 1px solid var(--hair);
    border-radius: 6px; padding: .6rem .8rem; box-shadow: 0 4px 16px #0004;
    font-size: .8rem; max-width: min(30rem, calc(100vw - 2rem)); }
  /* hover popovers (Discord/RSS/Public-cores) sit a few px below their link;
     this invisible strip bridges that gap so travelling link->popover never
     leaves the hover region, letting the popover close instantly otherwise */
  .rsspop.hoverpop::before { content: ''; position: absolute; left: 0; right: 0; top: -8px; height: 8px; }
  /* the NEW badge's age tip is read-only, so it never needs to be travelled
     into: click-through keeps it from swallowing clicks on the row it covers
     (it opens right over the next one) and drops the bridge with it */
  .rsspop.tippop { pointer-events: none; }
  .rsspop.tippop::before { content: none; }
  .rsspop p { margin: 0 0 .45rem; color: var(--muted); }
  .rsspop p:last-child { margin-bottom: 0; }
  /* each feed row IS its own copy field (a .cf button), so the ⧉ is just the
     last flex item and the wrap problem never arises here */
  .rsspop .feedrow { display: flex; gap: .5rem; align-items: baseline;
                     margin: 0 -.35rem; padding: .15rem .35rem; }
  .rsspop .feedrow b { font-weight: 600; white-space: nowrap; }
  .rsspop .feedrow .ci { flex: none; margin-left: 0; }   /* the gap already spaces it */
  .rsspop code { overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    direction: rtl; flex: 1; color: var(--muted); }  /* rtl ellipsis keeps the distinctive tail (…feed-new.xml) visible */
  @media (max-width: 480px) { .rsspop { left: 1rem !important; right: 1rem; } }
  #panel .detail { font-size: .9rem; margin: 0 0 1rem; }
  #panel .report { color: var(--muted); font-size: .8rem; margin: 1.25rem 0 0; }
  #panel .report a { color: inherit; text-decoration: none; text-underline-offset: 2px; white-space: nowrap; }
  #panel .report a .lbl { text-decoration: underline; }
  #panel .report a:hover { color: var(--accent); }
  /* empty state shown before any title is selected */
  #panel .body.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; gap: 1rem; }
  #panel .body.empty .close { position: absolute; top: .4rem; right: .6rem; float: none; }
  /* debossed watermark: fill sits a hair darker than the panel surface in every
     theme (--watermark, per theme in theme.css); the #mzstamp svg filter adds
     the pressed-in edge shading */
  #panel .body.empty .logo { width: 60%; max-width: 220px; aspect-ratio: 532.4 / 354.2;
    fill: var(--watermark); }
  /* pressed-in edge shading: strong sheen would glow on a dark surface, so both
     floods are theme-tuned (in theme.css) rather than fixed in the filter markup */
  #mzstamp .shade { flood-color: var(--stamp-shade); }
  #mzstamp .sheen { flood-color: var(--stamp-sheen); }
  #panel .pick { color: var(--muted); font-size: .95rem; margin: 0; }
  /* footer is docked to the bottom of the panel (outside the scrolling .body) */
  #panel .hint { flex: none; margin: 0; padding: .55rem 1rem; border-top: 1px solid var(--rule);
                 background: var(--surface); color: var(--muted); font-size: .78rem; }
  #panel .hint kbd { font: inherit; padding: 0 .25rem; border: 1px solid var(--kbd-border); border-radius: 3px; }
  #panel .frame { width: 100%; background: #000; margin: .5rem 0; position: relative; }
  #panel .frame img { width: 100%; height: 100%; object-fit: fill; display: block; }
  /* CRT slot mask (mask.js) drawn over each screenshot in device pixels;
     decorative only — must never swallow clicks/touches */
  #panel .frame canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  /* console/computer hardware photo (transparent PNG) */
  #panel .sysphoto { display: block; margin: 1.75rem auto .9rem; width: 100%; height: auto;
                     max-height: 38vh; object-fit: contain; }
  /* JS wraps the photo so the mask canvas can overlay it (margins move here) */
  #panel .sysframe { position: relative; margin: 1.75rem auto .9rem; }
  #panel .sysframe .sysphoto { margin: 0; }
  #panel .sysframe canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; }
  #panel .syscredit { margin: 0 0 1.75rem; text-align: center; color: var(--muted); opacity: .55;
                      font-size: .62rem; }
  #panel .syscredit a { color: inherit; }

  /* Launch on MiSTer: split button under the panel title; chooser/manager
     reuses the .rsspop popover chrome. Transport is a GET navigation
     (window.open + auto-close) — see the launch section in the JS. */
  #panel .launchrow { display: flex; flex-wrap: wrap; gap: .3rem; margin: .6rem 0 0; }
  #panel .launchrow button { font: inherit; font-size: .78rem; padding: .28rem .65rem; cursor: pointer;
    border: 1px solid var(--btn-border); border-radius: 6px; background: var(--surface); color: inherit; }
  #panel .launchrow button:hover { border-color: var(--btn-border-hover); }
  /* the Launch action (.go) is the panel's primary CTA, so it wears the theme
     accent as a solid fill (--accent-on keeps the label legible on light-pastel
     accents). The manager chevron (.more) stays neutral chrome. */
  #panel .launchrow .go { background: var(--accent); color: var(--accent-on); border-color: var(--accent); }
  #panel .launchrow .go:hover { border-color: var(--accent);
    background: color-mix(in srgb, var(--accent) 86%, var(--fg)); }
  /* success state overrides the accent fill back to a neutral surface so the
     green "Sent" reads as a state change, not green-on-accent */
  #panel .launchrow .go.sent { background: var(--surface); color: var(--ok);
    border-color: color-mix(in srgb, var(--ok) 53.33%, transparent); }
  /* must clear the panel (and its resizer, z 101) — the launch button lives inside the panel */
  .misterpop { width: min(22rem, calc(100vw - 2rem)); z-index: 102; }
  .misterpop .devrow { display: flex; gap: .45rem; align-items: center; margin: .35rem 0; }
  .misterpop button { font: inherit; font-size: .78rem; padding: .22rem .55rem; cursor: pointer;
    border: 1px solid var(--btn-border); border-radius: 6px; background: var(--surface); color: inherit; }
  .misterpop button:hover { border-color: var(--btn-border-hover); }

  /* draggable edge: resize the panel / flick left to close (reflow mode only) */
  #resizer { position: fixed; top: 0; height: 100vh; height: 100dvh; width: 12px; z-index: 101;
             left: var(--pw, round(calc(100vw / 3), 1px)); margin-left: -6px;
             cursor: col-resize; display: none; touch-action: none;
             /* ride the panel's edge: slide in/out with the same transition instead of
                popping via display. Closed = pulled left by the panel width, so it sits
                on the panel's (off-screen-adjacent) right edge; visibility flips only
                after the slide-out so it can't be grabbed while hidden. */
             transform: translateX(calc(-1 * var(--pw, round(calc(100vw / 3), 1px))));
             visibility: hidden;
             transition: transform .28s ease, visibility 0s .28s; }

     handle, while the full-height ribs keep advertising the whole edge is
     grabbable. Flat (no border/shadow) to sit with the seam; tracks --rib to
     blue on hover. Painted after ::before, so it merges over the ribs. */

  body.no-anim #panel, body.no-anim main, body.no-anim #resizer { transition: none; }

    main { transition: margin-left .28s ease; }

    body.panel-open main { margin-left: var(--pw, round(calc(100vw / 3), 1px)); }
  }
  @media (max-aspect-ratio: 3/5) {   /* very narrow/tall → overlay full screen, no resize */
    #panel { width: 100vw; }

     against a tally + divider + Columns pinned on the right. That only fits on one
     line at ~900px+; below it the cluster squeezes into a sliver (one dropdown per
     line, tally crowding the search box) and eats three rows of height. So the
     breakpoint sits where the desktop row genuinely stops fitting, not at a phone
     width — landscape phones, tablets and narrow windows all land in that zone.

     dropdowns / Clear / Columns flowing together beneath it. */

       is trimmed with it: together they keep the five filters (3 dropdowns, Clear,
       favorites) on one line at 358px of usable width on a 390px phone — 338px
       against 358px. Columns no longer joins them: six controls want ~429px, and
       nothing short of dropping one closes a 70px gap, so it takes the next row

    /* dissolve the filters wrapper so its children become flex items of .controls
       itself and join one shared wrap flow with the tally and Columns — the

    /* the vertical divider has no room here, but the element is still useful: a

    #typedd { order: 4; }

    #cols { order: 9; margin-left: auto; align-self: center; }

       the HORIZONTAL padding is trimmed (.55 -> .45): the vertical stays .35rem, so

  @media print {

<script>
let DATA = [], view = [], sortKey = 'updated', sortDir = -1;  // default: most recently updated first
let openRow = null;  // the selected data object (unique & stable; d.img is NOT — clones share it)
// deep links: every row carries a stable key (d.k, stamped by export-web);
// #<k> in the URL opens that row's panel, and opening a panel writes it back
const KEY2ROW = {};  // filled when data.json loads
const rowURL = d => location.origin + location.pathname + '#' + d.k;

// --- favorites ---------------------------------------------------------------
// A starred row is remembered by its deep-link key (d.k), so favorites survive
// every rebuild of the data. Browser storage is the working copy; ?fav= is the
// durable one — it's what makes a list movable to another device, or shareable.
// Keys that no longer match a row (a retired core) are kept, never pruned: the
// row may well come back, and silently dropping someone's saved entry is worse
// than a count that runs ahead of what's on screen.
let FAVS = new Set();
try { FAVS = new Set(JSON.parse(localStorage.getItem('mz-favs') || '[]')); } catch (e) {}
let favOnly = false;   // the "show only favorites" toggle — session-only, like every other filter
let favView = null;    // Set of keys while viewing someone's ?fav= link, else null
// unlike the page's other writes (prefs, all replaceable) this one is the user's
// own data: a silent failure would lose what the UI just claimed to have saved,
// so the caller reports it instead
function favSave() {
  try { localStorage.setItem('mz-favs', JSON.stringify([...FAVS])); return true; }
  catch (e) { return false; }
}
const favURL = () => location.origin + location.pathname + '?fav=' +
  [...FAVS].map(encodeURIComponent).join(',');

function toggleFav(d, anchor) {
  if (!d || !d.k) return;
  const on = !FAVS.has(d.k);
  if (on) FAVS.add(d.k); else FAVS.delete(d.k);
  const saved = favSave();
  syncFavStars(d);
  syncFavSummary();
  // unstarring while the list is narrowed to favorites drops the row out from
  // under the click, which is the honest result — re-run the filter to show it
  if (favOnly || favView) { apply(); recenterOpen(); }
  if (!saved) { showChip(anchor, 'Could not save (private window?)'); return; }
  // where the list lives is worth saying once, the first time it matters; the
  // star menu carries the rest (the backup link) from then on
  if (on && !localStorage.getItem('mz-fav-hint')) {
    try { localStorage.setItem('mz-fav-hint', '1'); } catch (e) {}
    showChip(anchor, 'Saved in this browser');
  }
}
// repaint the two stars that can show one row's state, without rebuilding the
// tbody under the pointer (a full render() would drop the hover the star is
// riding on). Touch has no hover star to update in place, so it re-renders.
function syncFavStars(d) {
  const on = FAVS.has(d.k);
  const rb = document.querySelector('#rows .fav[data-k="' + CSS.escape(d.k) + '"]');
  if (rb) setFavBtn(rb, on);
  else if (!CAN_HOVER) render();  // passive marker appears/disappears
  if (openRow === d) {
    const pb = panel.querySelector('h2 .fav');
    if (pb) setFavBtn(pb, on);

}

const favBtnHTML = d => '<button type="button" class="fav' + (FAVS.has(d.k) ? ' on' : '') +
  '" data-k="' + escA(d.k) + '" aria-pressed="' + FAVS.has(d.k) + '" aria-label="' +
  (FAVS.has(d.k) ? 'Remove from favorites' : 'Add to favorites') + '">' +
  (FAVS.has(d.k) ? '★' : '☆') + '</button>';

// --- "new since your last visit" baseline -------------------------------
// What this browser had already seen when it last looked: every row's k mapped
// to its `updated` stamp, plus when the snapshot was taken. render() fences the
// rows that differ from it behind a divider, and the live update check diffs
// against it too. One comparison covers both kinds of news: an unknown k is a
// new release, a known k with a different stamp is a new build.
//
// Deliberately NOT advanced by a live swap: rows that land while the tab is
// open stay unseen, so the divider means "since you last looked" rather than
// "since this page loaded", and the notice pill and the divider agree.
// Two snapshots are kept, and both are load-bearing:
//   cur  — the rows as of this visit. Becomes the next visit's baseline.
//   base — the rows as of the PREVIOUS visit. What the divider compares against.
// One snapshot can't do the job: the moment a visit banks what it can see, it
// has erased the very difference the divider is drawing, so a reload a minute
// later would silently lose the line the visitor came back to read. Splitting
// them lets the baseline hold still for a whole visit and advance only when a
// real gap says the visitor went away and came back.
const SEEN_KEY = 'mz-seen';
const SEEN_HOLD_MIN = 60;   // a return within the hour is the same visit, not a new one
let baseRows = null;        // k -> updated, as of the previous visit (null = first visit, no divider)
let seenState = null;       // the stored record, held so a live swap can bank into it

const rowMap = rows => {
  const m = {};
  for (const d of rows) if (d.k) m[d.k] = d.updated || '';
  return m;
};
// private mode / quota: the divider simply never shows, which is why the reads
// and writes here are failure-tolerant rather than gated on a support check
const saveSeen = s => { try { localStorage.setItem(SEEN_KEY, JSON.stringify(s)); } catch (e) {} };

function initSeen(rows) {
  let s = null;
  try { s = JSON.parse(localStorage.getItem(SEEN_KEY) || 'null'); } catch (e) {}
  const t = s && Date.parse(s.t);
  const sameVisit = !!(t && Date.now() - t < SEEN_HOLD_MIN * 60000);
  baseRows = s ? (sameVisit ? s.base : s.cur) || null : null;
  // an EMPTY snapshot (a visit that loaded no rows, e.g. mid-deploy) must read
  // as "no baseline", or every row counts as unseen and the divider fences off
  // the entire table
  if (baseRows && !Object.keys(baseRows).length) baseRows = null;
  seenState = { t: new Date().toISOString(), base: baseRows, cur: rowMap(rows) };
  saveSeen(seenState);
}
// Rows that land mid-visit are banked as seen for NEXT time, but deliberately
// kept out of the baseline: this visit's divider has to go on showing them.
function bankSeen(rows) {
  if (!seenState) return;
  // another tab may have advanced the record since this one loaded; keep the
  // newer clock and baseline rather than dragging them back to ours (each
  // tab's own divider is untouched — baseRows was fixed at its load)
  try {
    const s = JSON.parse(localStorage.getItem(SEEN_KEY) || 'null');
    if (s && Date.parse(s.t) > Date.parse(seenState.t)) { seenState.t = s.t; seenState.base = s.base; }
  } catch (e) {}
  seenState.cur = rowMap(rows);
  saveSeen(seenState);
}
const isUnseen = d => !!(baseRows && d.k && baseRows[d.k] !== (d.updated || ''));

// core (rbf) -> the game's title, but only for cores that map to exactly ONE
// title in our data. Built once from DATA so single-game cores read nicely
// without us hard-coding each. Multi-title cores resolve via CORE_NAMES instead.
const coreSoleTitle = {};

function coreLabel(core) {
  if (!core) return '';
  if (CORE_NAMES[core]) return CORE_NAMES[core];
  if (coreSoleTitle[core]) return coreSoleTitle[core];
  // unrecognised multi-title core: split camelCase + capitalise (cosmetic only)
  return core.replace(/([a-z0-9])([A-Z])/g, '$1 $2').replace(/^./, c => c.toUpperCase());
}

function typeLabel(d) {
  if (d.base === 'Arcade') return 'Arcade';
  return d.base + ' core' + (d.deprecated ? ' (deprecated)' : '');
}

// Core Type glyphs: Lucide icons (ISC), colour-coded via the .t-* hue.
// joystick = Arcade, gamepad-2 = Console, monitor = Computer, box = Other.
// Search and sort read typeLabel(d) from the data, not this markup, so the

};

function typeBadge(d) {
  const base = d.base || 'Other';
  const cls  = 't-' + base.toLowerCase();
  const ico  = TYPE_ICONS[base] || TYPE_ICONS.Other;
  return '<span class="tico ' + cls + '" role="img" title="' + escA(base) +

}

// Whole days since a genuinely known MiSTer debut, else -1. Gating on
// date_kind === 'debut' skips console/computer rows that fell back to a build
// date (debut unknown), so those never get falsely flagged as new. Clamped at
// 0 because the date is parsed as UTC midnight but compared against a local
// clock, which runs a debut dated today slightly negative west of UTC.
function debutAgeDays(d) {
  if (d.date_kind !== 'debut' || !d.date) return -1;
  return Math.max(0, Math.floor((Date.now() - Date.parse(d.date)) / 864e5));  // 864e5 = ms per day
}

// Human age for a plain YYYY-MM-DD, trailing a date in the detail panel. Not
// relUpdated(): that ladder is minute/hour-grained for the meta stamp, which
// tracks a clock, while these are whole-day facts. Coarse past a year on
// purpose ("8 years ago", never "8 years, 3 months"). Same UTC-midnight-vs-local
// clamp as debutAgeDays above. Both bands round rather than floor: flooring
// makes an exact anniversary undershoot by a whole unit (730 days / 365.25 is
// 1.998, i.e. "1 year ago" on a two-year-old debut). Rounding up through 12
// months would then say "12 months ago", so the month band hands anything that
// rounds to a year over to the year arm — which is also why that arm can't see
// a value below 1 and needs no floor guard.
function relAge(iso) {
  if (!iso) return '';
  const days = Math.max(0, Math.floor((Date.now() - Date.parse(iso)) / 864e5));
  if (days === 0) return 'today';
  if (days === 1) return 'yesterday';
  if (days <= 30) return days + ' days ago';
  const mon = Math.round(days / 30.44);
  if (mon < 12) return mon + (mon === 1 ? ' month ago' : ' months ago');
  const yr = Math.round(days / 365.25);
  return yr + (yr === 1 ? ' year ago' : ' years ago');
}

// Original year is year-only, so its age is inherently give-or-take one: it says
// "45 years old", never "45 years ago", because "old" doesn't promise the
// precision a full date does. Blank under a year, so a same-year release can't
// report "0 years old".
function yearAge(y) {
  const age = new Date().getFullYear() - (+y);
  if (!(+y) || age < 1) return '';
  return age + (age === 1 ? ' year old' : ' years old');
}

// The leading space is not decoration: .ago's margin separates the two visually,
// but without a real text node between them the dd copies (and reads aloud) as
// "198145 years old". Empty age = no span and no stray space.
const agoSpan = s => s ? ' <span class="ago">' + s + '</span>' : '';

// The NEW badge rides for four weeks, fading with age to NEW_FLOOR and then
// going entirely rather than reaching 0: a pill faded to nothing would still
// answer the hover, popping a tip up off what looks like blank space. Its
// popover text is baked in here, so the shared hover handler only has to read
// data-tip back out.
const NEW_DAYS = 28, NEW_FLOOR = 0.15;
function newBadge(d) {
  const age = debutAgeDays(d);
  if (age < 0 || age >= NEW_DAYS) return '';
  const op  = (1 - (1 - NEW_FLOOR) * age / NEW_DAYS).toFixed(2);
  const tip = age === 0 ? 'Debuted today'
            : age + (age === 1 ? ' day' : ' days') + ' old (debuted ' + d.date + ')';
  return '<span class="nb" style="opacity:' + op + '" data-tip="' + escA(tip) + '">NEW</span>';
}

// The star sits out of flow in the sticky cell's left padding (see the .fav CSS),
// so it costs the Title column no width and shifts no text when it appears on
// hover. Without hover there's nothing to reveal it, so touch gets a plain
// marker on favorited rows and does its starring in the detail panel; a live
// button there would only compete with the row's own tap target.
function titleCell(d) {
  const dep = d.deprecated ? '<span class="dep">deprecated</span>' : '';
  const fav = !d.k ? ''
    : CAN_HOVER ? favBtnHTML(d)
    : FAVS.has(d.k) ? '<span class="fav on" aria-hidden="true">★</span>' : '';
  return fav + esc(d.title) + newBadge(d) + dep;
}

function coreCell(d) {

const HEADER_TIPS = {

  genre: "Arcade genre, from MAME's catver.ini",
  date: 'When this title first became publicly playable on MiSTer',

for (const c of COLUMNS) if (!c.cell) c.cell = d =>
