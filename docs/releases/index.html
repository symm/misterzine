  'zerowing_20240404': 'Toaplan (Zero Wing HW)', 'zerowing_mister': 'Toaplan (Zero Wing HW)',
  'vimana': 'Toaplan (Vimana HW)',
  // Williams / Midway / Bally
  'robotron': 'Williams 6809', 'defender': 'Williams (Defender)',
  'mcr1': 'Midway MCR 1', 'mcr2': 'Midway MCR 2', 'mcr3': 'Midway MCR 3', 'mcr3mono': 'Midway MCR 3 (mono)',
  'mcr3scroll': 'Midway MCR 3 (scroll)', 'astrocade': 'Bally Astrocade', 'BluePrint': 'Bally Midway (Blue Print)',
  // Atari
  'atarisys1': 'Atari System 1', 'BattleZone': 'Atari (Battlezone HW)', 'blackwidow': 'Atari (Black Widow HW)',
  'gauntlet': 'Atari (Gauntlet HW)', 'StarWars': 'Atari (Star Wars HW)',
  // SNK
  'SNK6502': 'SNK 6502', 'Athena': 'SNK (Athena HW)', 'IkariWarriors': 'SNK (Ikari Warriors)', 'TNKIII': 'SNK (T.A.N.K III)',
  'SNK68': 'SNK 68000', 'alpha68k': 'Alpha Denshi 68000', 'nextspace': 'SNK (Next Space HW)',
  // other hardware families
  'tiamc1': 'TIA-MC-1 (Soviet)', 'bagman': 'Stern (Bagman HW)', 'qbert': 'Gottlieb (Q*bert HW)',
  'cosmic': 'Universal (Cosmic HW)', 'ladybug': 'Universal (Lady Bug HW)', 'Exidy2': 'Exidy',
  'ninjakun': 'UPL (Ninja-Kun HW)', 'blockade': 'Gremlin (Blockade HW)', 'Kangaroo': 'Sun Electronics (Kangaroo)',
  'galivan': 'Nichibutsu (Galivan)', 'armedf': 'Nichibutsu (Armed F HW)', 'terracresta': 'Nichibutsu (Terra Cresta HW)',
  'naughtyboy': 'Jaleco (Naughty Boy)', 'megasys1_a': 'Jaleco Mega System 1', 'polyplay': 'VEB Poly-Play',
  'phoenix': 'Amstar (Phoenix HW)', 'crazykong': 'Crazy Kong', 'donkeykong': 'Nintendo (Donkey Kong)',
  'popeye': 'Nintendo (Popeye)',
};

// Which downloader database ships each entry (d.src, raw source id from the
// pipeline). Display name for the panel, and deliberately curated search
// tokens — NOT the display name itself, so typing "mist"/"mister" while
// hunting a title doesn't light up all ~830 MiSTer Distribution rows.
const SRC_NAMES = {
  distribution_mister: 'MiSTer Distribution',
  jtbindb: 'Jotego (JTcores)',
  coinop: 'Coin-Op Collection',
};
const SRC_SEARCH = {
  distribution_mister: 'distribution',
  jtbindb: 'jotego jtcores',
  coinop: 'coin-op collection',
};

// Per-setname display-aspect escape hatch — for the handful of cases the normal
// rotation-driven logic can't get right. Keyed by setname (d.img); value is the
// forced CSS aspect-ratio, and it wins over everything (see detailHTML). The
// orientation for ordinary rows now comes from the MAD rotation column (d.rot),
// so this list only needs: (a) single-screen games whose superwide raster trips
// the 8:3 dual-screen rule, and (b) rows where MAD's rotation tag is itself wrong.
const ASPECT_OVERRIDE = {
  findlove: '4 / 3',  // Sega ST-V hi-res single screen (640x224) — else caught by the 8:3 rule
  pong:     '4 / 3',  // superwide raster (750x246) but a single screen, not dual — false 8:3
  shienryu: '3 / 4',  // vertical shmup; MAD wrongly tags it Horizontal (file MAD PR)
  wrestwar: '3 / 4',  // vertical wrestling game; MAD wrongly tags it Horizontal (file MAD PR)
};

// Console/computer cores with a hardware photo in docs/images/systems/<core>.png
// (~240px transparent PNGs from Wikimedia Commons, quantized to DawnBringer-16
// with Floyd-Steinberg dither — the lo-fi look is deliberate). Fetched/processed
// by tools/fetch_system_photos.py; per-photo license data in
// docs/images/systems/credits.json (rendered as a caption below the photo).
const SYSTEM_IMGS = new Set([
  'AY-3-8500', 'AcornAtom', 'AcornElectron', 'AdventureVision', 'AliceMC10', 'Altair8800', 'Amstrad', 'Amstrad-PCW',
  'Apogee', 'Apple-I', 'Apple-II', 'Apple-IIgs', 'Apple-Lisa', 'Aquarius', 'Arcadia', 'Archie', 'Arduboy', 'Astrocade', 'Atari5200',
  'Atari7800', 'Atari800', 'AtariLynx', 'AtariST', 'BBCBridgeCompanion', 'BBCMicro', 'BK0011M',
  'C128', 'C16', 'C64', 'CDi', 'Casio_PV-1000', 'Casio_PV-2000', 'ChannelF', 'Chess', 'Chip8', 'CoCo2', 'CoCo3',
  'ColecoAdam', 'ColecoVision', 'CreatiVision', 'Donut', 'EDSAC', 'Enterprise', 'EpochGalaxyII',
  'FlappyBird', 'GameOfLife', 'SlugCross',
  'GBA', 'GBA2P', 'GBMidi', 'Galaksija', 'Gamate', 'GameGear2P', 'Gameboy', 'Gameboy2P', 'GenMidi',
  'GameAndWatch', 'Genesis', 'GnW', 'Homelab', 'IQ151', 'Intellivision', 'Interact', 'Jaguar', 'Jupiter',
  'Laser310', 'Lynx48', 'MSX', 'MSX1', 'MacPlus', 'MegaCD', 'MegaDrive', 'Minimig', 'MultiComp', 'MyVision',
  'N64', 'NES', 'NeoGeo', 'NeoGeoPocket', 'ORAO', 'Odyssey2', 'Ondra_SPO186', 'Oric',
  'PC88', 'PCXT', 'PCjr', 'PDP1', 'PET2001', 'PMD85', 'PSX', 'PokemonMini',
  'QL', 'RX78', 'S32X', 'SAMCoupe', 'SCV', 'SGB', 'SMS', 'SNES', 'Saturn',
  'SharpMZ', 'SordM5', 'Specialist', 'SuperVision', 'Super_Vision_8000', 'Svi328',
  'TK2000', 'TRS-80', 'Tamagotchi', 'Tandy1000', 'TatungEinstein', 'Ti994a', 'TomyScramble', 'TomyTutor', 'TurboGrafx16',
  'UK101', 'VC4000', 'VIC20', 'VT52', 'Vector-06C',
  'Vectrex', 'WonderSwan', 'X68000', 'ZX-Spectrum', 'ZX81', 'ZXNext',
  'ao486', 'eg2000',
]);

// core -> {file, license, artist} for the photo caption; loaded async at
// startup (panel just omits the caption until it arrives)
let SYSTEM_CREDITS = {};
fetch('../images/systems/credits.json')
  .then(r => r.ok ? r.json() : {})
  .then(j => { SYSTEM_CREDITS = j; })
  .catch(() => {});

// core (rbf) -> the game's title, but only for cores that map to exactly ONE
// title in our data. Built once from DATA so single-game cores read nicely
// without us hard-coding each. Multi-title cores resolve via CORE_NAMES instead.
const coreSoleTitle = {};

function coreLabel(core) {
  if (!core) return '';
  if (CORE_NAMES[core]) return CORE_NAMES[core];
  if (coreSoleTitle[core]) return coreSoleTitle[core];
  // unrecognised multi-title core: split camelCase + capitalise (cosmetic only)
  return core.replace(/([a-z0-9])([A-Z])/g, '$1 $2').replace(/^./, c => c.toUpperCase());
}

function typeLabel(d) {
  if (d.base === 'Arcade') return 'Arcade';
  return d.base + ' core' + (d.deprecated ? ' (deprecated)' : '');
}

function typeBadge(d) {
  const cls = 't-' + (d.base || 'other').toLowerCase();
  return '<span class="badge ' + cls + '">' + esc(d.base) + '</span>';
}

function titleCell(d) {
  const dep = d.deprecated ? '<span class="dep">deprecated</span>' : '';
  return esc(d.title) + (hasShots(d) ? ' ' + DV_ICON : '') + dep;
}

function repoURL(d) { return d.repo ? 'https://github.com/' + d.repo : ''; }

function coreCell(d) {
  let label = coreLabel(d.core);
  if (!d.repo) return esc(label);
  // rows whose catalog never captured an rbf: name the link after the repo
  if (!label) label = d.repo.split('/')[1].replace(/^Arcade[-_]/i, '').replace(/[-_]MiSTer$/i, '');
  return '<a href="' + escA(repoURL(d)) + '" target="_blank" rel="noopener">' +
    esc(label) + '<span class="ext">↗</span></a>';
}

// The table's columns, all toggleable via the "Columns" dropdown except Title
// (lock: true — a table without titles is meaningless, and row-click/detail
// live in that cell). The base seven default on, the arcade-metadata six
// (opt: true, from the MiSTer Arcade Database) default off; the visible set
// persists in localStorage. Widths are weights, normalized to 100% over
// whichever columns are enabled (the table uses table-layout:fixed); mw is
// each column's contribution (rem) to the table's min-width floor.
// Optional columns without a cell() render their data key as plain text.
const COLUMNS = [
  { k: 'title', label: 'Title', w: 21, mw: 11, lock: true, cell: d => '<td>' + titleCell(d) + '</td>' },
  { k: 'sn', label: 'ROM Name', w: 9, mw: 6.5, opt: true,
    cell: d => '<td class="rom">' + esc(d.sn || '') + '</td>' },
  { k: 'typesort', label: 'Type', w: 7, mw: 4, cell: d => '<td class="type">' + typeBadge(d) + '</td>' },
  { k: 'genre', label: 'Genre', w: 10, mw: 5, opt: true },
  { k: 'updated', label: 'Last Updated', w: 10, mw: 5.5, cell: d => '<td class="date">' + esc(d.updated || '') + '</td>' },
  { k: 'date', label: 'MiSTer Debut', w: 10, mw: 5.5,
    cell: d => '<td class="date' + (d.date_kind === 'build' ? ' build' : '') + '">' + esc(d.date) + '</td>' },
  { k: 'year', label: 'Original Year', w: 9, mw: 4.5, cell: d => '<td>' + esc(d.year) + '</td>' },
  { k: 'manufacturer', label: 'Manufacturer', w: 19, mw: 8.5, cell: d => '<td>' + esc(d.manufacturer) + '</td>' },
  { k: 'core', label: 'Core', w: 24, mw: 10,
    cell: d => '<td class="core"' + (d.core ? ' title="' + escA(d.core) + '"' : '') + '>' + coreCell(d) + '</td>' },
  { k: 'rot',  label: 'Rotation',   w: 10, mw: 5, opt: true },
  { k: 'res',  label: 'Resolution', w: 10, mw: 5, opt: true },
  { k: 'plr',  label: 'Players',    w: 13, mw: 5, opt: true },
  { k: 'ctl',  label: 'Controls',   w: 13, mw: 5, opt: true },
  { k: 'spc',  label: 'Special Controls', w: 10, mw: 5, opt: true },
  { k: 'flip', label: 'Flip', w: 6, mw: 5, opt: true },
];
// Header tooltips (title attributes on the <th>s, rendered by buildHeader).
// Kept out of COLUMNS so the config rows above stay scannable. Touch devices
// never see these; the detail panel spells out the date semantics there.
const HEADER_TIPS = {
  title: 'Game or system name. The monitor icon marks entries with screenshots.',
  sn: 'MAME setname, the ROM identifier',
  typesort: 'Arcade game, console core, computer core, or other',
  genre: "Arcade genre, from MAME's catver.ini",
  date: 'When this title first became publicly playable on MiSTer',
  updated: 'Newest shipped build, what update_all installs',
  year: 'Year the original game or hardware was released',
  manufacturer: 'Original manufacturer',
  core: 'The FPGA core that runs this title, linked to its GitHub repository',
  rot: 'Monitor orientation of the original cabinet (MiSTer Arcade Database)',
  res: 'Video signal type (MiSTer Arcade Database)',
  plr: 'Number of players (MiSTer Arcade Database)',
  ctl: 'Joystick and buttons (MiSTer Arcade Database)',
  spc: 'Non-standard controls such as dials, trackballs or spinners (MiSTer Arcade Database)',
  flip: 'Whether the game supports flipping the screen image (MiSTer Arcade Database)',
};
// Default renderer for the optional spec columns. Cells filled provisionally
// from mame2003-plus (pending the curated Arcade Database) render grayed with a
// tooltip; d.prov lists which keys on this row are provisional.
const PROV_TITLE = 'Provisional: from MAME data, pending the Arcade Database';
for (const c of COLUMNS) if (!c.cell) c.cell = d =>
  (d.prov && d.prov.includes(c.k))
    ? '<td class="prov" title="' + PROV_TITLE + '">' + esc(d[c.k] || '') + '</td>'
    : '<td>' + esc(d[c.k] || '') + '</td>';

const defaultCols = () => new Set(COLUMNS.filter(c => !c.opt).map(c => c.k));
// 'mz-cols2' holds the full visible set. The pre-2026-07 'mz-cols' key held
// only the enabled *optional* columns (base ones weren't toggleable) — migrate
// it by unioning with the base defaults, or a returning visitor would load a
// table stripped to their optional picks.
let enabledCols;
try {
  const v2 = localStorage.getItem('mz-cols2');
  if (v2 !== null) enabledCols = new Set(JSON.parse(v2));
  else enabledCols = new Set([...defaultCols(),
    ...JSON.parse(localStorage.getItem('mz-cols') || '[]')]);
} catch (e) { enabledCols = defaultCols(); }

const activeColumns = () => COLUMNS.filter(c => c.lock || enabledCols.has(c.k));

function buildHeader() {
  const cols = activeColumns();
  const total = cols.reduce((s, c) => s + c.w, 0);
  document.getElementById('cg').innerHTML = cols.map(c =>
    '<col style="width:' + (c.w / total * 100).toFixed(2) + '%">').join('');
  document.getElementById('hrow').innerHTML = cols.map(c =>
    '<th data-k="' + c.k + '"' + (c.k === sortKey
      ? ' aria-sort="' + (sortDir === 1 ? 'ascending' : 'descending') + '"' : '') +
    (HEADER_TIPS[c.k] ? ' title="' + escA(HEADER_TIPS[c.k]) + '"' : '') +
    '>' + c.label + '</th>').join('');
  // each column contributes its mw to the table's width floor so cells don't
  // crush (the 5rem on the metadata columns keeps the nowrap date columns from
  // colliding with all 6 on); an over-wide table scrolls horizontally inside
  // .tablewrap, the page's only scroll container (the sticky <th> anchor to it)
  document.querySelector('table').style.minWidth = cols.reduce((s, c) => s + c.mw, 0) + 'rem';
  syncScrollHints();  // toggling columns changes the table's scrollWidth
}

// Floating scrollbar thumbs (see the .sb-thumb CSS comment): only in browsers
// whose native element scrollbars are classic, detected with a throwaway
// scroller (classic bars eat layout space, overlay ones don't). Can't measure
// .tablewrap itself: it has no overflow until the data loads.
let vThumb = null, hThumb = null, sbDragging = false, sbHideTimer = 0;
{
  const probe = document.createElement('div');
  probe.style.cssText = 'position:absolute;visibility:hidden;width:60px;height:60px;overflow:scroll';
  document.body.appendChild(probe);
  const classic = probe.offsetWidth > probe.clientWidth;
  probe.remove();
  if (classic) {
    document.body.classList.add('custom-sb');
    const z = document.querySelector('.tablezone');
    vThumb = Object.assign(document.createElement('div'), { className: 'sb-thumb v', hidden: true });
    hThumb = Object.assign(document.createElement('div'), { className: 'sb-thumb h', hidden: true });
    z.append(vThumb, hThumb);
    dragifyThumb(vThumb, false);
    dragifyThumb(hThumb, true);
  }
}

// dragging a thumb scrolls proportionally, like a native scrollbar
function dragifyThumb(t, horiz) {
  t.addEventListener('pointerdown', e => {
    const w = document.querySelector('.tablewrap');
    e.preventDefault();
    t.setPointerCapture(e.pointerId);
    t.classList.add('drag');
    sbDragging = true;
    const start = horiz ? e.clientX : e.clientY;
    const startScroll = horiz ? w.scrollLeft : w.scrollTop;
    const track = (horiz ? w.clientWidth - t.offsetWidth : w.clientHeight - t.offsetHeight);
    const range = horiz ? w.scrollWidth - w.clientWidth : w.scrollHeight - w.clientHeight;
    const move = ev => {
      const d = (horiz ? ev.clientX : ev.clientY) - start;
      w[horiz ? 'scrollLeft' : 'scrollTop'] = startScroll + d / track * range;
    };
    const up = () => {
      t.removeEventListener('pointermove', move);
      t.classList.remove('drag');
      sbDragging = false;
      clearTimeout(sbHideTimer);  // the drag's own scroll events armed it while sbDragging still held
      sbHideTimer = setTimeout(() =>
        document.querySelector('.tablezone').classList.remove('sb-show'), 900);
    };
    t.addEventListener('pointermove', move);
    t.addEventListener('pointerup', up, { once: true });
    t.addEventListener('pointercancel', up, { once: true });
  });
}

// Horizontal scroll hints: keep the .tablezone shadow classes in sync with the
// scroll position. Re-checked on scroll, on any scroller resize (window,
// panel open/close/drag — the ResizeObserver below catches them all), on
// content resizes (rows/columns change the table's size without touching the
// scroller's box, so the wrap's own observer misses them), and after column
// toggles (buildHeader above).
function syncScrollHints() {
  const w = document.querySelector('.tablewrap'), z = document.querySelector('.tablezone');
  z.classList.toggle('more-l', w.scrollLeft > 0);
  z.classList.toggle('more-r', w.scrollLeft + w.clientWidth < w.scrollWidth - 1);
  z.classList.toggle('scrolled', w.scrollTop > 30);  // ~a row down reveals "Scroll to top"
  // taper both hints near their end of the scroll range: each one's width
  // tracks the distance to its edge (full width until the last ~6% / 48px
  // minimum, then shrinking to 0), so they grow/shrink with scroll position
  // instead of blinking on and off
  const maxScroll = w.scrollWidth - w.clientWidth;
  const remain = Math.max(0, maxScroll - w.scrollLeft);
  const taper = Math.max(48, maxScroll * .06);
  z.style.setProperty('--hint-r-w', Math.min(28, 28 * remain / taper).toFixed(1) + 'px');
  z.style.setProperty('--hint-l-w', Math.min(12, 12 * w.scrollLeft / taper).toFixed(1) + 'px');
  // scrollbar thickness (0 with overlay scrollbars), so the shadows can stop
  // short of the scrollbars instead of shading them
  z.style.setProperty('--sbw', (w.offsetWidth - w.clientWidth) + 'px');
  z.style.setProperty('--sbh', (w.offsetHeight - w.clientHeight) + 'px');
  // pin the left shadow to the sticky Title column's right edge (the column is
  // percentage-sized, so the edge moves with every panel/window/column change)
  const th = document.querySelector('#hrow th');
  if (th) z.style.setProperty('--titlew',
    (th.getBoundingClientRect().right - z.getBoundingClientRect().left) + 'px');
  // sticky header height anchors the "Scroll to top" button just below it
  if (th) z.style.setProperty('--theadh', th.getBoundingClientRect().height + 'px');
  // floating thumbs: length ∝ visible fraction, position ∝ scroll progress
  if (vThumb) {
    const canV = w.scrollHeight > w.clientHeight + 1;
    const canH = w.scrollWidth > w.clientWidth + 1;
    vThumb.hidden = !canV;
    hThumb.hidden = !canH;
    if (canV) {
      const h = Math.max(24, w.clientHeight * w.clientHeight / w.scrollHeight);
      vThumb.style.height = h + 'px';
      vThumb.style.top = w.scrollTop / (w.scrollHeight - w.clientHeight) * (w.clientHeight - h) + 'px';
    }
    if (canH) {
      const wd = Math.max(24, w.clientWidth * w.clientWidth / w.scrollWidth);
      hThumb.style.width = wd + 'px';
      hThumb.style.left = w.scrollLeft / (w.scrollWidth - w.clientWidth) * (w.clientWidth - wd) + 'px';
    }
  }
}
document.querySelector('.tablewrap').addEventListener('scroll', syncScrollHints, { passive: true });
new ResizeObserver(syncScrollHints).observe(document.querySelector('.tablewrap'));
new ResizeObserver(syncScrollHints).observe(document.querySelector('table'));
// reveal the floating thumbs while scrolling, drop them again after a beat
// (unless mid-drag — releasing outside the thumb must not strand it visible)
document.querySelector('.tablewrap').addEventListener('scroll', () => {
  if (!vThumb) return;
  document.querySelector('.tablezone').classList.add('sb-show');
  clearTimeout(sbHideTimer);
  sbHideTimer = setTimeout(() => {
    if (!sbDragging) document.querySelector('.tablezone').classList.remove('sb-show');
  }, 900);
}, { passive: true });

document.getElementById('totop').addEventListener('click', () => {
  document.querySelector('.tablewrap').scrollTo({ top: 0, behavior: 'smooth' });
});

function render() {
  const tb = document.getElementById('rows');
  const cols = activeColumns();
  // zero results is never left as a silent blank table: name the query AND any
  // active type filter (an invisible narrower is the sneaky way to get here)
  if (!view.length && DATA.length) {
    const q = document.getElementById('q').value.trim();
    const partial = enabledTypes.size && enabledTypes.size < TYPES.length;
    const types = partial ? TYPES.filter(t => enabledTypes.has(t)).join(', ') : '';
    tb.innerHTML = '<tr class="nomatch"><td colspan="' + cols.length + '"><div class="msg">' +
      'No matches' + (q ? ' for <b>"' + esc(q) + '"</b>' : '') +
      (types ? ' in ' + esc(types) : '') +
      (yearLabel() ? ' (years ' + yearLabel() + ')' : '') +
      (q && matchMedia('(hover: hover) and (pointer: fine)').matches
        ? '<span class="esc">press Esc to clear the search</span>' : '') + '</div></td></tr>';
    document.getElementById('count').textContent = '0 of ' + DATA.length;
    return;
  }
  tb.innerHTML = view.map((d, i) =>
    '<tr' + (d === openRow ? ' class="open"' : '') + ' data-i="' + i + '">' +
    cols.map(c => c.cell(d)).join('') + '</tr>'
  ).join('');
  document.getElementById('count').textContent = view.length + ' of ' + DATA.length;
}

function esc(s) { return (s == null ? '' : '' + s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function escA(s) { return esc(s).replace(/"/g, '&quot;'); }

// diacritic-insensitive lowercase for search ("sam coupe" must match "SAM Coupé")
const fold = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');

function apply() {
  const qEl = document.getElementById('q');
  // whitespace splits the query into AND terms ("horizontal 4-way" = rows
  // matching both, in any field, in any order); each term is an independent
  // substring so multi-word values still match ("street fighter" hits the title)
  const terms = fold(qEl.value.trim()).split(/\s+/).filter(Boolean);
  document.getElementById('clear').hidden = !qEl.value;
  // Types filter: an empty set means "no filter" (show all) — which coincides
  // with every type being checked. Any partial selection narrows to those bases.
  view = DATA.filter(d => {
    if (enabledTypes.size && !enabledTypes.has(d.base)) return false;
    // Year range: rows with no numeric Original Year drop out while a bound is set
    if (yearFrom != null || yearTo != null) {
      const y = +d.year;
      if (!y) return false;
      if (yearFrom != null && y < yearFrom) return false;
      if (yearTo != null && y > yearTo) return false;
    }
    if (!terms.length) return true;
    const hay = fold(d.title + ' ' + (d.mt || '') + ' ' + typeLabel(d) + ' ' + (d.genre || '') + ' ' + d.manufacturer + ' ' +
            d.year + ' ' + (d.core || '') + ' ' + coreLabel(d.core) + ' ' +
            (d.rot || '') + ' ' + (d.res || '') + ' ' + (d.plr || '') + ' ' +
            (d.ctl || '') + ' ' + (d.spc || '') + ' ' + (d.sn || '') + ' ' +
            (d.scr === 3 ? 'triple screen' : d.scr === 2 ? 'dual screen' : '') + ' ' +
            (SRC_SEARCH[d.src] || ''));
    return terms.every(t => hay.includes(t));
  });
  if (sortKey) {
    const keyOf = x => sortKey === 'typesort' ? typeLabel(x)
      : sortKey === 'core' ? coreLabel(x.core)
      : (x[sortKey] || '');
    view.sort((a, b) => {
      const av = keyOf(a), bv = keyOf(b);
      // Blank cells always sink to the bottom, regardless of sort direction, so
      // "no data" never heads the list (e.g. sorting Players ascending still
      // shows 1,2,4… first and the unknowns last).
      const ae = av === '', be = bv === '';
      if (ae !== be) return ae ? 1 : -1;
      // Case- and accent-insensitive so "ASO" sorts next to "Ace", not ahead of
      // it; numeric:true gives natural ordering for any number runs in titles.
      const cmp = sortDir * av.localeCompare(bv, undefined, { numeric: true, sensitivity: 'base' });
      if (cmp) return cmp;
      // Tiebreak equal values by title A–Z: one repo push stamps every row of a
      // shared arcade core with the same Last Updated date, and without this the
      // whole block would sit in arbitrary data order.
      return a.title.localeCompare(b.title, undefined, { numeric: true, sensitivity: 'base' });
    });
  }
  render();
}

// Keep the still-selected row in view after any reshuffle of the list (search,
// sort, type filter, column toggle). No-op when nothing is open or the open row
// was filtered out of the current results — its <tr> simply isn't in the DOM.
function recenterOpen() {
  const tr = document.querySelector('#rows tr.open');
  if (tr) tr.scrollIntoView({ block: 'center', inline: 'nearest' });
}

// Re-center on every keystroke: if the open row survives the filter it stays put
// (and this covers backspacing back to the full list); if it's filtered out the
// helper no-ops until it reappears. Filtering preserves the sort order rather
// than ranking by match, so anchoring to the open row doesn't hide better hits.
document.getElementById('q').addEventListener('input', () => { apply(); recenterOpen(); });
// keyboard-first devices get told about type-anywhere; touch keeps the plain hint
if (matchMedia('(hover: hover) and (pointer: fine)').matches)
  document.getElementById('q').placeholder = 'Type anywhere to search title, type, manufacturer, core…';
document.getElementById('clear').addEventListener('click', () => {
  const q = document.getElementById('q');
  q.value = ''; apply(); q.focus({ preventScroll: true });
  // the full list just replaced the filtered one; keep the user's place
  recenterOpen();
});
// delegated: the header row is rebuilt whenever columns are toggled
document.getElementById('hrow').addEventListener('click', e => {
  const th = e.target.closest('th');
  if (!th) return;
  const k = th.dataset.k;
  // Date columns default to descending (most recent first) when first selected;
  // every other column defaults to ascending. A click on the already-active
  // column always just flips the current direction.
  const DATE_COLS = new Set(['date', 'updated']);
  sortDir = (sortKey === k) ? -sortDir : (DATE_COLS.has(k) ? -1 : 1);
  sortKey = k;
  buildHeader();  // re-stamps aria-sort from sortKey/sortDir
  apply();
  // With a row selected, follow it to its new position; with nothing selected,
  // jump to the top — "show me the new #1" is what a bare re-sort means.
  if (document.querySelector('#rows tr.open')) recenterOpen();
  else document.querySelector('.tablewrap').scrollTop = 0;
});

// --- "Types" dropdown: multi-select filter over the four base types ---
// enabledTypes holds the checked bases; an empty set is "no filter" (all rows),
// which is intentionally the same result as every box checked. Persisted so a
// visitor's filter survives reload; the pre-checkbox site had no type memory.
const TYPES = ['Arcade', 'Console', 'Computer', 'Other'];
let enabledTypes;
try {
  const saved = localStorage.getItem('mz-types');
  enabledTypes = new Set(saved !== null ? JSON.parse(saved) : []);
} catch (e) { enabledTypes = new Set(); }

// Year range filter: yearFrom/yearTo are numbers or null (null = that end
// unbounded). Persisted like the Types/Columns filters; restored into the
// selects once buildYearMenu() has the real year span (data-load handler).
let yearFrom = null, yearTo = null, YEAR_MIN = null, YEAR_MAX = null;
try {
  const s = JSON.parse(localStorage.getItem('mz-year') || 'null');
  if (s) { yearFrom = s.from ?? null; yearTo = s.to ?? null; }
} catch (e) {}

const typeMenu = document.getElementById('typemenu');
const typeSummary = document.getElementById('typesummary');
typeMenu.innerHTML = TYPES.map(t =>
  '<label><input type="checkbox" data-t="' + t + '"' +
  (enabledTypes.has(t) ? ' checked' : '') + '> ' + t + '</label>').join('') +
  '<button class="reset" id="typereset">Show all</button>';
const typeReset = document.getElementById('typereset');
function syncTypeSummary() {
  // empty (= no filter) and full both read as "All Types"; partial shows the count
  const partial = enabledTypes.size !== 0 && enabledTypes.size !== TYPES.length;
  typeSummary.textContent = partial ? 'Types (' + enabledTypes.size + ')' : 'All Types';
  typeSummary.classList.toggle('active', partial);  // glow when narrowing, like a non-empty search box
  typeReset.disabled = enabledTypes.size === 0;  // no boxes checked = the default
}
typeMenu.addEventListener('change', e => {
  const t = e.target.dataset.t;
  if (!t) return;
  if (e.target.checked) enabledTypes.add(t); else enabledTypes.delete(t);
  localStorage.setItem('mz-types', JSON.stringify([...enabledTypes]));
  syncTypeSummary();
  apply();
  recenterOpen();  // adding/removing whole types moves the selected row — follow it
});
typeReset.addEventListener('click', () => {
  enabledTypes.clear();
  // remove (not rewrite) the key: a reset visitor is back to "never customized"
  localStorage.removeItem('mz-types');
  for (const cb of typeMenu.querySelectorAll('input')) cb.checked = false;
  syncTypeSummary();
  apply();
  recenterOpen();
});
syncTypeSummary();

// --- "Columns" dropdown: toggle any column (Title stays locked on) ---
const colsMenu = document.getElementById('colsmenu');
colsMenu.innerHTML = COLUMNS.map(c =>
  '<label><input type="checkbox" data-k="' + c.k + '"' +
  (c.lock ? ' checked disabled' : (enabledCols.has(c.k) ? ' checked' : '')) +
  '> ' + c.label + '</label>').join('') +
  '<button class="reset" id="colsreset">Reset to default</button>' +
  '<p class="colnote"><span class="prov">Grayed</span> spec values are provisional ' +
  '(from MAME data), pending the curated Arcade Database.</p>';
const colsReset = document.getElementById('colsreset');
function syncColsReset() {
  const def = defaultCols();
  colsReset.disabled = enabledCols.size === def.size && [...enabledCols].every(k => def.has(k));
}
// sorting by a column that was just hidden would be invisible — fall back to
// last-updated (the site default) if visible, then debut date, else the
// always-on title column
function fixSortThenRebuild() {
  if (!activeColumns().some(c => c.k === sortKey)) {
    if (activeColumns().some(c => c.k === 'updated')) { sortKey = 'updated'; sortDir = -1; }
    else if (activeColumns().some(c => c.k === 'date')) { sortKey = 'date'; sortDir = -1; }
    else { sortKey = 'title'; sortDir = 1; }
  }
  buildHeader();
  apply();
  // adding/removing columns changes row heights (in-cell wrapping), which can
  // strand the selected row off-screen — keep it centered
  recenterOpen();
}
colsMenu.addEventListener('change', e => {
  const k = e.target.dataset.k;
  if (!k) return;
  if (e.target.checked) enabledCols.add(k); else enabledCols.delete(k);
  localStorage.setItem('mz-cols2', JSON.stringify([...enabledCols]));
  syncColsReset();
  fixSortThenRebuild();
});
colsReset.addEventListener('click', () => {
  enabledCols = defaultCols();
  // remove both keys (incl. the legacy pre-2026-07 one, or the migration path
  // would resurrect the old picks on next load) — reset means "never customized"
  localStorage.removeItem('mz-cols2');
  localStorage.removeItem('mz-cols');
  for (const cb of colsMenu.querySelectorAll('input:not(:disabled)'))
    cb.checked = enabledCols.has(cb.dataset.k);
  syncColsReset();
  fixSortThenRebuild();
});
syncColsReset();

// --- "Year" dropdown: filter rows by Original Year (From / To range) ---
// The selects are seeded from the years actually present in DATA (buildYearMenu,
// called on load) so every option yields a distinct result. Rows with no numeric
// Original Year drop out while a bound is set (see apply()).
const yearMenu = document.getElementById('yearmenu');
const yearSummary = document.getElementById('yearsummary');
function saveYear() {
  if (yearFrom == null && yearTo == null) localStorage.removeItem('mz-year');
  else localStorage.setItem('mz-year', JSON.stringify({ from: yearFrom, to: yearTo }));
}
// prose form of the active range, reused by the summary and the no-match message
// (plain ASCII, no arrows). Empty string when no bound is set.
function yearLabel() {
  if (yearFrom == null && yearTo == null) return '';
  if (yearFrom != null && yearTo != null)
    return yearFrom === yearTo ? '' + yearFrom : yearFrom + '-' + yearTo;
  return yearFrom != null ? 'from ' + yearFrom : 'to ' + yearTo;
}
// single source of truth for the control's visible state after any change
function syncYear() {
  const lbl = yearLabel();
  yearSummary.textContent = lbl ? 'Year: ' + lbl : 'Year';
  yearSummary.classList.toggle('active', !!lbl);  // glow while a range is set, like a non-empty search box
  for (const x of yearMenu.querySelectorAll('.xclr'))
    x.hidden = (x.dataset.b === 'from' ? yearFrom : yearTo) == null;
  for (const c of yearMenu.querySelectorAll('.dchip')) {
    const s = +c.dataset.d;
    c.classList.toggle('on', yearFrom === Math.max(s, YEAR_MIN) && yearTo === Math.min(s + 9, YEAR_MAX));
  }
  const rst = yearMenu.querySelector('#yearreset');
  if (rst) rst.disabled = yearFrom == null && yearTo == null;
}
function buildYearMenu() {
  const years = [...new Set(DATA.map(d => +d.year).filter(Boolean))].sort((a, b) => a - b);
  if (!years.length) { document.getElementById('yeardd').hidden = true; return; }
  YEAR_MIN = years[0]; YEAR_MAX = years[years.length - 1];
  const opts = '<option value="">Any</option>' +
    years.map(y => '<option value="' + y + '">' + y + '</option>').join('');
  const row = (b, label) =>
    '<div class="yearrow"><span class="ylbl">' + label + '</span>' +
    '<select class="y' + b + '">' + opts + '</select>' +
    '<button type="button" class="xclr" data-b="' + b + '" title="Clear ' + label + '" hidden>x</button></div>';
  const decs = [];
  for (let d = Math.floor(YEAR_MIN / 10) * 10; d <= YEAR_MAX; d += 10) decs.push(d);
  const chips = '<div class="decades">' + decs.map(d =>
    '<button type="button" class="dchip" data-d="' + d + '">' + ('' + d).slice(2) + 's</button>').join('') + '</div>';
  yearMenu.innerHTML = row('from', 'From') + row('to', 'To') + chips +
    '<button class="reset" id="yearreset">Reset</button>';
  // restore the persisted range now that the options exist; if a saved year no
  // longer appears in the data the select stays blank, so drop that stale bound
  const fromSel = yearMenu.querySelector('.yfrom'), toSel = yearMenu.querySelector('.yto');
  if (yearFrom != null) { fromSel.value = yearFrom; if (fromSel.value === '') yearFrom = null; }
  if (yearTo != null) { toSel.value = yearTo; if (toSel.value === '') yearTo = null; }
  if (yearFrom == null && yearTo == null) saveYear();
  syncYear();
}
// delegated so the listeners survive buildYearMenu() rebuilding the innerHTML
yearMenu.addEventListener('change', e => {
  const sel = e.target.closest('select');
  if (!sel) return;
  const v = +sel.value || null;
  if (sel.classList.contains('yfrom')) yearFrom = v; else yearTo = v;
  saveYear(); syncYear(); apply(); recenterOpen();
});
yearMenu.addEventListener('click', e => {
  const x = e.target.closest('.xclr'), chip = e.target.closest('.dchip'), rst = e.target.closest('#yearreset');
  if (x) {
    if (x.dataset.b === 'from') { yearFrom = null; yearMenu.querySelector('.yfrom').value = ''; }
    else { yearTo = null; yearMenu.querySelector('.yto').value = ''; }
  } else if (chip) {
    const s = +chip.dataset.d;
    yearFrom = Math.max(s, YEAR_MIN); yearTo = Math.min(s + 9, YEAR_MAX);
    yearMenu.querySelector('.yfrom').value = yearFrom;
    yearMenu.querySelector('.yto').value = yearTo;
  } else if (rst) {
    yearFrom = yearTo = null;
    yearMenu.querySelector('.yfrom').value = '';
    yearMenu.querySelector('.yto').value = '';
  } else return;
  saveYear(); syncYear(); apply(); recenterOpen();
});

// click outside closes any open dropdown (Types + Columns)
function closeDropdowns(except) {
  for (const dd of document.querySelectorAll('details.cols')) {
    if (dd.open && dd !== except) dd.open = false;
  }
}
// capture phase so a click that closes an open dropdown is CONSUMED — it must
// not also land on whatever is underneath (opening a row was the offender)
document.addEventListener('click', e => {
  const inside = e.target.closest('details.cols');
  const anyOpen = document.querySelector('details.cols[open]');
  closeDropdowns(inside);
  if (anyOpen && !inside) { e.stopPropagation(); e.preventDefault(); }
}, true);

buildHeader();  // header renders immediately; rows follow once data.json loads

// --- detail panel ---
const panel = document.getElementById('panel');

// CRT slot mask over panel screenshots (mask.js, device-pixel accurate).
// Game shots also get a worn-tube blur along the scan axis (source-relative),
// and tate rows (.vert frames) rotate mask + blur together. System photos are
// masked but never blurred (they're photos of hardware, not tube content).
// Imgs mask as they load; the ResizeObserver re-renders (debounced) on panel
// resize/open.
const TUBE_BLUR = 1.25;  // user-tuned 2026-07-12
function maskShot(img) {
  if (!window.mzMask) return;
  let f = img.parentElement;
  if (img.classList.contains('sysphoto')) {
    // hardware photo: wrap once so the canvas has a positioned box to fill
    if (!f.classList.contains('sysframe')) {
      const w = document.createElement('div');
      w.className = 'sysframe';
      img.replaceWith(w);
      w.appendChild(img);
      f = w;
    }
    let cv = f.querySelector('canvas');
    if (!cv) { cv = document.createElement('canvas'); f.appendChild(cv); }
    if (!window.mzMask(img, cv, { fit: 'contain' })) cv.remove();
    return;
  }
  if (!f || !f.classList.contains('frame')) return;
  let cv = f.querySelector('canvas');
  if (!cv) { cv = document.createElement('canvas'); f.appendChild(cv); }
  if (!window.mzMask(img, cv, { fit: 'fill', blur: TUBE_BLUR,
                                rot: f.classList.contains('vert') })) cv.remove();
}
panel.addEventListener('load', e => {
  if (e.target.tagName === 'IMG') maskShot(e.target);
}, true);
let maskT;
new ResizeObserver(() => {
  clearTimeout(maskT);
  maskT = setTimeout(() => {
    panel.querySelectorAll('.frame img, .sysphoto').forEach(img => {
      if (img.complete && img.naturalWidth) maskShot(img);
    });
  }, 150);
}).observe(panel);

// click-to-copy affordance for panel values (delegated handler on #panel)
const copyBtn = (v, label, icon) => '<button class="copy" data-copy="' + escA(v) +
  '" title="' + escA(label || 'Copy') + '">' + (icon || '⧉') + '</button>';

// --- Launch on MiSTer -------------------------------------------------------
// Talks to wizzo's mrext Remote service on the visitor's MiSTer (Scripts/
// remote.sh, port 8182): GET /api/l/<UNPADDED base64url payload> launches an
// absolute file path or a **system:<id> script (mrext's LaunchToken dialect —
// NOT ZapScript: launch.system is "unknown command" here, and padded base64
// is rejected). Bare /l/ must be avoided: the SPA serves every unknown route
// with a 200, which looks like success and launches nothing. A GET
// *navigation* is deliberately the transport — this https page may not
// fetch() an http LAN address (mixed content), but it may navigate to one, so
// the button window.open()s the URL and closes the tab a beat later. No
// response is readable (fire-and-forget); failures (missing file on the SD,
// device off) only flash their error text in the tab before it closes.
// Devices persist per-browser in localStorage (mz-misters / mz-mister-last).

// core/rbf name → mrext system id (pkg/games/systems.go), for non-arcade rows:
// launching a "system" loads that core. Arcade rows launch their .mra by path
// (d.mra) and don't use this. Cores absent here (no mrext id) get no button.
const MISTER_SYS = Object.fromEntries([
  // cores whose mrext system id matches the core name exactly
  ...('AcornAtom AcornElectron AliceMC10 Amstrad Apogee Aquarius Atari800 BBCMicro BK0011M ' +
      'C16 C64 CoCo2 EDSAC Galaksija Interact Jupiter Lynx48 MSX MSX1 MacPlus MultiComp ' +
      'Oric PCXT PDP1 PET2001 PMD85 QL RX78 SAMCoupe SordM5 Specialist TSConf ' +
      'TatungEinstein TomyTutor UK101 VIC20 X68000 ZX81 ZXNext ao486 ' +
      'AdventureVision Arcadia Astrocade Atari5200 Atari7800 AtariLynx ChannelF ' +
      'ColecoVision CreatiVision GBA Gamate Gameboy Genesis Intellivision Jaguar MegaCD ' +
      'NES NeoGeo Odyssey2 PSX PokemonMini SNES Saturn SuperVision TurboGrafx16 VC4000 ' +
      'Vectrex WonderSwan Arduboy Chip8').split(' ').map(s => [s, s]),
  // renames between MiSTer rbf names and mrext ids
  ...Object.entries({
    'Amstrad-PCW': 'AmstradPCW', 'Apple-I': 'AppleI', 'Apple-II': 'AppleII',
    'Casio_PV-2000': 'CasioPV2000', 'Laser310': 'Laser', 'Minimig': 'Amiga',
    'ORAO': 'Orao', 'Svi328': 'SVI328', 'TRS-80': 'TRS80', 'Ti994a': 'TI994A',
    'Vector-06C': 'Vector06C', 'ZX-Spectrum': 'ZXSpectrum',
    'CDi': 'CDI', 'Casio_PV-1000': 'CasioPV1000', 'GameAndWatch': 'GameNWatch',
    'GnW': 'GameNWatch', 'GameGear2P': 'GameGear', 'MegaDrive': 'Genesis',
    'N64': 'Nintendo64', 'S32X': 'Sega32X', 'SGB': 'SuperGameboy', 'SMS': 'MasterSystem',
  }),
]);
// what a row launches: arcade → its MRA's SD-card path; others → their system
const launchScript = d => d.base === 'Arcade'
  ? (d.mra ? '/media/fat/' + d.mra : null)
  : (MISTER_SYS[d.core] ? '**system:' + MISTER_SYS[d.core] : null);

let misters = [];
try { misters = JSON.parse(localStorage.getItem('mz-misters') || '[]') || []; } catch (e) {}
let lastMister = +localStorage.getItem('mz-mister-last') || 0;
if (lastMister >= misters.length) lastMister = 0;
const saveMisters = () => {
  localStorage.setItem('mz-misters', JSON.stringify(misters));
  localStorage.setItem('mz-mister-last', lastMister);
};

// URL-safe base64 of the UTF-8 bytes (MRA paths carry 'é', '&', apostrophes…)
const b64url = s => btoa(Array.from(new TextEncoder().encode(s), b => String.fromCharCode(b)).join(''))
  .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');

function fireLaunch(dev, script, btn) {
  // small popup (not a full tab), pre-painted dark before it navigates to the
  // http:// LAN URL (top-level navigation is the only mixed-content-legal
  // transport; the Remote response page itself can't be styled or read).
  // 4s before auto-close: enough to read Remote's plain-text 500 on a miss.
  const w = window.open('', '_blank', 'popup,width=460,height=180');
  if (w) {
    try {
      w.document.write('<title>Launching…</title><body style="margin:0;display:grid;' +
        'place-items:center;height:100vh;background:#141414;color:#999;' +
        'font:13px system-ui">Launching on ' + dev.n.replace(/[<>&]/g, '') + '…</body>');
    } catch (e) {}
    w.location.replace('http://' + dev.h + '/api/l/' + b64url(script));
    setTimeout(() => { try { w.close(); } catch (e) {} }, 4000);
  }
  if (btn) {  // same flash-confirm rhythm as the copy buttons
    if (!btn.dataset.orig) btn.dataset.orig = btn.textContent;
    btn.classList.add('sent'); btn.textContent = 'Sent to ' + dev.n + ' ✓';
    setTimeout(() => { btn.classList.remove('sent'); btn.textContent = btn.dataset.orig; }, 1600);
  }
}

const launchRowHTML = () => misters.length
  ? '<button class="go">▶ Launch on ' + esc(misters[lastMister].n) + '</button>' +
    '<button class="more" aria-label="Manage MiSTers">▾</button>'
  : '<button class="go">▶ Launch on MiSTer…</button>';
function updateLaunchRow() {
  const lr = panel.querySelector('.launchrow');
  if (lr) lr.innerHTML = launchRowHTML();
}

function detailHTML(d) {
  const rows = [['Type', typeLabel(d)]];
  if (d.genre) rows.push(['Genre', d.genre]);
  if (d.manufacturer) rows.push(['Manufacturer', d.manufacturer]);
  if (d.core) rows.push(['Core', esc(coreLabel(d.core)) +
    (coreLabel(d.core) !== d.core ? ' (' + esc(d.core) + ')' : '') + copyBtn(d.core), true]);
  if (d.sn) rows.push(['ROM name', '<span class="rom">' + esc(d.sn) + '</span>' + copyBtn(d.sn), true]);
  if (d.year) rows.push(['Original year', d.year]);
  // arcade hardware metadata (MiSTer Arcade Database) — always shown here,
  // even when the matching table columns are toggled off. Provisional values
  // (mame2003-plus, pending the curated DB) render grayed with a "(provisional)" tag.
  const specRow = (label, key) => {
    if (!d[key]) return;
    if (d.prov && d.prov.includes(key))
      rows.push([label, '<span class="prov" title="' + PROV_TITLE + '">' +
        esc(d[key]) + ' <em>(provisional)</em></span>', true]);
    else
      rows.push([label, d[key]]);
  };
  specRow('Rotation', 'rot');
  // multi-monitor cabinets only (pipeline `scr` field); single screen is implied
  if (d.scr) rows.push(['Screens', d.scr === 3 ? 'Triple screen (3)' : 'Dual screen (2)']);
  specRow('Resolution', 'res');
  specRow('Players', 'plr');
  specRow('Controls', 'ctl');
  specRow('Special controls', 'spc');
  specRow('Screen flip', 'flip');
  rows.push(['MiSTer release', d.date + (d.date_kind === 'debut' ? ' (MiSTer debut)' : ' (latest build; debut unknown)')]);
  // 'Latest update' = newest shipped build (what update_all delivers);
  // 'Latest commit' = repo activity, which can run ahead of a shipped build
  if (d.updated) rows.push(['Latest update', d.updated]);
  if (d.act) rows.push(['Latest commit', d.act]);
  // which downloader database delivers this entry via update_all
  if (d.src) rows.push(['Source', SRC_NAMES[d.src] || d.src]);
  // show the repo slug (jtcores deep links keep the full path in the href only)
  if (d.repo) rows.push(['Repository', '<a href="' + escA(repoURL(d)) + '" target="_blank" rel="noopener">' +
    esc(d.repo.split('/').slice(0, 2).join('/')) + '<span class="ext">↗</span></a>', true]);
  if (d.deprecated) rows.push(['Status', 'Deprecated']);
  if (d.note) rows.push(['Note', d.note]);

  // a row's third element marks the value as pre-built HTML (links); default is plain text
  const dl = '<dl>' + rows.map(([k, v, html]) => '<dt>' + esc(k) + '</dt><dd>' + (html ? v : esc(v)) + '</dd>').join('') + '</dl>';
  const prose = d.detail ? '<p class="detail">' + esc(d.detail) + '</p>' : '';
  // prefilled GitHub issue: the report arrives already saying which row it's
  // about (title/core/setname), so nobody has to describe "that one arcade game"
  const issueURL = 'https://github.com/matijaerceg/misterzine/issues/new?title=' +
    encodeURIComponent('[' + d.title + '] data problem') +
    '&body=' + encodeURIComponent('Title: ' + d.title + '\nCore: ' + d.core +
      (d.img ? '\nSetname: ' + d.img : '') + '\n\nWhat looks wrong:\n');
  const report = '<p class="report">Something wrong with this entry? <a href="' + escA(issueURL) +
    '" target="_blank" rel="noopener">Report a problem<span class="ext">↗</span></a></p>';
  // multi-monitor cabinets: N screens = N 4:3 CRTs side by side, so dual → 8:3
  // and triple → 12:3, driven by the pipeline's `scr` field (MAME desc + pins).
  // Precedence: (1) ASPECT_OVERRIDE escape hatch; (2) d.scr (dual/triple);
  // (3) the >= 2.4 dimension heuristic, kept as a net for a superwide shot on a
  // row missing `scr` (2.4 sits below the dual-screen cluster at 2.67+ but above
  // wide single screens like the PGM 448x224 games at 2.0, which stay 4:3);
  // (4) the MAD rotation column (d.rot) — the primary signal, right where a
  // raster's raw w/h misleads (square DECO Cassette games, TATE games in a
  // landscape raster, non-square pixels); (5) dimension fallback for the few
  // rows with no rotation. Keyed by setname (d.img) for the override.
  const aspect = d.img_h ? d.img_w / d.img_h : 1;
  const ratio = ASPECT_OVERRIDE[d.img] ||
    (d.scr === 3 ? '12 / 3'
      : d.scr === 2 ? '8 / 3'
      : aspect >= 2.4 ? '8 / 3'
      : d.rot ? (d.rot.startsWith('Vertical') ? '3 / 4' : '4 / 3')
      : (d.img_w > d.img_h ? '4 / 3' : '3 / 4'));
  // tate rows (however the ratio decision got there — MAD, override, or
  // dimension fallback) carry .vert so the CRT mask + tube blur rotate with
  // the monitor
  const shots = (d.img_slots || []).map(s =>
    '<div class="frame' + (ratio === '3 / 4' ? ' vert' : '') + '" style="aspect-ratio:' + ratio + '">' +
    '<img loading="lazy" src="../images/' + s + '/' + escA(d.img) + '.png" alt="' + escA(s) + '"></div>'
  ).join('');
  // console/computer rows: hardware photo instead of screenshots, with a
  // Commons attribution caption (required for the CC BY-SA photos)
  let sysphoto = '';
  if (!d.img && SYSTEM_IMGS.has(d.core)) {
    sysphoto = '<img class="sysphoto" loading="lazy" src="../images/systems/' + escA(d.core) + '.png" alt="">';
    const cr = SYSTEM_CREDITS[d.core];
    if (cr && cr.file) {
      // artist is HTML from Commons extmetadata (links, entities) — reduce it
      // to plain text with an inert DOMParser, then esc() re-escapes below
      const artist = (new DOMParser().parseFromString(cr.artist || '', 'text/html')
        .documentElement.textContent || '').trim() || 'Wikimedia Commons';
      sysphoto += '<p class="syscredit">photo: <a href="https://commons.wikimedia.org/wiki/File:' +
        escA(cr.file) + '" target="_blank" rel="noopener">' + esc(artist) + '</a>' +
        (cr.license ? ' · ' + esc(cr.license) : '') + '</p>';
    }
  }

  // overlay (very narrow/tall) mode: no keyboard, no resizer — swipe is the only gesture
  const overlay = window.matchMedia('(max-aspect-ratio: 3/5)').matches;
  const hint = overlay
    ? '<p class="hint"><em>Swipe or Back to close</em></p>'
    : '<p class="hint"><kbd>↑</kbd> <kbd>↓</kbd> browse rows · drag the edge to resize · <kbd>Esc</kbd> to close</p>';

  // screenshots first so they own the viewport on open; derived detail text below.
  // .body scrolls; .hint is docked below it (built as a sibling, outside .body).
  // launchable rows get the Launch-on-MiSTer split button under the title;
  // the script rides along as a data attribute so the click handler needs no row lookup
  const script = launchScript(d);
  const launcher = script
    ? '<div class="launchrow" data-script="' + escA(script) + '">' + launchRowHTML() + '</div>'
    : '';

  return '<div class="body"><button class="close" aria-label="Close">×</button>' +
    '<h2>' + esc(d.title) + (d.year ? ' <span style="color:#888;font-weight:normal">(' + esc(d.year) + ')</span>' : '') +
    (d.k ? copyBtn(rowURL(d), 'Copy link to this entry', '🔗') : '') + '</h2>' +
    launcher + sysphoto + shots + dl + prose + report + '</div>' + hint;
}

function openPanel(d, fromHistory) {
  if (!d) return;
  openRow = d;
  // the MiSTer device popover anchors to the outgoing panel DOM — drop it
  if (metapopFor === 'mister') closePop();
  panel.innerHTML = detailHTML(d);
  // always open at the top — re-assert after the reveal reflow too, since a
  // same-frame layout (or a touch that opened the panel) can nudge it
  const body = panel.querySelector('.body'); if (body) body.scrollTop = 0;
  panel.scrollTop = 0;
  requestAnimationFrame(() => { if (body) body.scrollTop = 0; });
  panel.hidden = false;
  // force a reflow so the off-screen start position is committed before the
  // transition; otherwise the display:none→block toggle swallows the slide-in
  void panel.offsetWidth;
  document.body.classList.add('panel-open');
  markOpenRow();
  // history/Back navigations (and the initial #hash open) must not write
  // history themselves — the entry they came from already carries the hash
  if (!fromHistory) pushPanelState();
}

function closePanel() {
  if (metapopFor === 'mister') closePop();  // don't leave the device popover floating
  document.body.classList.remove('panel-open');
  // openRow is deliberately kept: the row stays highlighted after the panel
  // closes as a "you were here" marker (re-orientation aid, esp. after the
  // fullscreen overlay on mobile). Cleared only by opening another row.
  const onEnd = () => { panel.hidden = true; panel.removeEventListener('transitionend', onEnd); };
  panel.addEventListener('transitionend', onEnd);
  // consume the history entry that backed this panel (see pushPanelState), so a
  // close via ×/Esc/swipe doesn't leave a dead Back press behind — the URL's
  // hash reverts with it. Docked panels never pushed, so just strip the hash.
  if (panelHist) { panelHist = false; history.back(); }
  else if (location.hash) history.replaceState(history.state, '', location.pathname + location.search);
}

// The panel's URL/history model. Overlay mode (narrow/tall screens): the FIRST
// open pushes one history entry carrying the row's #key, so the browser/OS
// Back gesture closes the panel instead of leaving the site; browsing further
// rows only rewrites that entry (one Back always exits the panel). Wide
// screens: the panel is docked layout, not a modal — never push, just keep
// the #key in the address bar via replaceState so every state is shareable.
let panelHist = false;
function pushPanelState() {
  const url = openRow && openRow.k ? '#' + openRow.k : null;
  if (!panelHist && matchMedia('(max-aspect-ratio: 3/5)').matches) {
    if (url) history.pushState({ mzPanel: true }, '', url);
    else history.pushState({ mzPanel: true }, '');
    panelHist = true;
  } else if (url) {
    history.replaceState(history.state, '', url);
  }
}
window.addEventListener('popstate', e => {
  // panelHist mirrors "does the CURRENT entry back a panel" — set it before
  // any closePanel so a Back-close can't history.back() a second time
  panelHist = !!(e.state && e.state.mzPanel);
  const d = KEY2ROW[decodeURIComponent(location.hash.slice(1))];
  if (d) { openPanel(d, true); recenterOpen(); }  // Forward (or hash edit) re-opens
  else if (document.body.classList.contains('panel-open')) closePanel();
});

function markOpenRow() {
  document.querySelectorAll('#rows tr.open').forEach(tr => tr.classList.remove('open'));
  if (openRow == null) return;
  const i = view.findIndex(d => d === openRow);
  if (i >= 0) { const tr = document.querySelector('#rows tr[data-i="' + i + '"]'); if (tr) tr.classList.add('open'); }
}

// copy the value, flash confirmation, restore the button's own icon (⧉ or 🔗)
function flashCopy(cp) {
  if (!cp.dataset.orig) cp.dataset.orig = cp.textContent;
  navigator.clipboard.writeText(cp.dataset.copy).then(() => {
    cp.classList.add('ok'); cp.textContent = '✓';
    setTimeout(() => { cp.classList.remove('ok'); cp.textContent = cp.dataset.orig; }, 1000);
  });
}
panel.addEventListener('click', e => {
  const cp = e.target.closest('.copy');
  if (cp) { flashCopy(cp); return; }  // keep the panel open
  const lr = e.target.closest('.launchrow');
  if (lr) {
    // chevron (or a first click with nothing configured) opens the device
    // popover; the main button fires at the last-used device
    if (e.target.closest('.more') || !misters.length) { openMisterPop(lr); return; }
    const go = e.target.closest('.go');
    if (go) { closePop(); fireLaunch(misters[lastMister], lr.dataset.script, go); }
    return;
  }
  if (e.target.closest('.close')) closePanel();
});

// --- arrow-key row navigation (Up/Down = click prev/next row) ---
function currentIndex() {
  return openRow == null ? -1 : view.findIndex(d => d === openRow);
}
function firstVisibleRowIdx(fromBottom) {
  const rows = [...document.querySelectorAll('#rows tr')];
  if (fromBottom) rows.reverse();
  // visibility is judged against the scroller, not the window — and rows tucked
  // under the sticky header row don't count, so the top boundary is the thead's
  // bottom edge rather than the scroller's own top
  const wrap = document.querySelector('.tablewrap').getBoundingClientRect();
  const top = document.querySelector('thead').getBoundingClientRect().bottom;
  for (const tr of rows) {
    const r = tr.getBoundingClientRect();
    if (r.bottom > top && r.top < wrap.bottom) return +tr.dataset.i;  // first row inside the visible scroll area
  }
  return -1;
}
function navigate(dir) {  // dir: +1 down, -1 up
  if (!view.length) return;
  const cur = currentIndex();
  let target;
  if (cur < 0) {                                   // nothing selected → top (or bottom) visible row
    target = firstVisibleRowIdx(dir < 0);
    if (target < 0) target = dir > 0 ? 0 : view.length - 1;
  } else {
    target = cur + dir;
    if (target < 0 || target >= view.length) return;  // clamp at the ends
  }
  openPanel(view[target]);
  const tr = document.querySelector('#rows tr[data-i="' + target + '"]');
  if (tr) tr.scrollIntoView({ block: 'center', inline: 'nearest' });  // keep the selected row centered as you arrow through
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (closePop()) return;  // an open meta-line popover absorbs the Esc first
    // an open Types/Columns dropdown is the next topmost thing — close it
    const dd = document.querySelector('details.cols[open]');
    if (dd) { dd.open = false; return; }
    // an active search filter absorbs the first Esc (clear it, keep the panel);
    // a second Esc — filter now empty — closes the panel as before
    if (document.getElementById('q').value) {
      e.preventDefault();
      document.getElementById('clear').click();  // clears + re-centers on the selected row
      return;
    }
    if (document.body.classList.contains('panel-open')) closePanel();
    return;
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    navigate(e.key === 'ArrowDown' ? 1 : -1);
    return;
  }
  // type anywhere to filter: printable keys and Backspace route to the search box.
  // Space is deliberately excluded (no leading-space queries; it works normally
  // once focus is in the field), as are modified keys (browser shortcuts).
  const printable = e.key.length === 1 && e.key !== ' ';
  if ((printable || e.key === 'Backspace')
      && !e.ctrlKey && !e.metaKey && !e.altKey && !e.isComposing
      && !e.target.closest('input, textarea, select')
      && !(e.target instanceof HTMLElement && e.target.isContentEditable)) {
    closeDropdowns();  // typing means "filter now"
    const q = document.getElementById('q');
    q.focus();
    // a stale query gets replaced, not appended to: select it so the incoming
    // keystroke overwrites (address-bar convention). Backspace instead deletes
    // one char from the end. No preventDefault — the browser delivers the key
    // to the now-focused field, so the normal input/filter pipeline fires.
    if (printable && q.value) q.select();
    if (e.key === 'Backspace') q.setSelectionRange(q.value.length, q.value.length);
  }
});

// swipe-left to close (touch only: mouse/pen drags are for text selection,
// and desktop has ×/Esc/resizer-flick)
let sx = 0, sy = 0, axis = null, dx = 0;
panel.addEventListener('pointerdown', e => {
  if (e.pointerType !== 'touch') return;
  if (e.target.closest('.close')) return;
  sx = e.clientX; sy = e.clientY; axis = null; dx = 0;
});
panel.addEventListener('pointermove', e => {
  if (sx === 0 && sy === 0) return;
  const mx = e.clientX - sx, my = e.clientY - sy;
  if (!axis) {
    if (Math.abs(mx) < 8 && Math.abs(my) < 8) return;
    axis = Math.abs(mx) > Math.abs(my) ? 'x' : 'y';
    if (axis === 'y') { sx = sy = 0; return; }  // vertical → let it scroll
    panel.style.transition = 'none';
  }
  if (axis === 'x') { dx = Math.min(0, mx); panel.style.transform = 'translateX(' + dx + 'px)'; }
});
function endSwipe() {
  if (axis === 'x') {
    panel.style.transition = '';
    panel.style.transform = '';
    if (dx < -80) closePanel();
  }
  sx = sy = 0; axis = null; dx = 0;
}
panel.addEventListener('pointerup', endSwipe);
panel.addEventListener('pointercancel', endSwipe);
// once the gesture is axis-locked horizontal, block the browser's native
// vertical scroll from hijacking it. Chrome otherwise starts scrolling .body on
// a slightly diagonal swipe and fires pointercancel, snapping the panel back.
panel.addEventListener('touchmove', e => {
  if (axis === 'x') e.preventDefault();  // we own this gesture
}, { passive: false });

// --- draggable edge: resize within bounds, flick left past CLOSEW to close ---
const MINW = 240, CLOSEW = 150, maxW = () => innerWidth * 0.8;
const resizer = document.createElement('div');
resizer.id = 'resizer';
document.body.appendChild(resizer);
function setPanelW(px) { document.documentElement.style.setProperty('--pw', Math.min(px, maxW()) + 'px'); }
let committedW = +localStorage.getItem('mz-panel-w') || 0;
if (committedW) setPanelW(committedW);

let resizing = false;
resizer.addEventListener('pointerdown', e => {
  e.preventDefault();
  resizing = true;
  resizer.setPointerCapture(e.pointerId);
  document.body.classList.add('resizing');
});
resizer.addEventListener('pointermove', e => {
  if (resizing) setPanelW(Math.max(40, e.clientX));  // follow the cursor; let it visibly shrink toward close
});
function endResize(e) {
  if (!resizing) return;
  resizing = false;
  document.body.classList.remove('resizing');
  if (e.clientX < CLOSEW) {                            // flicked/dragged past the edge → close
    if (committedW) setPanelW(committedW); else document.documentElement.style.removeProperty('--pw');
    closePanel();
    return;
  }
  committedW = Math.round(Math.min(Math.max(e.clientX, MINW), maxW()));
  setPanelW(committedW);
  localStorage.setItem('mz-panel-w', committedW);
}
resizer.addEventListener('pointerup', endResize);
resizer.addEventListener('pointercancel', endResize);

// --- theme toggle (auto / light / dark; persisted) ---
const themeBtns = [...document.querySelectorAll('#theme button')];
function applyTheme(t) {
  if (t === 'dark' || t === 'light') document.documentElement.setAttribute('data-theme', t);
  else { document.documentElement.removeAttribute('data-theme'); t = 'auto'; }
  themeBtns.forEach(b => b.setAttribute('aria-pressed', b.dataset.set === t));
}
themeBtns.forEach(b => b.addEventListener('click', () => {
  localStorage.setItem('mz-theme', b.dataset.set);
  applyTheme(b.dataset.set);
}));
applyTheme(localStorage.getItem('mz-theme') || 'auto');

// wide screens: dock the panel with the empty state by default (no slide-in on first paint)
if (matchMedia('(min-aspect-ratio: 3/5)').matches) {
  document.body.classList.add('no-anim');
  openPlaceholder();
  requestAnimationFrame(() => requestAnimationFrame(() => document.body.classList.remove('no-anim')));
}
// turning portrait while only the empty state shows → hide it so it doesn't cover the list
matchMedia('(max-aspect-ratio: 3/5)').addEventListener('change', e => {
  if (e.matches && openRow == null && document.body.classList.contains('panel-open')) closePanel();
  // a docked detail panel that just became a full-screen overlay needs its
  // Back-to-close history entry too (openRow alone isn't enough — it now
  // outlives the panel as the row-highlight marker, so check panel-open)
  else if (e.matches && openRow != null && document.body.classList.contains('panel-open')) pushPanelState();
});

// "Last updated" stamp — meta.json.updated is bumped by export-web only when the
// served data actually changes (see _write_site_meta), so this date/time is stable
// across no-op rebuilds. Stored as an ISO minute-precision UTC string.
fetch('./meta.json').then(r => r.json()).then(m => {
  const el = document.getElementById('updated');
  if (!el || !m.updated) return;
  const dt = new Date(m.updated);
  const s = isNaN(dt) ? m.updated : dt.toLocaleString(undefined, {
    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit',
    timeZoneName: 'short'  // append the viewer's tz (e.g. "GMT+2") so it's clearly local
  });
  el.innerHTML = 'Last updated: ' + esc(s) +
    ' · <a href="../" class="zinelink">Daily Zine<span class="ext">↗</span></a>' +
    ' · <a href="feed.xml" class="note" id="rss-link">RSS<span class="ext">ⓘ</span></a>' +
    ' · <a href="https://misterzine.goatcounter.com/" target="_blank" rel="noopener">Traffic Stats<span class="ext">↗</span></a>' +
    ' · <a href="https://github.com/matijaerceg/misterzine/blob/main/CHANGELOG.md" target="_blank" rel="noopener">Changelog (GitHub)<span class="ext">↗</span></a>' +
    ' · <a href="https://github.com/matijaerceg/misterzine/issues" target="_blank" rel="noopener">Report a Problem<span class="ext">↗</span></a>' +
    ' · <a href="#" class="note" id="pub-note">Public cores only<span class="ext">ⓘ</span></a>';
}).catch(() => {});

// --- meta-line popovers: "RSS" opens a feed chooser (readers also
// autodiscover all three feeds from the <link rel=alternate> tags in <head>;
// copy buttons because clicking a feed URL just dumps raw XML at people, and
// the href on the RSS link itself stays for middle-click/no-JS). "Public
// cores only" opens a note explaining the Patreon-beta exclusion — a click
// popover instead of a title tooltip so it works on touch too. One popover
// at a time: click outside, a second click on the trigger, or Esc closes it.
const FEED_LIST = [
  ['All changes', 'feed.xml'],
  ['New cores & games', 'feed-new.xml'],
  ['Updates only', 'feed-updates.xml'],
];
const PUB_NOTE_HTML =
  '<p>Some cores (mainly Jotego arcade cores) start out as Patreon ' +
  'early-access betas. Those are not listed here while they are ' +
  'subscriber-only.</p>' +
  '<p>Each core shows up automatically once it gets a public release. ' +
  'Beta cores may get their own listing here in the future.</p>';
let metapop = null, metapopFor = null;
function closePop() { if (metapop) { metapop.remove(); metapop = null; return true; } return false; }
document.addEventListener('click', e => {
  const cp = e.target.closest('.rsspop .copy');
  if (cp) { flashCopy(cp); return; }  // keep the popover open
  const a = e.target.closest('#rss-link, #pub-note');
  if (!a) {
    // click outside closes — but not the .launchrow click that just opened
    // the MiSTer popover (this document handler runs after panel's)
    if (metapop && !e.target.closest('.rsspop') && !e.target.closest('.launchrow')) closePop();
    return;
  }
  e.preventDefault();
  const wasFor = metapopFor;
  if (closePop() && wasFor === a.id) return;  // second click on the same trigger toggles it shut
  metapopFor = a.id;
  metapop = document.createElement('div');
  metapop.className = 'rsspop';
  metapop.innerHTML = a.id === 'rss-link'
    ? '<p>RSS feeds: paste a URL into your reader (most readers also ' +
      'find these if you paste the page URL itself).</p>' +
      FEED_LIST.map(([name, f]) => {
        const url = new URL(f, location.href).href;
        return '<div class="feedrow"><b>' + esc(name) + '</b><code>' + esc(url) + '</code>' +
          copyBtn(url) + '</div>';
      }).join('')
    : PUB_NOTE_HTML;
  const r = a.getBoundingClientRect();
  metapop.style.left = Math.max(8, Math.min(r.left, innerWidth - 500)) + 'px';
  metapop.style.top = (r.bottom + 6) + 'px';
  document.body.appendChild(metapop);
});

// --- MiSTer device popover: chooser + manager for the Launch button ---------
// Shares metapop/closePop with the meta-line popovers, so outside-click and
// Esc handling come for free. Picking a device launches on it AND makes it
// the default; the adder normalizes pasted addresses and assumes port 8182.
function misterPopHTML() {
  return (misters.length
      ? '<p>Launch on:</p>' + misters.map((m, i) =>
          '<div class="devrow"><button class="pick" data-i="' + i + '">▶ ' + esc(m.n) + '</button>' +
          '<code>' + esc(m.h) + '</code>' +
          '<button class="rm" data-i="' + i + '" aria-label="Remove ' + escA(m.n) + '">✕</button></div>').join('')
      : '<p>Add your MiSTer to launch games straight from this page ' +
        '(works when you’re on the same network as it).</p>') +
    '<div class="devrow adder"><input class="nm" placeholder="Name (optional)">' +
    '<input class="ad" placeholder="mister.local or IP">' +
    '<button class="add">Add</button></div>' +
    '<p class="note">Each MiSTer needs wizzo’s free Remote service: run it once from the Scripts ' +
    'menu and let it enable startup, no other setup. ' +
    '<a href="https://github.com/matijaerceg/misterzine#launch-on-your-mister" ' +
    'target="_blank" rel="noopener">Setup guide<span class="ext">↗</span></a></p>';
}
function onMisterPop(e) {
  // handled clicks re-render the popover, detaching e.target — the document
  // close-on-outside-click handler would then misread it as an outside click
  if (e.stopPropagation) e.stopPropagation();
  const pick = e.target.closest('.pick');
  if (pick) {
    lastMister = +pick.dataset.i;
    saveMisters(); updateLaunchRow();
    fireLaunch(misters[lastMister], metapop.dataset.script, panel.querySelector('.launchrow .go'));
    closePop(); return;
  }
  const rm = e.target.closest('.rm');
  if (rm) {
    misters.splice(+rm.dataset.i, 1);
    if (lastMister >= misters.length) lastMister = 0;
    saveMisters(); metapop.innerHTML = misterPopHTML(); updateLaunchRow(); return;
  }
  if (e.target.closest('.add')) {
    const nm = metapop.querySelector('.nm'), ad = metapop.querySelector('.ad');
    let h = ad.value.trim().replace(/^https?:\/\//, '').replace(/\/.*$/, '');
    if (!h) { ad.focus(); return; }
    if (!/:\d+$/.test(h)) h += ':8182';
    misters.push({ n: nm.value.trim() || h.replace(/:\d+$/, ''), h });
    lastMister = misters.length - 1;
    saveMisters(); metapop.innerHTML = misterPopHTML(); updateLaunchRow();
  }
}
function openMisterPop(anchor) {
  const again = metapopFor === 'mister' && metapop;
  closePop();
  if (again) { metapopFor = null; return; }  // second click on the trigger toggles it shut
  metapopFor = 'mister';
  metapop = document.createElement('div');
  metapop.className = 'rsspop misterpop';
  metapop.dataset.script = anchor.dataset.script;
  metapop.innerHTML = misterPopHTML();
  metapop.addEventListener('click', onMisterPop);
  metapop.addEventListener('keydown', e => {  // Enter in either field = Add
    if (e.key === 'Enter' && e.target.closest('input')) { e.preventDefault(); onMisterPop({ target: metapop.querySelector('.add') }); }
  });
  const r = anchor.getBoundingClientRect();
  metapop.style.left = Math.max(8, Math.min(r.left, innerWidth - 360)) + 'px';
  metapop.style.top = (r.bottom + 6) + 'px';
  document.body.appendChild(metapop);
  if (!misters.length) metapop.querySelector('.ad').focus();
}

fetch('./data.json').then(r => r.json()).then(d => {
  DATA = d;
  // index cores that map to exactly one title, so single-game cores read as
  // the game name without hard-coding each (see coreLabel / CORE_NAMES).
  const seen = {};
  for (const r of DATA) {
    if (!r.core) continue;
    if (!(r.core in seen)) seen[r.core] = r.title;
    else if (seen[r.core] !== r.title) seen[r.core] = null;  // more than one distinct title
  }
  for (const c in seen) if (seen[c]) coreSoleTitle[c] = seen[c];
  for (const r of DATA) if (r.k) KEY2ROW[r.k] = r;
  buildYearMenu();
  buildHeader();
  apply();
  // deep link: a #key in the arrival URL opens that row's panel. fromHistory —
  // the entry we arrived on already IS the panel state (in overlay mode Back
  // correctly leaves the site, i.e. returns where the visitor came from).
  // Unknown/stale keys are ignored silently.
  const hit = KEY2ROW[decodeURIComponent(location.hash.slice(1))];
  if (hit) { openPanel(hit, true); recenterOpen(); }
});
</script>
</body>
